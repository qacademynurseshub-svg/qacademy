<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Results — QAcademy My Teacher</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
:root {
  --brand: #0b7a75;
  --brand-light: rgba(11,122,117,.08);
  --muted: #859998;
  --ink: #1f2a28;
  --bg: #f6f8f7;
  --card: #ffffff;
  --line: rgba(0,0,0,.10);
  --soft: rgba(0,0,0,.04);
  --warn: #b45309;
  --warn-light: rgba(180,83,9,.08);
  --danger: #b91c1c;
  --danger-light: rgba(185,28,28,.08);
  --ok: #067647;
  --ok-light: rgba(6,118,71,.08);
  --blue: #2563eb;
  --blue-light: rgba(37,99,235,.08);
}
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--ink); }
a { color: var(--brand); }

/* ── Layout ─────────────────────────────────────────────── */
.page-wrap { display: flex; flex-direction: column; min-height: 100vh; }
.main-content { flex: 1; padding: 24px 20px 40px; max-width: 1400px; margin: 0 auto; width: 100%; }
.page-header { margin-bottom: 20px; }
.page-title { font-size: 22px; font-weight: 900; }
.page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* ── Two-column ─────────────────────────────────────────── */
.results-grid { display: grid; grid-template-columns: 340px 1fr; gap: 16px; align-items: start; }
@media (max-width: 900px) { .results-grid { grid-template-columns: 1fr; } }

/* ── Scope panel ────────────────────────────────────────── */
.scope-panel { border: 1px solid var(--line); border-radius: 18px; padding: 16px; background: var(--card); position: sticky; top: 72px; }
.scope-title { font-size: 14px; font-weight: 900; margin-bottom: 14px; }
.scope-group { margin-bottom: 12px; }
.scope-group label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
.scope-group select, .scope-group input { width: 100%; padding: 8px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 13px; font-family: inherit; background: var(--card); }
.scope-group input[type="date"] { font-family: inherit; }
.scope-row { display: flex; gap: 10px; }
.scope-row > * { flex: 1; }
.check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.check-row input[type="checkbox"] { width: auto; accent-color: var(--brand); }
.check-row label { font-size: 13px; font-weight: 600; cursor: pointer; }

/* ── Buttons ────────────────────────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .14s ease; font-family: inherit; }
.btn:hover { border-color: var(--brand); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn.primary { background: var(--brand); color: #fff; border-color: var(--brand); }
.btn.primary:hover { background: #096662; }
.btn.sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }

/* ── Report area ────────────────────────────────────────── */
.report-area { min-width: 0; }
.empty-report { text-align: center; padding: 60px 20px; color: var(--muted); border: 1px solid var(--line); border-radius: 18px; background: var(--card); }
.empty-report-icon { font-size: 48px; margin-bottom: 12px; }
.empty-report-text { font-size: 15px; font-weight: 700; }
.empty-report-hint { font-size: 13px; margin-top: 6px; }

/* ── Summary stats ──────────────────────────────────────── */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
@media (max-width: 700px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } }
.stat-card { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: var(--card); }
.stat-val { font-size: 22px; font-weight: 900; }
.stat-label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
.stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Report header ──────────────────────────────────────── */
.report-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.report-title { font-size: 16px; font-weight: 900; }
.report-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 8px; font-size: 12px; background: var(--soft); }
.chip b { font-weight: 800; }
.chip.brand { background: var(--brand-light); color: var(--brand); }
.kbd { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; font-weight: 700; background: var(--soft); padding: 1px 5px; border-radius: 4px; }

/* ── Tabs ─────────────────────────────────────────────── */
.report-tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--line); margin-bottom: 14px; }
.rtab { padding: 10px 18px; border: none; background: transparent; font-size: 14px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .14s ease; color: var(--muted); font-family: inherit; }
.rtab:hover { color: var(--ink); }
.rtab.active { color: var(--brand); border-bottom-color: var(--brand); }
.rpane { display: none; }
.rpane.active { display: block; }

/* ── Badge ──────────────────────────────────────────────── */
.badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .3px; }
.badge-submitted { background: var(--ok-light); color: var(--ok); }
.badge-in-progress { background: var(--warn-light); color: var(--warn); }
.badge-not-started { background: var(--soft); color: var(--muted); }
.badge-timed-out { background: var(--warn-light); color: var(--warn); }
.badge-pass { background: var(--ok-light); color: var(--ok); }
.badge-fail { background: var(--danger-light); color: var(--danger); }

/* ── Flag pills ─────────────────────────────────────────── */
.flag { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-right: 4px; }
.flag-too-easy { background: var(--blue-light); color: var(--blue); }
.flag-too-hard { background: var(--danger-light); color: var(--danger); }
.flag-high-blanks { background: var(--warn-light); color: var(--warn); }
.flag-distractor { background: rgba(147,51,234,.08); color: #7c3aed; }

/* ── Table ──────────────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 14px; background: #fff; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
.tbl th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: #fff; z-index: 1; white-space: nowrap; }
.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--soft); vertical-align: middle; }
.tbl tr:hover td { background: var(--brand-light); }
.tbl-toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
.tbl-toolbar input { padding: 8px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 13px; min-width: 200px; font-family: inherit; }

/* ── Drawer ─────────────────────────────────────────────── */
.drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 500; }
.drawer-overlay.open { display: block; }
.drawer { position: fixed; bottom: 0; left: 0; right: 0; max-height: 85vh; background: var(--card); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,.12); z-index: 501; display: flex; flex-direction: column; transform: translateY(100%); transition: transform .28s ease; }
.drawer.open { transform: translateY(0); }
.drawer-handle { width: 40px; height: 4px; background: rgba(0,0,0,.15); border-radius: 999px; margin: 10px auto 0; flex-shrink: 0; }
.drawer-hd { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.drawer-title { font-size: 16px; font-weight: 900; }
.drawer-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); padding: 4px 8px; border-radius: 8px; }
.drawer-close:hover { color: var(--ink); }
.drawer-bd { flex: 1; overflow-y: auto; padding: 16px 20px; }

/* ── Detail cards ───────────────────────────────────────── */
.detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
.detail-cell { padding: 10px; border: 1px solid var(--line); border-radius: 12px; background: var(--soft); }
.detail-label { font-size: 10px; font-weight: 900; color: var(--muted); text-transform: uppercase; }
.detail-value { font-weight: 700; font-size: 14px; margin-top: 4px; }

/* ── Question review card ───────────────────────────────── */
.q-review { border: 1px solid var(--line); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }
.q-review-hd { padding: 10px 14px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 10px; background: var(--soft); }
.q-review-bd { padding: 14px; }
.q-review-stem { font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 12px; }
.q-review-opt { padding: 8px 12px; border-radius: 10px; margin-bottom: 6px; font-size: 13px; border: 1px solid var(--line); display: flex; align-items: flex-start; gap: 8px; }
.q-review-opt.correct { background: var(--ok-light); border-color: var(--ok); }
.q-review-opt.wrong { background: var(--danger-light); border-color: var(--danger); }
.q-review-rationale { margin-top: 12px; padding: 10px; border-radius: 10px; background: var(--soft); font-size: 13px; }
.q-review-meta { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* ── Item detail option bars ────────────────────────────── */
.opt-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.opt-bar-letter { font-weight: 900; font-size: 13px; width: 20px; text-align: center; }
.opt-bar-track { flex: 1; height: 22px; background: var(--soft); border-radius: 6px; overflow: hidden; position: relative; }
.opt-bar-fill { height: 100%; border-radius: 6px; transition: width .3s ease; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 700; color: #fff; }
.opt-bar-fill.correct { background: var(--ok); }
.opt-bar-fill.wrong { background: var(--danger); }
.opt-bar-fill.neutral { background: #9ca3af; }
.opt-bar-count { font-size: 12px; color: var(--muted); width: 40px; text-align: right; }

/* ── Print ──────────────────────────────────────────────── */
#printRoot { display: none; }
@media print {
  body > *:not(#printRoot) { display: none !important; }
  #printRoot { display: block !important; }
  #printRoot .tbl { min-width: 0; font-size: 11px; }
  #printRoot .tbl th, #printRoot .tbl td { padding: 4px 6px; }
}
.print-header { margin-bottom: 16px; }
.print-title { font-size: 18px; font-weight: 900; }
.print-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── Toast ──────────────────────────────────────────────── */
.toast { position: fixed; bottom: 20px; right: 20px; min-width: 260px; max-width: 380px; padding: 14px 16px; border-radius: 14px; background: var(--card); border: 1px solid var(--line); box-shadow: 0 12px 32px rgba(0,0,0,.12); z-index: 9999; display: none; }
.toast.show { display: block; animation: toastIn .22s ease; }
.toast-title { font-weight: 900; font-size: 13px; }
.toast-msg { font-size: 12px; color: var(--muted); margin-top: 2px; }
.toast.ok { border-color: rgba(6,118,71,.3); }
.toast.error { border-color: rgba(185,28,28,.3); }
@keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="page-wrap">
  <div id="myteacher-nav"></div>
  <main class="main-content">
    <div class="page-header">
      <div class="page-title">Results & Reports</div>
      <div class="page-subtitle" id="pageSubtitle">Select a class and quiz to view results</div>
    </div>

    <div class="results-grid">
      <!-- ======== SCOPE PANEL ======== -->
      <div class="scope-panel">
        <div class="scope-title">Report Scope</div>
        <div class="scope-group">
          <label>Class</label>
          <select id="scopeClass"><option value="">— Select class —</option></select>
        </div>
        <div class="scope-group">
          <label>Quiz</label>
          <select id="scopeQuiz" disabled><option value="">— Select quiz —</option></select>
        </div>
        <div class="check-row">
          <input type="checkbox" id="scopeIncludeRemoved" />
          <label for="scopeIncludeRemoved">Include removed members</label>
        </div>
        <div class="scope-group">
          <label>Sort Marksheet</label>
          <select id="scopeSort">
            <option value="name_asc">Name A–Z</option>
            <option value="score_desc">Score (high→low)</option>
            <option value="score_asc">Score (low→high)</option>
            <option value="status_asc">Status</option>
          </select>
        </div>
        <div class="scope-group">
          <label>Status Filter</label>
          <select id="scopeStatus">
            <option value="ALL">All</option>
            <option value="SUBMITTED" selected>Submitted</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="NOT_STARTED">Not Started</option>
          </select>
        </div>
        <div class="scope-row">
          <div class="scope-group">
            <label>Date From</label>
            <input type="date" id="scopeDateFrom" />
          </div>
          <div class="scope-group">
            <label>Date To</label>
            <input type="date" id="scopeDateTo" />
          </div>
        </div>
        <button class="btn primary" id="btnLoad" style="width:100%;margin-top:8px" disabled>Load Report</button>
      </div>

      <!-- ======== REPORT AREA ======== -->
      <div class="report-area">
        <div class="empty-report" id="emptyReport">
          <div class="empty-report-icon">📊</div>
          <div class="empty-report-text">No report loaded</div>
          <div class="empty-report-hint">Select a class and quiz, then click "Load Report"</div>
        </div>

        <div id="reportContent" style="display:none">
          <!-- Report header -->
          <div class="report-header">
            <div>
              <div class="report-title" id="reportTitle"></div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px" id="reportSub"></div>
            </div>
            <div class="report-chips" id="reportChips"></div>
          </div>

          <!-- Summary stats -->
          <div class="stats-bar" id="statsBar"></div>

          <!-- Action buttons -->
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
            <button class="btn sm" id="btnExportCsv">📥 Export CSV</button>
            <button class="btn sm" id="btnPrintSummary">🖨 Print Summary</button>
            <button class="btn sm" id="btnRefresh">↻ Refresh</button>
          </div>

          <!-- Tabs -->
          <div class="report-tabs">
            <button class="rtab active" data-rtab="marksheet">Marksheet</button>
            <button class="rtab" data-rtab="items">Item Analysis</button>
          </div>

          <!-- MARKSHEET PANE -->
          <div class="rpane active" id="paneMarksheet">
            <div class="tbl-toolbar">
              <input type="text" id="marksheetSearch" placeholder="Search name, fields, grade…" />
              <span class="chip" id="marksheetCount">0 rows</span>
            </div>
            <div class="tbl-wrap">
              <table class="tbl" id="marksheetTable">
                <thead id="marksheetHead"></thead>
                <tbody id="marksheetBody"></tbody>
              </table>
            </div>
          </div>

          <!-- ITEM ANALYSIS PANE -->
          <div class="rpane" id="paneItems">
            <div class="tbl-toolbar">
              <input type="text" id="itemSearch" placeholder="Search topic or stem…" />
              <span class="chip" id="itemCount">0 items</span>
              <button class="btn sm" id="btnRefreshItems">↻ Refresh</button>
            </div>
            <div class="tbl-wrap">
              <table class="tbl" id="itemsTable">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Type</th>
                    <th>Topic</th>
                    <th>% Correct</th>
                    <th>Correct</th>
                    <th>Attempts</th>
                    <th>Wrong</th>
                    <th>Blank</th>
                    <th>Top Distractor</th>
                    <th>Flags</th>
                    <th>Stem</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="itemsBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-hd">
    <div class="drawer-title" id="drawerTitle"></div>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div class="drawer-bd" id="drawerBody"></div>
</div>

<!-- Print root -->
<div id="printRoot"></div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-msg" id="toastMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/myteacher-api.js"></script>
<script src="/js/paths.js"></script>
<script src="/js/myteacher-teacher-nav.js"></script>
<script>
// ================================================================
// RESULTS & REPORTS — Page Logic
// ================================================================

const $ = id => document.getElementById(id);

let PROFILE = null;
let TEACHER_ID = '';
let REPORT_DATA = null;     // marksheet result
let SUMMARY_DATA = null;    // summary result
let ITEMS_DATA = null;      // item analysis result
let SELECTED_CLASS = '';
let SELECTED_QUIZ = '';

// ── Helpers ─────────────────────────────────────────────────
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let toastTimer = null;
function showToast(title, msg, type) {
  $('toastTitle').textContent = title || '';
  $('toastMsg').textContent = msg || '';
  const el = $('toast');
  el.className = 'toast show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); }
  catch(_) { return iso; }
}

function fmtDuration(seconds) {
  if (!seconds) return '—';
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function statusBadge(status) {
  const map = {
    SUBMITTED: 'badge-submitted', TIMED_OUT: 'badge-timed-out',
    IN_PROGRESS: 'badge-in-progress', NOT_STARTED: 'badge-not-started'
  };
  return `<span class="badge ${map[status] || 'badge-not-started'}">${esc(status.replace('_',' '))}</span>`;
}

function passBadge(pf) {
  if (!pf) return '—';
  return `<span class="badge badge-${pf.toLowerCase()}">${esc(pf)}</span>`;
}

function flagPill(flag) {
  const map = { TOO_EASY: 'flag-too-easy', TOO_HARD: 'flag-too-hard', HIGH_BLANKS: 'flag-high-blanks', DISTRACTOR_DOMINANT: 'flag-distractor' };
  return `<span class="flag ${map[flag] || ''}">${esc(flag.replace('_',' '))}</span>`;
}

function fmtScore(row, policy) {
  if (row.score_pct == null) return '—';
  if (policy === 'HIDE') return 'Hidden';
  if (policy === 'PCT_ONLY') return row.score_pct + '%';
  if (policy === 'RAW_ONLY') return (row.score_raw ?? '?') + '/' + (row.score_total ?? '?');
  return (row.score_raw ?? '?') + '/' + (row.score_total ?? '?') + ' (' + row.score_pct + '%)';
}


// ================================================================
// BOOT
// ================================================================
async function boot() {
  PROFILE = await guardPage('TEACHER');
  if (!PROFILE) return;
  TEACHER_ID = PROFILE.user_id;
  $('pageSubtitle').textContent = `Welcome, ${PROFILE.forename || PROFILE.name || PROFILE.email}`;
  if (window.mtSetUser) mtSetUser(PROFILE);

  await loadClasses();
  bindEvents();

  // Deep-link support
  const params = new URLSearchParams(location.search);
  const urlClass = params.get('class_id');
  const urlQuiz = params.get('quiz_id');
  if (urlClass) {
    $('scopeClass').value = urlClass;
    await onClassChange();
    if (urlQuiz) {
      $('scopeQuiz').value = urlQuiz;
      onQuizChange();
      loadReport();
    }
  }
}


// ================================================================
// SCOPE — Class & Quiz dropdowns
// ================================================================
async function loadClasses() {
  const classes = await getTeacherClasses(TEACHER_ID);
  const active = (classes || []).filter(c => c.status === 'ACTIVE');
  const sel = $('scopeClass');
  sel.innerHTML = '<option value="">— Select class —</option>';
  active.forEach(c => {
    sel.innerHTML += `<option value="${esc(c.class_id)}">${esc(c.title)}</option>`;
  });
}

async function onClassChange() {
  SELECTED_CLASS = $('scopeClass').value;
  const quizSel = $('scopeQuiz');
  quizSel.innerHTML = '<option value="">— Select quiz —</option>';
  quizSel.disabled = true;
  $('btnLoad').disabled = true;
  SELECTED_QUIZ = '';

  if (!SELECTED_CLASS) return;

  const quizzes = await getClassQuizzesForTeacher(SELECTED_CLASS, TEACHER_ID);
  quizzes.forEach(q => {
    quizSel.innerHTML += `<option value="${esc(q.teacher_quiz_id)}">${esc(q.title)} (${esc(q.status)})</option>`;
  });
  quizSel.disabled = false;
}

function onQuizChange() {
  SELECTED_QUIZ = $('scopeQuiz').value;
  $('btnLoad').disabled = !SELECTED_QUIZ;
}


// ================================================================
// LOAD REPORT
// ================================================================
async function loadReport() {
  if (!SELECTED_CLASS || !SELECTED_QUIZ) return;

  $('btnLoad').disabled = true;
  $('btnLoad').textContent = 'Loading…';

  const opts = {
    includeRemoved: $('scopeIncludeRemoved').checked,
    sort: $('scopeSort').value,
    statusFilter: $('scopeStatus').value,
    dateFrom: $('scopeDateFrom').value ? new Date($('scopeDateFrom').value).toISOString() : null,
    dateTo: $('scopeDateTo').value ? new Date($('scopeDateTo').value + 'T23:59:59').toISOString() : null
  };

  // Load summary + marksheet in parallel
  const [summary, marksheet] = await Promise.all([
    getTeacherResultsSummary(SELECTED_QUIZ, SELECTED_CLASS, opts),
    getTeacherResultsMarksheet(SELECTED_QUIZ, SELECTED_CLASS, opts)
  ]);

  if (!summary.success || !marksheet.success) {
    showToast('Error', summary.message || marksheet.message, 'error');
    $('btnLoad').disabled = false;
    $('btnLoad').textContent = 'Load Report';
    return;
  }

  SUMMARY_DATA = summary;
  REPORT_DATA = marksheet;
  ITEMS_DATA = null; // lazy-load

  renderReport();

  $('emptyReport').style.display = 'none';
  $('reportContent').style.display = '';
  $('btnLoad').disabled = false;
  $('btnLoad').textContent = 'Load Report';

  // Update URL
  const url = new URL(location);
  url.searchParams.set('class_id', SELECTED_CLASS);
  url.searchParams.set('quiz_id', SELECTED_QUIZ);
  history.replaceState(null, '', url);
}

// ================================================================
// MARKSHEET TAB
// ================================================================
function renderMarksheet() {
  const m = REPORT_DATA;
  const policy = m.score_display_policy;
  const showScore = policy !== 'HIDE';
  const search = ($('marksheetSearch').value || '').toLowerCase();

  // Build dynamic headers
  const classFieldHeaders = (m.class_fields || []).map(f => `<th>${esc(f.label || f.key)}</th>`).join('');
  const quizFieldHeaders = (m.quiz_fields || []).map(f => `<th>${esc(f.label || f.key)}</th>`).join('');

  $('marksheetHead').innerHTML = `<tr>
    <th>Name</th>
    ${classFieldHeaders}
    ${quizFieldHeaders}
    <th>Status</th>
    <th>Att</th>
    ${showScore ? '<th>Score</th><th>%</th>' : ''}
    <th>Pass/Fail</th>
    <th>Grade</th>
    <th>Submitted</th>
    <th></th>
  </tr>`;

  // Filter rows by search
  let rows = m.rows;
  if (search) {
    rows = rows.filter(r => {
      const hay = [r.display_name, r.email, r.user_id, r.grade_label, r.pass_fail, r.status,
        ...Object.values(r.member_fields), ...Object.values(r.candidate_fields)
      ].join(' ').toLowerCase();
      return hay.includes(search);
    });
  }

  $('marksheetCount').textContent = rows.length + ' row' + (rows.length !== 1 ? 's' : '');

  $('marksheetBody').innerHTML = rows.map(r => {
    const classFieldCells = (m.class_fields || []).map(f => {
      const key = f.key || f.label;
      return `<td>${esc(r.member_fields[key] || '—')}</td>`;
    }).join('');
    const quizFieldCells = (m.quiz_fields || []).map(f => {
      const key = f.key || f.label;
      return `<td>${esc(r.candidate_fields[key] || '—')}</td>`;
    }).join('');

    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">${r.avatar_url ? `<img src="${r.avatar_url}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0" alt="" />` : `<span style="width:28px;height:28px;border-radius:50%;background:var(--brand-light);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${esc(r.display_name).slice(0,2).toUpperCase()}</span>`}<div><div style="font-weight:700">${esc(r.display_name)}</div><div style="font-size:11px;color:var(--muted);font-family:monospace">${esc(r.user_id).slice(0,12)}</div></div></div></td>
      ${classFieldCells}
      ${quizFieldCells}
      <td>${statusBadge(r.status)}</td>
      <td>${r.attempts_used}</td>
      ${showScore ? `<td>${r.score_raw != null ? r.score_raw + '/' + r.score_total : '—'}</td><td style="font-weight:800">${r.score_pct != null ? r.score_pct + '%' : '—'}</td>` : ''}
      <td>${passBadge(r.pass_fail)}</td>
      <td>${r.grade_label ? `<span class="badge" style="background:var(--blue-light);color:var(--blue)">${esc(r.grade_label)}</span>` : '—'}</td>
      <td style="font-size:12px;color:var(--muted)">${fmtDate(r.submitted_at)}</td>
      <td>
        <div style="display:flex;gap:4px">
          ${r.attempts_used > 0 ? `<button class="btn sm" onclick="openAttemptsDrawer('${esc(r.user_id)}','${esc(r.display_name)}')">Attempts</button>` : ''}
          ${r.headline_attempt_id ? `<button class="btn sm" onclick="openAttemptDetailDrawer('${esc(r.headline_attempt_id)}')">View</button>` : ''}
        </div>
      </td>
    </tr>`;
  }).join('');
}


// ================================================================

  const result = await getTeacherResultsItemAnalysis(SELECTED_QUIZ, SELECTED_CLASS);
  if (!result.success) { showToast('Error', result.message, 'error'); return; }
  ITEMS_DATA = result;
  renderItemAnalysis();
}

  const search = ($('itemSearch').value || '').toLowerCase();

  let items = ITEMS_DATA.items;

// ================================================================
// DRAWERS
// ================================================================
function openDrawer(title, html) {
  $('drawerTitle').textContent = title;
  $('drawerBody').innerHTML = html;
  $('drawer').classList.add('open');
  $('drawerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  $('drawer').classList.remove('open');
  $('drawerOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Attempts drawer ─────────────────────────────────────────
async function openAttemptsDrawer(userId, name) {
  openDrawer('Attempts — ' + name, '<div style="text-align:center;padding:20px;color:var(--muted)">Loading…</div>');

  const result = await getStudentAttemptsForTeacher(SELECTED_QUIZ, SELECTED_CLASS, userId);
  if (!result.success) { $('drawerBody').innerHTML = '<div style="padding:20px;color:var(--danger)">' + esc(result.message) + '</div>'; return; }

  const policy = REPORT_DATA?.score_display_policy || 'RAW_AND_PCT';
  const quiz = await getTeacherQuiz(SELECTED_QUIZ);
  const threshold = quiz?.pass_threshold_pct ?? 50;

  let html = '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>Status</th><th>Submitted</th><th>Score</th><th>Grade</th><th>Time</th><th></th></tr></thead><tbody>';
  result.attempts.forEach(a => {
    const gradeLabel = _gradeLabelFromBands(a.grade_bands_json || quiz?.grade_bands_json, a.score_pct);
    const passThresh = (a.score_json || {}).pass_threshold_pct ?? threshold;
    html += `<tr>
      <td style="font-weight:700">#${a.attempt_no}</td>
      <td>${statusBadge(a.status)}</td>
      <td style="font-size:12px">${fmtDate(a.submitted_at)}</td>
      <td>${fmtScore(a, policy)}</td>
      <td>${gradeLabel ? `<span class="badge" style="background:var(--blue-light);color:var(--blue)">${esc(gradeLabel)}</span>` : '—'}</td>
      <td>${fmtDuration(a.time_taken_s)}</td>
      <td><button class="btn sm" onclick="openAttemptDetailDrawer('${esc(a.attempt_id)}')">View</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  $('drawerBody').innerHTML = html;
}

// ── Attempt detail drawer ────────────────────────────────────
async function openAttemptDetailDrawer(attemptId) {
  openDrawer('Attempt Detail', '<div style="text-align:center;padding:20px;color:var(--muted)">Loading…</div>');

  const result = await getAttemptDetailForTeacher(attemptId);
  if (!result.success) { $('drawerBody').innerHTML = '<div style="padding:20px;color:var(--danger)">' + esc(result.message) + '</div>'; return; }

  const a = result.attempt;
  let html = `
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-label">Attempt</div><div class="detail-value">#${a.attempt_no}</div></div>
      <div class="detail-cell"><div class="detail-label">Status</div><div class="detail-value">${statusBadge(a.status)}</div></div>
      <div class="detail-cell"><div class="detail-label">Score</div><div class="detail-value">${a.score_raw != null ? a.score_raw + '/' + a.score_total + ' (' + a.score_pct + '%)' : '—'}</div></div>
      <div class="detail-cell"><div class="detail-label">Grade</div><div class="detail-value">${a.grade_label || '—'}</div></div>
      <div class="detail-cell"><div class="detail-label">Pass/Fail</div><div class="detail-value">${passBadge(a.pass_fail)}</div></div>
      <div class="detail-cell"><div class="detail-label">Time</div><div class="detail-value">${fmtDuration(a.time_taken_s)}</div></div>
      <div class="detail-cell"><div class="detail-label">Started</div><div class="detail-value" style="font-size:12px">${fmtDate(a.started_at)}</div></div>
      <div class="detail-cell"><div class="detail-label">Submitted</div><div class="detail-value" style="font-size:12px">${fmtDate(a.submitted_at)}</div></div>
    </div>
    <div style="font-weight:900;margin-bottom:12px;font-size:14px">Questions (${result.questions.length})</div>
  `;

  result.questions.forEach(q => {
    const correctSet = new Set(q.correct_answer.split(',').map(s => s.trim()));
    const studentSet = new Set(q.student_answer || []);
    html += `<div class="q-review">
      <div class="q-review-hd">
        <div><span style="font-weight:900">Q${q.position}</span> <span class="kbd">${esc(q.question_type)}</span> <span style="font-size:12px;color:var(--muted)">${esc(q.topic)}</span></div>
        <div>${q.is_correct ? '<span class="badge badge-pass">CORRECT</span>' : '<span class="badge badge-fail">WRONG</span>'} <span style="font-size:12px;color:var(--muted)">${q.marks} mk</span></div>
      </div>
      <div class="q-review-bd">
        <div class="q-review-stem">${esc(q.stem)}</div>`;
    q.options.forEach(opt => {
      const isCorrect = correctSet.has(opt.letter);
      const isChosen = studentSet.has(opt.letter);
      let cls = '';
      if (isCorrect) cls = 'correct';
      else if (isChosen) cls = 'wrong';
      html += `<div class="q-review-opt ${cls}">
        <span style="font-weight:900;min-width:18px">${opt.letter}.</span>
        <span>${esc(opt.text)}</span>
        ${isCorrect ? ' <span style="margin-left:auto;font-size:11px;color:var(--ok)">✓ Correct</span>' : ''}
        ${isChosen && !isCorrect ? ' <span style="margin-left:auto;font-size:11px;color:var(--danger)">✗ Selected</span>' : ''}
      </div>`;
    });
    if (q.rationale) html += `<div class="q-review-rationale"><b>Rationale:</b> ${esc(q.rationale)}</div>`;
    if (q.rationale_img) html += `<div style="margin-top:8px"><img src="${esc(q.rationale_img)}" style="max-width:100%;border-radius:8px" /></div>`;
    html += `</div></div>`;
  });

  html += `<div style="margin-top:16px"><button class="btn sm" onclick="printAttempt()">🖨 Print Attempt</button></div>`;
  $('drawerBody').innerHTML = html;
}

// ── Item detail drawer ──────────────────────────────────────
async function openItemDetailDrawer(quizItemId) {
  if (!ITEMS_DATA) return;
  const item = ITEMS_DATA.items.find(i => i.quiz_item_id === quizItemId);
  if (!item) return;

  // Fetch the full snapshot for stem + options
  const { data: snap } = await db.from('teacher_quiz_items')
    .select('*')
    .eq('quiz_item_id', quizItemId)
    .maybeSingle();

  if (!snap) { showToast('Error', 'Item not found.', 'error'); return; }

  const correctSet = new Set((snap.snap_correct || '').split(',').map(s => s.trim()));
  const totalResp = item.attempts;

  let html = `
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-label">Position</div><div class="detail-value">#${item.position}</div></div>
      <div class="detail-cell"><div class="detail-label">Type</div><div class="detail-value">${esc(item.question_type)}</div></div>
      <div class="detail-cell"><div class="detail-label">Correct</div><div class="detail-value"><span class="badge badge-pass">${esc(item.correct_answer)}</span></div></div>
      <div class="detail-cell"><div class="detail-label">Attempts</div><div class="detail-value">${item.attempts}</div></div>
      <div class="detail-cell"><div class="detail-label">Accuracy</div><div class="detail-value" style="color:${item.pct_correct >= 70 ? 'var(--ok)' : item.pct_correct <= 30 ? 'var(--danger)' : 'var(--ink)'}">${item.pct_correct}%</div></div>
      <div class="detail-cell"><div class="detail-label">Wrong</div><div class="detail-value">${item.wrong_count}</div></div>
      <div class="detail-cell"><div class="detail-label">Blank</div><div class="detail-value">${item.blank_count}</div></div>
      <div class="detail-cell"><div class="detail-label">Marks</div><div class="detail-value">${item.marks}</div></div>
    </div>
    ${item.flags.length ? '<div style="margin-bottom:14px">' + item.flags.map(flagPill).join(' ') + '</div>' : ''}
    <div style="font-weight:900;margin-bottom:10px">Option Distribution</div>
  `;

  // Option bars
  const letters = ['A','B','C','D','E','F'];
  letters.forEach(l => {
    const text = snap['snap_option_' + l.toLowerCase()];
    if (!text) return;
    const count = item.option_counts[l] || 0;
    const pct = totalResp > 0 ? Math.round(count / totalResp * 100) : 0;
    const isCorrect = correctSet.has(l);
    html += `<div class="opt-bar-row">
      <div class="opt-bar-letter" style="${isCorrect ? 'color:var(--ok)' : ''}">${l}</div>
      <div class="opt-bar-track">
        <div class="opt-bar-fill ${isCorrect ? 'correct' : pct > 0 ? 'wrong' : 'neutral'}" style="width:${Math.max(pct, 2)}%">${pct > 10 ? pct + '%' : ''}</div>
      </div>
      <div class="opt-bar-count">${count}</div>
    </div>`;
  });

  // Full question
  html += `<div style="margin-top:20px;font-weight:900;margin-bottom:10px">Question</div>
    <div class="q-review"><div class="q-review-bd">
      <div class="q-review-stem">${esc(snap.snap_stem)}</div>`;
  letters.forEach(l => {
    const text = snap['snap_option_' + l.toLowerCase()];
    if (!text) return;
    html += `<div class="q-review-opt ${correctSet.has(l) ? 'correct' : ''}">
      <span style="font-weight:900;min-width:18px">${l}.</span> ${esc(text)}
      ${correctSet.has(l) ? '<span style="margin-left:auto;font-size:11px;color:var(--ok)">✓</span>' : ''}
    </div>`;
  });
  if (snap.snap_rationale) html += `<div class="q-review-rationale"><b>Rationale:</b> ${esc(snap.snap_rationale)}</div>`;
  if (snap.snap_rationale_img) html += `<div style="margin-top:8px"><img src="${esc(snap.snap_rationale_img)}" style="max-width:100%;border-radius:8px" /></div>`;
  html += `<div class="q-review-meta">Topic: ${esc(snap.snap_maintopic || '—')} / ${esc(snap.snap_subtopic || '—')} · Difficulty: ${esc(snap.snap_difficulty || '—')}</div>
    </div></div>`;

  openDrawer('Item #' + item.position + ' — Analysis', html);
}


// ================================================================
// CSV EXPORT
// ================================================================
function exportCsv() {
  if (!REPORT_DATA) return;
  const m = REPORT_DATA;
  const policy = m.score_display_policy;

  const headers = ['Name', 'Email', 'User ID'];
  (m.class_fields || []).forEach(f => headers.push(f.label || f.key));
  (m.quiz_fields || []).forEach(f => headers.push(f.label || f.key));
  headers.push('Status', 'Attempts');
  if (policy !== 'HIDE') {
    if (policy === 'RAW_AND_PCT' || policy === 'RAW_ONLY') headers.push('Score', 'Total');
    if (policy === 'RAW_AND_PCT' || policy === 'PCT_ONLY') headers.push('Percent');
  }
  headers.push('Pass/Fail', 'Grade', 'Submitted', 'Attempt ID');

  const csvRows = [headers.map(h => '"' + h.replace(/"/g,'""') + '"').join(',')];

  m.rows.forEach(r => {
    const cols = [r.display_name, r.email || '', r.user_id];
    (m.class_fields || []).forEach(f => cols.push(r.member_fields[f.key || f.label] || ''));
    (m.quiz_fields || []).forEach(f => cols.push(r.candidate_fields[f.key || f.label] || ''));
    cols.push(r.status, r.attempts_used);
    if (policy !== 'HIDE') {
      if (policy === 'RAW_AND_PCT' || policy === 'RAW_ONLY') cols.push(r.score_raw ?? '', r.score_total ?? '');
      if (policy === 'RAW_AND_PCT' || policy === 'PCT_ONLY') cols.push(r.score_pct ?? '');
    }
    cols.push(r.pass_fail || '', r.grade_label || '', r.submitted_at || '', r.headline_attempt_id || '');
    csvRows.push(cols.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(','));
  });

  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `results_${m.class_title}_${m.quiz_title}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported', `${m.rows.length} rows exported to CSV.`, 'ok');
}

  if (!REPORT_DATA || !SUMMARY_DATA) return;
  const m = REPORT_DATA;
  const s = SUMMARY_DATA;

  let html = `<div class="print-header">
    <div class="print-title">${esc(m.quiz_title)} — ${esc(m.class_title)}</div>
    <div class="print-meta">Generated: ${new Date().toLocaleString()} · Headline: ${esc(s.headline_rule)} · Roster: ${s.roster_total} · Submitted: ${s.submitted_count} · Avg: ${s.avg_pct ?? '—'}% · Pass Rate: ${s.pass_rate_pct ?? '—'}%</div>

function printAttempt() {

    <div class="print-meta">Generated: ${new Date().toLocaleString()}</div>
  </div>` + $('drawerBody').innerHTML;

// ================================================================
// EVENT BINDING
// ================================================================
function bindEvents() {
  $('scopeClass').addEventListener('change', onClassChange);
  $('scopeQuiz').addEventListener('change', onQuizChange);
  $('btnLoad').addEventListener('click', loadReport);
  $('btnRefresh').addEventListener('click', loadReport);
  $('btnExportCsv').addEventListener('click', exportCsv);
  $('btnPrintSummary').addEventListener('click', printSummary);

  // Tabs
  document.querySelectorAll('.rtab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rtab').forEach(b => b.classList.toggle('active', b === btn));
      document.querySelectorAll('.rpane').forEach(p => p.classList.toggle('active', p.id === 'pane' + btn.dataset.rtab.charAt(0).toUpperCase() + btn.dataset.rtab.slice(1)));
      if (btn.dataset.rtab === 'items') loadItemAnalysis();
    });
  });

  // Marksheet search
  let msTimer = null;
  $('marksheetSearch').addEventListener('input', () => { clearTimeout(msTimer); msTimer = setTimeout(renderMarksheet, 250); });

  // Item search
  let isTimer = null;
  $('itemSearch').addEventListener('input', () => { clearTimeout(isTimer); isTimer = setTimeout(renderItemAnalysis, 250); });
  $('btnRefreshItems').addEventListener('click', () => { ITEMS_DATA = null; loadItemAnalysis(); });

  // Drawer
  $('drawerClose').addEventListener('click', closeDrawer);
  $('drawerOverlay').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
}
