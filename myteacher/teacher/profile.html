<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile — QAcademy Teacher</title>
<link rel="stylesheet" href="/css/style.css" />
<style>

/* ── Layout ──────────────────────────────────────────── */
.page-wrap {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg, #f8fafc);
}
.main-content {
  flex: 1;
  min-width: 0;
  padding: 24px 20px 40px;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}

/* ── Page header ─────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.page-header h1 { font-size: 22px; font-weight: 800; color: var(--primary); margin: 0 0 4px; }
.page-header p  { font-size: 14px; color: var(--text-muted); margin: 0; }

/* ── Panel ────────────────────────────────────────────── */
.panel {
  background: var(--white, #fff);
  border: 1px solid var(--border, #e2e8f0);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(30,58,95,0.06);
  margin-bottom: 20px;
}
.panel-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border, #e2e8f0);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.panel-head h2 { font-size: 14px; font-weight: 700; color: var(--primary); margin: 0; }
.panel-body { padding: 20px 16px; }

/* ── Avatar ───────────────────────────────────────────── */
.avatar-wrap {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
}
.avatar-img {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--border, #e2e8f0);
  background: var(--bg, #f4f6f8);
}
.avatar-initials {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  background: var(--primary, #1e3a5f);
  border: 3px solid var(--border, #e2e8f0);
}
.avatar-upload { display: none; }
.avatar-wrap.editing .avatar-upload { display: inline-flex; }
.avatar-upload label {
  cursor: pointer;
  font-size: 12px;
  color: var(--accent, #2d7d72);
  font-weight: 600;
  text-decoration: underline;
}
.avatar-upload input[type="file"] { display: none; }
.avatar-info { flex: 1; }
.avatar-name { font-size: 18px; font-weight: 700; color: var(--primary); }
.avatar-role { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* ── Logo (org section) ──────────────────────────────── */
.logo-preview {
  width: 100px; height: 100px;
  border-radius: 12px;
  object-fit: contain;
  border: 1px solid var(--border, #e2e8f0);
  background: var(--bg, #f4f6f8);
}
.logo-placeholder {
  width: 100px; height: 100px;
  border-radius: 12px;
  border: 2px dashed var(--border, #e2e8f0);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text-muted);
  background: var(--bg, #f4f6f8);
}
.logo-wrap {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 16px;
}
.logo-upload { display: none; }
.logo-wrap.editing .logo-upload { display: inline-flex; }
.logo-upload label {
  cursor: pointer;
  font-size: 12px;
  color: var(--accent, #2d7d72);
  font-weight: 600;
  text-decoration: underline;
}
.logo-upload input[type="file"] { display: none; }

/* ── Profile fields ──────────────────────────────────── */
.profile-row {
  display: flex;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  gap: 12px;
}
.profile-row:last-child { border-bottom: none; }
.profile-label {
  width: 130px;
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
}
.profile-value {
  flex: 1;
  font-size: 14px;
  color: var(--text, #1a2332);
  word-break: break-word;
}
.profile-input {
  display: none;
  flex: 1;
}
.profile-input input,
.profile-input textarea {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border, #e2e8f0);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text, #1a2332);
  background: #fff;
}
.profile-input textarea {
  resize: vertical;
  min-height: 60px;
}

/* Editing state */
.panel.editing .profile-value { display: none; }
.panel.editing .profile-input { display: flex; }

/* ── Badges ──────────────────────────────────────────── */
.badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-ok { background: rgba(45,125,114,0.12); color: #1a6b60; }
.badge-warn { background: rgba(234,179,8,0.15); color: #92400e; }
.badge-muted { background: rgba(0,0,0,0.06); color: var(--text-muted); }

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border, #e2e8f0);
  background: #fff;
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg, #f4f6f8); }
.btn-primary {
  background: var(--primary, #1e3a5f);
  color: #fff;
  border-color: var(--primary, #1e3a5f);
}
.btn-primary:hover { background: var(--primary-dark, #142d4c); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-ghost { background: transparent; border: none; }
.btn-ghost:hover { background: rgba(0,0,0,0.04); }

/* ── Edit / Save bar ─────────────────────────────────── */
.edit-btn { cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 6px; }
.edit-btn:hover { background: rgba(0,0,0,0.05); }
.save-bar {
  display: none;
  gap: 8px;
  padding: 12px 16px 0;
  justify-content: flex-end;
}
.panel.editing .save-bar { display: flex; }
.panel.editing .edit-btn { display: none; }

/* ── Toast ────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  background: #fff; border: 1px solid var(--border, #e2e8f0);
  border-radius: 12px; padding: 12px 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  min-width: 240px; max-width: 360px; display: none;
  transition: opacity 0.2s;
}
.toast.show   { display: block; }
.toast.ok     { border-color: rgba(45,125,114,0.3); }
.toast.error  { border-color: rgba(220,38,38,0.3); }
.toast-title  { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
.toast-msg    { font-size: 12px; color: var(--text-muted); }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 600px) {
  .main-content { padding: 16px 12px 32px; }
  .profile-row { flex-direction: column; gap: 2px; }
  .profile-label { width: auto; }
  .avatar-wrap { gap: 14px; }
  .avatar-img, .avatar-initials { width: 64px; height: 64px; font-size: 22px; }
  .logo-preview, .logo-placeholder { width: 72px; height: 72px; }
}

</style>
</head>
<body>
<div class="page-wrap">
<div id="myteacher-nav"></div>

<main class="main-content">
  <div class="page-header">
    <div>
      <h1>My Profile</h1>
      <p>Manage your account and organisation details</p>
    </div>
  </div>

  <!-- ── QAcademy Account ──────────────────────────────── -->
  <div class="panel" id="accountPanel">
    <div class="panel-head">
      <h2>QAcademy Account</h2>
      <span class="edit-btn" id="accountEditBtn" title="Edit">&#9998;</span>
    </div>
    <div class="panel-body">
      <div class="avatar-wrap" id="avatarWrap">
        <div id="avatarContainer"></div>
        <div class="avatar-info">
          <div class="avatar-name" id="dispName">—</div>
          <div class="avatar-role" id="dispRole">Teacher</div>
        </div>
        <div class="avatar-upload">
          <label for="avatarInput">Change photo</label>
          <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp" />
        </div>
      </div>

      <div class="profile-row">
        <div class="profile-label">Display Name</div>
        <div class="profile-value" id="valName">—</div>
        <div class="profile-input"><input type="text" id="inpName" /></div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Email</div>
        <div class="profile-value" id="valEmail">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Phone</div>
        <div class="profile-value" id="valPhone">—</div>
        <div class="profile-input"><input type="tel" id="inpPhone" /></div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Plan</div>
        <div class="profile-value" id="valPlan">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Status</div>
        <div class="profile-value" id="valStatus">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Member Since</div>
        <div class="profile-value" id="valSince">—</div>
      </div>
    </div>
    <div class="save-bar" id="accountSaveBar">
      <button class="btn" id="accountCancel">Cancel</button>
      <button class="btn btn-primary" id="accountSave">Save Changes</button>
    </div>
  </div>

  <!-- ── Organisation ──────────────────────────────────── -->
  <div class="panel" id="orgPanel">
    <div class="panel-head">
      <h2>Organisation</h2>
      <span class="edit-btn" id="orgEditBtn" title="Edit">&#9998;</span>
    </div>
    <div class="panel-body">
      <div class="logo-wrap" id="logoWrap">
        <div id="logoContainer"></div>
        <div class="logo-upload">
          <label for="logoInput">Change logo</label>
          <input type="file" id="logoInput" accept="image/jpeg,image/png,image/webp" />
        </div>
      </div>

      <div class="profile-row">
        <div class="profile-label">Organisation</div>
        <div class="profile-value" id="valOrg">—</div>
        <div class="profile-input"><input type="text" id="inpOrg" /></div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Tagline / Bio</div>
        <div class="profile-value" id="valTagline">—</div>
        <div class="profile-input"><textarea id="inpTagline" rows="2"></textarea></div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Region</div>
        <div class="profile-value" id="valRegion">—</div>
        <div class="profile-input"><input type="text" id="inpRegion" /></div>
      </div>
    </div>
    <div class="save-bar" id="orgSaveBar">
      <button class="btn" id="orgCancel">Cancel</button>
      <button class="btn btn-primary" id="orgSave">Save Changes</button>
    </div>
  </div>

</main>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-msg"   id="toastMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/teacher-api.js"></script>
<script src="/js/myteacher-teacher-nav.js"></script>
<script>

  // ── State ──────────────────────────────────────────────
  let PROFILE     = null;   // from guard (users row)
  let teacherData = null;   // from teacher_profiles
  let toastTimer  = null;
  let pendingAvatarFile = null;
  let pendingLogoFile   = null;

  const byId = id => document.getElementById(id);

  // ── Boot ───────────────────────────────────────────────
  async function boot() {
    PROFILE = await guardPage('TEACHER');
    if (!PROFILE) return;
    if (typeof mtSetUser === 'function') mtSetUser(PROFILE);

    teacherData = await getTeacherFullProfile(PROFILE.user_id);
    if (!teacherData) {
      showToast('Error', 'Could not load teacher profile.', 'error');
      return;
    }

    renderAccount();
    renderOrg();
    bindEvents();
  }

  // ── Render: Account ────────────────────────────────────
  function renderAccount() {
    const name = teacherData.display_name || PROFILE.name || '—';
    byId('dispName').textContent = name;

    // Avatar
    renderAvatar(teacherData.avatar_url, name);

    byId('valName').textContent  = name;
    byId('valEmail').textContent = PROFILE.email || '—';
    byId('valPhone').textContent = teacherData.phone_number || '—';

    // Plan badge
    const plan = teacherData.plan_type || 'FREE';
    byId('valPlan').innerHTML = `<span class="badge ${plan === 'PRO' ? 'badge-ok' : 'badge-muted'}">${plan}</span>`;

    // Status badge
    const active = teacherData.active;
    byId('valStatus').innerHTML = `<span class="badge ${active ? 'badge-ok' : 'badge-warn'}">${active ? 'Active' : 'Inactive'}</span>`;

    // Member since
    byId('valSince').textContent = teacherData.created_at ? new Date(teacherData.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';

    // Fill edit inputs
    byId('inpName').value  = teacherData.display_name || '';
    byId('inpPhone').value = teacherData.phone_number || '';
  }

  function renderAvatar(url, name) {
    const container = byId('avatarContainer');
    if (url) {
      container.innerHTML = `<img class="avatar-img" src="${url}" alt="Profile" />`;
    } else {
      const initials = (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      container.innerHTML = `<div class="avatar-initials">${initials}</div>`;
    }
  }

  // ── Render: Organisation ───────────────────────────────
  function renderOrg() {
    // Logo
    renderLogo(teacherData.org_logo_url);

    byId('valOrg').textContent     = teacherData.organisation || '—';
    byId('valTagline').textContent  = teacherData.org_tagline  || '—';
    byId('valRegion').textContent   = teacherData.org_region   || '—';

    // Fill edit inputs
    byId('inpOrg').value     = teacherData.organisation || '';
    byId('inpTagline').value = teacherData.org_tagline  || '';
    byId('inpRegion').value  = teacherData.org_region   || '';
  }

  function renderLogo(url) {
    const container = byId('logoContainer');
    if (url) {
      container.innerHTML = `<img class="logo-preview" src="${url}" alt="Logo" />`;
    } else {
      container.innerHTML = `<div class="logo-placeholder">No logo</div>`;
    }
  }

  // ── Edit toggles ───────────────────────────────────────
  function enterEdit(panelId) {
    const panel = byId(panelId);
    panel.classList.add('editing');
    if (panelId === 'accountPanel') byId('avatarWrap').classList.add('editing');
    if (panelId === 'orgPanel') byId('logoWrap').classList.add('editing');
  }

  function cancelEdit(panelId) {
    const panel = byId(panelId);
    panel.classList.remove('editing');
    if (panelId === 'accountPanel') {
      byId('avatarWrap').classList.remove('editing');
      pendingAvatarFile = null;
      renderAccount();
    }
    if (panelId === 'orgPanel') {
      byId('logoWrap').classList.remove('editing');
      pendingLogoFile = null;
      renderOrg();
    }
  }

  // ── Save: Account ──────────────────────────────────────
  async function saveAccount() {
    const btn = byId('accountSave');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      let avatarUrl = teacherData.avatar_url;
      if (pendingAvatarFile) {
        avatarUrl = await uploadProfileImage(PROFILE.user_id, pendingAvatarFile, 'teacher');
        if (!avatarUrl) {
          showToast('Upload failed', 'Profile image must be JPG, PNG, or WebP under 2 MB.', 'error');
          return;
        }
      }

      const newName  = byId('inpName').value.trim();
      const newPhone = byId('inpPhone').value.trim();

      if (!newName) {
        showToast('Validation', 'Display name is required.', 'error');
        return;
      }

      const res = await updateTeacherProfile(PROFILE.user_id, {
        display_name: newName,
        phone_number: newPhone,
        avatar_url:   avatarUrl
      });

      if (!res.success) {
        showToast('Error', res.message, 'error');
        return;
      }

      // Sync name + avatar to users table
      const userSync = { name: newName, avatar_url: avatarUrl };
      await updateUserProfile(PROFILE.user_id, userSync);
      PROFILE.name = newName;
      PROFILE.avatar_url = avatarUrl;

      // Update local state
      teacherData.display_name = newName;
      teacherData.phone_number = newPhone;
      teacherData.avatar_url   = avatarUrl;
      pendingAvatarFile = null;

      byId('accountPanel').classList.remove('editing');
      byId('avatarWrap').classList.remove('editing');
      renderAccount();
      showToast('Saved', 'Account details updated.', 'ok');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  }

  // ── Save: Organisation ─────────────────────────────────
  async function saveOrg() {
    const btn = byId('orgSave');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      let logoUrl = teacherData.org_logo_url;
      if (pendingLogoFile) {
        logoUrl = await uploadProfileImage(PROFILE.user_id, pendingLogoFile, 'org');
        if (!logoUrl) {
          showToast('Upload failed', 'Logo must be JPG, PNG, or WebP under 2 MB.', 'error');
          return;
        }
      }

      const newOrg     = byId('inpOrg').value.trim();
      const newTagline = byId('inpTagline').value.trim();
      const newRegion  = byId('inpRegion').value.trim();

      const res = await updateTeacherProfile(PROFILE.user_id, {
        organisation:  newOrg,
        org_tagline:   newTagline,
        org_region:    newRegion,
        org_logo_url:  logoUrl
      });

      if (!res.success) {
        showToast('Error', res.message, 'error');
        return;
      }

      // Update local state
      teacherData.organisation  = newOrg;
      teacherData.org_tagline   = newTagline;
      teacherData.org_region    = newRegion;
      teacherData.org_logo_url  = logoUrl;
      pendingLogoFile = null;

      byId('orgPanel').classList.remove('editing');
      byId('logoWrap').classList.remove('editing');
      renderOrg();
      showToast('Saved', 'Organisation details updated.', 'ok');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  }

  // ── File handlers ──────────────────────────────────────
  function onAvatarSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      showToast('Too large', 'Image must be under 2 MB.', 'error');
      return;
    }
    pendingAvatarFile = file;
    const reader = new FileReader();
    reader.onload = () => {
      byId('avatarContainer').innerHTML = `<img class="avatar-img" src="${reader.result}" alt="Preview" />`;
    };
    reader.readAsDataURL(file);
  }

  function onLogoSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      showToast('Too large', 'Image must be under 2 MB.', 'error');
      return;
    }
    pendingLogoFile = file;
    const reader = new FileReader();
    reader.onload = () => {
      byId('logoContainer').innerHTML = `<img class="logo-preview" src="${reader.result}" alt="Preview" />`;
    };
    reader.readAsDataURL(file);
  }

  // ── Toast ──────────────────────────────────────────────
  function showToast(title, msg, type) {
    byId('toastTitle').textContent = title || '';
    byId('toastMsg').textContent   = msg   || '';
    const el = byId('toast');
    el.className = 'toast show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
  }

  // ── Bind events ────────────────────────────────────────
  function bindEvents() {
    byId('accountEditBtn').addEventListener('click', () => enterEdit('accountPanel'));
    byId('accountCancel').addEventListener('click',  () => cancelEdit('accountPanel'));
    byId('accountSave').addEventListener('click',    saveAccount);

    byId('orgEditBtn').addEventListener('click', () => enterEdit('orgPanel'));
    byId('orgCancel').addEventListener('click',  () => cancelEdit('orgPanel'));
    byId('orgSave').addEventListener('click',    saveOrg);

    byId('avatarInput').addEventListener('change', onAvatarSelected);
    byId('logoInput').addEventListener('change',   onLogoSelected);
  }

  // ── Run ────────────────────────────────────────────────
  boot();

</script>
</body>
</html>
