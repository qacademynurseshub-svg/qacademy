<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Academic Structure — QAcademy Teacher</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>

    /* ── Layout ──────────────────────────────────────────── */
    .page-wrap {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg, #f8fafc);
    }
    .main-content {
      flex: 1;
      min-width: 0;
      padding: 24px 20px 40px;
    }

    /* ── Page header ─────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .page-header h1 { font-size: 22px; font-weight: 800; color: var(--primary); margin: 0 0 4px; }
    .page-header p  { font-size: 14px; color: var(--text-muted); margin: 0; }

    /* ── Three-column grid ───────────────────────────────── */
    .structure-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 1024px) {
      .structure-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .structure-grid { grid-template-columns: 1fr; }
    }

    /* ── Panel shell (matches classes.html) ───────────────── */
    .panel {
      background: var(--white, #fff);
      border: 1px solid var(--border, #e2e8f0);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(30,58,95,0.06);
    }
    .panel-body { padding: 14px 16px; }

  </style>
</head>
<body>

<div class="page-wrap">
  <!-- Nav -->
  <div id="myteacher-nav"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Academic Structure</h1>
        <p id="pageSubtitle">Manage your programmes, cohorts, and courses</p>
      </div>
    </div>

    <div class="structure-grid">
      <!-- Programmes panel -->
      <div class="panel">
        <div class="panel-body" id="programmesContainer"></div>
      </div>

      <!-- Cohorts panel -->
      <div class="panel">
        <div class="panel-body" id="cohortsContainer"></div>
      </div>

      <!-- Courses panel — Slice 12 (live) -->
      <div class="panel">
        <div class="panel-body" id="coursesContainer"></div>
      </div>
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-msg"   id="toastMsg"></div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/myteacher-api.js"></script>
<script src="/js/paths.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/myteacher-teacher-nav.js"></script>
<script src="/myteacher/teacher/components/programmes-panel.js"></script>
<script src="/myteacher/teacher/components/cohorts-panel.js"></script>
<script src="/myteacher/teacher/components/courses-panel.js"></script>
<script>

  async function boot() {
    const profile = await guardPage('TEACHER');
    if (!profile) return;

    if (typeof mtSetUser === 'function') mtSetUser(profile);

    // Initialise all three panels
    initProgrammesPanel('programmesContainer', profile.user_id);
    initCohortsPanel('cohortsContainer', profile.user_id);
    initCoursesPanel('coursesContainer', profile.user_id);
  }

  boot();

</script>
</body>
</html>
