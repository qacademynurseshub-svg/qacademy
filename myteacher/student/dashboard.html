<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — My Teacher</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .mt-page { max-width: 1000px; margin: 0 auto; padding: 32px 20px; }

    .mt-welcome { margin-bottom: 28px; }
    .mt-welcome h1 {
      font-size: 24px; font-weight: 800;
      color: var(--primary); margin: 0 0 6px;
    }
    .mt-welcome p { font-size: 14px; color: var(--text-muted); margin: 0; }

    /* ── Stats ── */
    .mt-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .mt-stat {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .mt-stat-label {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .mt-stat-value { font-size: 28px; font-weight: 800; color: var(--primary); }
    .mt-stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── Quick links ── */
    .mt-quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .mt-quick-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-decoration: none;
      display: flex; align-items: center; gap: 14px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .mt-quick-card:hover {
      box-shadow: 0 4px 20px rgba(30,58,95,0.10);
      transform: translateY(-1px);
    }
    .mt-quick-icon { font-size: 28px; flex-shrink: 0; }
    .mt-quick-label { font-size: 14px; font-weight: 700; color: var(--primary); }
    .mt-quick-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    .mt-placeholder {
      background: var(--white);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px; text-align: center;
      color: var(--text-muted); font-size: 14px;
    }

    @media (max-width: 700px) {
      .mt-stats { grid-template-columns: 1fr; }
      .mt-quick-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<div id="myteacher-nav"></div>

<div class="mt-page">

  <!-- Welcome -->
  <div class="mt-welcome">
    <h1 id="welcomeMsg">Welcome back</h1>
    <p>Your teacher-assigned classes and quizzes are shown here.</p>
  </div>

  <!-- Stats -->
  <div class="mt-stats">
    <div class="mt-stat">
      <div class="mt-stat-label">Classes</div>
      <div class="mt-stat-value" id="statClasses">—</div>
      <div class="mt-stat-sub">Joined</div>
    </div>
    <div class="mt-stat">
      <div class="mt-stat-label">Quizzes</div>
      <div class="mt-stat-value" id="statQuizzes">—</div>
      <div class="mt-stat-sub">Assigned to you</div>
    </div>
    <div class="mt-stat">
      <div class="mt-stat-label">Attempts</div>
      <div class="mt-stat-value" id="statAttempts">—</div>
      <div class="mt-stat-sub">Submitted</div>
    </div>
  </div>

  <!-- Quick links -->
  <div class="mt-quick-grid">
    <a href="/myteacher/student/my-classes.html" class="mt-quick-card">
      <div class="mt-quick-icon">👥</div>
      <div>
        <div class="mt-quick-label">My Classes</div>
        <div class="mt-quick-sub">View your classes and assigned quizzes</div>
      </div>
    </a>
    <a href="/myteacher/student/my-results.html" class="mt-quick-card">
      <div class="mt-quick-icon">📊</div>
      <div>
        <div class="mt-quick-label">My Results</div>
        <div class="mt-quick-sub">View scores and feedback when released</div>
      </div>
    </a>
  </div>

  <!-- Recent activity placeholder -->
  <div class="mt-placeholder">
    Your recent quiz activity will appear here.
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/myteacher-student-nav.js"></script>
<script src="/js/teacher-api.js"></script>
<script>
  async function initPage() {
    const profile = await guardPage('STUDENT');
    if (!profile) return;

    const name = profile.forename || profile.name || 'there';
    document.getElementById('welcomeMsg').textContent = `Welcome back, ${name}`;
    mtSetUser(profile);

    // Stats — to be wired when teacher-api.js functions exist
  }

  initPage();
</script>
</body>
</html>
