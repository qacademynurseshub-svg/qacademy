<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Profile — QAcademy Teacher Assess</title>
<link rel="stylesheet" href="/css/style.css" />
<style>

/* ── Layout ──────────────────────────────────────────── */
.page-wrap {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--bg, #f8fafc);
}
.main-content {
  flex: 1;
  padding: 24px 20px 40px;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}

/* ── Page header ─────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.page-header h1 { font-size: 22px; font-weight: 800; color: var(--primary); margin: 0 0 4px; }
.page-header p  { font-size: 14px; color: var(--text-muted); margin: 0; }

/* ── Panel ────────────────────────────────────────────── */
.panel {
  background: var(--white, #fff);
  border: 1px solid var(--border, #e2e8f0);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(30,58,95,0.06);
  margin-bottom: 20px;
}
.panel-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border, #e2e8f0);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.panel-head h2 { font-size: 14px; font-weight: 700; color: var(--primary); margin: 0; }
.panel-body { padding: 20px 16px; }

/* ── Avatar ───────────────────────────────────────────── */
.avatar-wrap {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 20px;
}
.avatar-img {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--border, #e2e8f0);
  background: var(--bg, #f4f6f8);
}
.avatar-initials {
  width: 80px; height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  background: var(--primary, #1e3a5f);
  border: 3px solid var(--border, #e2e8f0);
}
.avatar-upload { display: none; }
.avatar-wrap.editing .avatar-upload { display: inline-flex; }
.avatar-upload label {
  cursor: pointer;
  font-size: 12px;
  color: var(--accent, #2d7d72);
  font-weight: 600;
  text-decoration: underline;
}
.avatar-upload input[type="file"] { display: none; }
.avatar-info { flex: 1; }
.avatar-name { font-size: 18px; font-weight: 700; color: var(--primary); }
.avatar-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* ── Profile fields ──────────────────────────────────── */
.profile-row {
  display: flex;
  align-items: baseline;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  gap: 12px;
}
.profile-row:last-child { border-bottom: none; }
.profile-label {
  width: 130px;
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
}
.profile-value {
  flex: 1;
  font-size: 14px;
  color: var(--text, #1a2332);
  word-break: break-word;
}
.profile-input {
  display: none;
  flex: 1;
}
.profile-input input,
.profile-input select {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border, #e2e8f0);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text, #1a2332);
  background: #fff;
}

/* Editing state */
.panel.editing .profile-value { display: none; }
.panel.editing .profile-input { display: flex; }

/* ── Edit / Save bar ─────────────────────────────────── */
.edit-btn { cursor: pointer; font-size: 14px; padding: 4px 8px; border-radius: 6px; }
.edit-btn:hover { background: rgba(0,0,0,0.05); }
.save-bar {
  display: none;
  gap: 8px;
  padding: 12px 16px 0;
  justify-content: flex-end;
}
.panel.editing .save-bar { display: flex; }
.panel.editing .edit-btn { display: none; }

/* ── Badges ──────────────────────────────────────────── */
.badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-ok { background: rgba(45,125,114,0.12); color: #1a6b60; }
.badge-warn { background: rgba(234,179,8,0.15); color: #92400e; }
.badge-muted { background: rgba(0,0,0,0.06); color: var(--text-muted); }

/* ── Class cards ─────────────────────────────────────── */
.class-card {
  border: 1px solid var(--border, #e2e8f0);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 14px;
}
.class-card:last-child { margin-bottom: 0; }
.class-card-head {
  padding: 12px 14px;
  background: var(--bg, #f4f6f8);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
}
.class-card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
}
.class-card-teacher {
  font-size: 12px;
  color: var(--text-muted);
}
.class-card-body {
  padding: 12px 14px;
}
.class-card-empty {
  font-size: 13px;
  color: var(--text-muted);
  font-style: italic;
}

/* ── Field form (editable custom fields) ─────────────── */
.field-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.field-row:last-child { margin-bottom: 0; }
.field-label {
  width: 130px;
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
}
.field-label .req { color: #dc2626; }
.field-input {
  flex: 1;
}
.field-input input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--border, #e2e8f0);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text, #1a2332);
  background: #fff;
}

/* ── Buttons ─────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid var(--border, #e2e8f0);
  background: #fff;
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg, #f4f6f8); }
.btn-primary {
  background: var(--primary, #1e3a5f);
  color: #fff;
  border-color: var(--primary, #1e3a5f);
}
.btn-primary:hover { background: var(--primary-dark, #142d4c); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

.class-save-bar {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 10px;
}

/* ── Completeness indicator ──────────────────────────── */
.completeness {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
}
.completeness-full { background: rgba(45,125,114,0.12); color: #1a6b60; }
.completeness-partial { background: rgba(234,179,8,0.15); color: #92400e; }

/* ── Empty state ─────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
}
.empty-state p { font-size: 14px; margin: 0 0 12px; }

/* ── Toast ────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  background: #fff; border: 1px solid var(--border, #e2e8f0);
  border-radius: 12px; padding: 12px 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  min-width: 240px; max-width: 360px; display: none;
  transition: opacity 0.2s;
}
.toast.show   { display: block; }
.toast.ok     { border-color: rgba(45,125,114,0.3); }
.toast.error  { border-color: rgba(220,38,38,0.3); }
.toast-title  { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 2px; }
.toast-msg    { font-size: 12px; color: var(--text-muted); }

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 600px) {
  .main-content { padding: 16px 12px 32px; }
  .profile-row, .field-row { flex-direction: column; gap: 2px; }
  .profile-label, .field-label { width: auto; }
  .avatar-wrap { gap: 14px; }
  .avatar-img, .avatar-initials { width: 64px; height: 64px; font-size: 22px; }
}

</style>
</head>
<body>
<div class="page-wrap">
<div id="myteacher-nav"></div>

<main class="main-content">

  <div class="page-header">
    <div>
      <h1>My Profile</h1>
      <p id="pageSubtitle">Your Teacher Assess profile and class memberships</p>
    </div>
  </div>

  <!-- ── Personal Details ──────────────────────────────── -->
  <div class="panel" id="personalPanel">
    <div class="panel-head">
      <h2>Personal Details</h2>
      <span class="edit-btn" id="personalEditBtn" title="Edit">&#9998;</span>
    </div>
    <div class="panel-body">
      <div class="avatar-wrap" id="avatarWrap">
        <div id="avatarContainer"></div>
        <div class="avatar-info">
          <div class="avatar-name" id="dispName">—</div>
          <div class="avatar-sub" id="dispEmail">—</div>
        </div>
        <div class="avatar-upload">
          <label for="avatarInput">Change photo</label>
          <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp" />
        </div>
      </div>

      <div class="profile-row">
        <div class="profile-label">First Name</div>
        <div class="profile-value" id="valForename">—</div>
        <div class="profile-input"><input type="text" id="inpForename" /></div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Last Name</div>
        <div class="profile-value" id="valSurname">—</div>
        <div class="profile-input"><input type="text" id="inpSurname" /></div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Email</div>
        <div class="profile-value" id="valEmail">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Phone</div>
        <div class="profile-value" id="valPhone">—</div>
        <div class="profile-input"><input type="tel" id="inpPhone" /></div>
      </div>
    </div>
    <div class="save-bar">
      <button class="btn" id="personalCancel">Cancel</button>
      <button class="btn btn-primary" id="personalSave">Save Changes</button>
    </div>
  </div>

  <!-- ── Academic Details ──────────────────────────────── -->
  <div class="panel" id="academicPanel">
    <div class="panel-head">
      <h2>Academic Details</h2>
      <span class="edit-btn" id="academicEditBtn" title="Edit">&#9998;</span>
    </div>
    <div class="panel-body">
      <div class="profile-row">
        <div class="profile-label">Programme</div>
        <div class="profile-value" id="valProgramme">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Level</div>
        <div class="profile-value" id="valLevel">—</div>
        <div class="profile-input">
          <select id="inpLevel">
            <option value="">— Select —</option>
            <option value="L100">L100</option>
            <option value="L200">L200</option>
            <option value="L300">L300</option>
            <option value="L400">L400</option>
          </select>
        </div>
      </div>
      <div class="profile-row">
        <div class="profile-label">Cohort</div>
        <div class="profile-value" id="valCohort">—</div>
        <div class="profile-input"><input type="text" id="inpCohort" placeholder="e.g. 2024" /></div>
      </div>
    </div>
    <div class="save-bar">
      <button class="btn" id="academicCancel">Cancel</button>
      <button class="btn btn-primary" id="academicSave">Save Changes</button>
    </div>
  </div>

  <!-- ── My Classes ────────────────────────────────────── -->
  <div class="panel" id="classesPanel">
    <div class="panel-head">
      <h2>My Classes</h2>
      <span id="overallCompleteness"></span>
    </div>
    <div class="panel-body" id="classesBody">
      <div class="empty-state" id="emptyState">
        <p>You haven't joined any classes yet.</p>
        <a href="/myteacher/student/my-classes.html" class="btn btn-primary btn-sm">Join a Class</a>
      </div>
    </div>
  </div>

</main>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-msg"   id="toastMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/teacher-api.js"></script>
<script src="/js/api.js"></script>
<script src="/js/myteacher-student-nav.js"></script>
<script>

  // ── State ──────────────────────────────────────────────
  let PROFILE      = null;
  let fullUser     = null;
  let programs     = [];
  let memberships  = [];   // from getStudentClasses
  let teacherNames = {};   // { teacher_id: name }
  let toastTimer   = null;
  let pendingAvatarFile = null;

  const byId = id => document.getElementById(id);

  // ── Boot ───────────────────────────────────────────────
  async function boot() {
    PROFILE = await guardPage('STUDENT');
    if (!PROFILE) return;
    if (typeof mtSetUser === 'function') mtSetUser(PROFILE);

    const [userData, programData] = await Promise.all([
      getUserById(PROFILE.user_id),
      getPrograms()
    ]);

    fullUser = userData || PROFILE;
    programs = programData;

    renderPersonal();
    renderAcademic();
    bindAccountEvents();
    await loadClasses();
  }

  // ── Render: Personal ──────────────────────────────────
  function renderPersonal() {
    const name = (fullUser.forename || '') + ' ' + (fullUser.surname || '');
    byId('dispName').textContent  = name.trim() || fullUser.name || '—';
    byId('dispEmail').textContent = fullUser.email || '—';

    renderAvatar(fullUser.avatar_url, name.trim() || fullUser.name);

    byId('valForename').textContent = fullUser.forename     || '—';
    byId('valSurname').textContent  = fullUser.surname      || '—';
    byId('valEmail').textContent    = fullUser.email         || '—';
    byId('valPhone').textContent    = fullUser.phone_number  || '—';

    byId('inpForename').value = fullUser.forename     || '';
    byId('inpSurname').value  = fullUser.surname      || '';
    byId('inpPhone').value    = fullUser.phone_number  || '';
  }

  function renderAvatar(url, name) {
    const container = byId('avatarContainer');
    if (url) {
      container.innerHTML = `<img class="avatar-img" src="${url}" alt="Profile" />`;
    } else {
      const initials = (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
      container.innerHTML = `<div class="avatar-initials">${initials}</div>`;
    }
  }

  // ── Render: Academic ──────────────────────────────────
  function renderAcademic() {
    const prog = programs.find(p => p.program_id === fullUser.program_id);
    byId('valProgramme').textContent = prog ? prog.program_name : (fullUser.program_id || '—');
    byId('valLevel').textContent     = fullUser.level  || '—';
    byId('valCohort').textContent    = fullUser.cohort || '—';

    byId('inpLevel').value  = fullUser.level  || '';
    byId('inpCohort').value = fullUser.cohort || '';
  }

  // ── Edit toggles ──────────────────────────────────────
  function enterEdit(panelId) {
    byId(panelId).classList.add('editing');
    if (panelId === 'personalPanel') byId('avatarWrap').classList.add('editing');
  }

  function cancelEdit(panelId) {
    byId(panelId).classList.remove('editing');
    if (panelId === 'personalPanel') {
      byId('avatarWrap').classList.remove('editing');
      pendingAvatarFile = null;
      renderPersonal();
    }
    if (panelId === 'academicPanel') renderAcademic();
  }

  // ── Save: Personal ────────────────────────────────────
  async function savePersonal() {
    const btn = byId('personalSave');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      let avatarUrl = fullUser.avatar_url;
      if (pendingAvatarFile) {
        avatarUrl = await uploadProfileImage(PROFILE.user_id, pendingAvatarFile, 'student');
        if (!avatarUrl) {
          showToast('Upload failed', 'Image must be JPG, PNG, or WebP under 2 MB.', 'error');
          return;
        }
      }

      const forename     = byId('inpForename').value.trim();
      const surname      = byId('inpSurname').value.trim();
      const phone_number = byId('inpPhone').value.trim();

      if (!forename) {
        showToast('Validation', 'First name is required.', 'error');
        return;
      }

      const res = await updateUserProfile(PROFILE.user_id, {
        forename,
        surname,
        name: (forename + ' ' + surname).trim(),
        phone_number,
        avatar_url: avatarUrl
      });

      if (!res.success) {
        showToast('Error', res.message, 'error');
        return;
      }

      fullUser.forename     = forename;
      fullUser.surname      = surname;
      fullUser.name         = (forename + ' ' + surname).trim();
      fullUser.phone_number = phone_number;
      fullUser.avatar_url   = avatarUrl;
      pendingAvatarFile = null;

      byId('personalPanel').classList.remove('editing');
      byId('avatarWrap').classList.remove('editing');
      renderPersonal();
      showToast('Saved', 'Personal details updated.', 'ok');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  }

  // ── Save: Academic ────────────────────────────────────
  async function saveAcademic() {
    const btn = byId('academicSave');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const level  = byId('inpLevel').value;
      const cohort = byId('inpCohort').value.trim();

      const res = await updateUserProfile(PROFILE.user_id, { level, cohort });

      if (!res.success) {
        showToast('Error', res.message, 'error');
        return;
      }

      fullUser.level  = level;
      fullUser.cohort = cohort;

      byId('academicPanel').classList.remove('editing');
      renderAcademic();
      showToast('Saved', 'Academic details updated.', 'ok');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  }

  // ── File handler ──────────────────────────────────────
  function onAvatarSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) {
      showToast('Too large', 'Image must be under 2 MB.', 'error');
      return;
    }
    pendingAvatarFile = file;
    const reader = new FileReader();
    reader.onload = () => {
      byId('avatarContainer').innerHTML = `<img class="avatar-img" src="${reader.result}" alt="Preview" />`;
    };
    reader.readAsDataURL(file);
  }

  // ── Bind account events ───────────────────────────────
  function bindAccountEvents() {
    byId('personalEditBtn').addEventListener('click', () => enterEdit('personalPanel'));
    byId('personalCancel').addEventListener('click',  () => cancelEdit('personalPanel'));
    byId('personalSave').addEventListener('click',    savePersonal);

    byId('academicEditBtn').addEventListener('click', () => enterEdit('academicPanel'));
    byId('academicCancel').addEventListener('click',  () => cancelEdit('academicPanel'));
    byId('academicSave').addEventListener('click',    saveAcademic);

    byId('avatarInput').addEventListener('change', onAvatarSelected);
  }

  // ── Load classes ───────────────────────────────────────
  async function loadClasses() {
    memberships = await getStudentClasses(PROFILE.user_id);

    if (!memberships.length) {
      byId('emptyState').style.display = '';
      byId('overallCompleteness').innerHTML = '';
      return;
    }

    byId('emptyState').style.display = 'none';

    // Batch-fetch teacher names
    const teacherIds = [...new Set(memberships.map(m => m.teacher_classes?.teacher_id).filter(Boolean))];
    if (teacherIds.length) {
      const { data } = await db
        .from('users')
        .select('user_id, name, forename, surname')
        .in('user_id', teacherIds);
      (data || []).forEach(u => {
        teacherNames[u.user_id] = u.name || ((u.forename || '') + ' ' + (u.surname || '')).trim() || u.user_id;
      });
    }

    renderClasses();
    renderOverallCompleteness();
  }

  // ── Render: Classes ────────────────────────────────────
  function renderClasses() {
    const body = byId('classesBody');
    body.innerHTML = '';

    memberships.forEach((m, idx) => {
      const cls = m.teacher_classes;
      if (!cls) return;

      const fields = parseFields(cls.custom_fields_json);
      const values = parseValues(m.member_fields_json);
      const teacherName = teacherNames[cls.teacher_id] || '—';

      // Completeness
      const requiredFields = fields.filter(f => f.required);
      const filledRequired = requiredFields.filter(f => values[f.key]?.trim());
      const complete = requiredFields.length === 0 || filledRequired.length === requiredFields.length;
      const completeBadge = requiredFields.length
        ? `<span class="completeness ${complete ? 'completeness-full' : 'completeness-partial'}">${complete ? 'Complete' : filledRequired.length + '/' + requiredFields.length}</span>`
        : '';

      const card = document.createElement('div');
      card.className = 'class-card';
      card.innerHTML = `
        <div class="class-card-head">
          <div>
            <div class="class-card-title">${esc(cls.title)}</div>
            <div class="class-card-teacher">Teacher: ${esc(teacherName)}</div>
          </div>
          ${completeBadge}
        </div>
        <div class="class-card-body" id="classBody_${idx}">
          ${fields.length ? renderFieldForm(fields, values, idx) : '<div class="class-card-empty">No custom fields for this class.</div>'}
        </div>
      `;
      body.appendChild(card);
    });
  }

  function renderFieldForm(fields, values, idx) {
    let html = '';
    fields.forEach(f => {
      const val = values[f.key] || '';
      html += `
        <div class="field-row">
          <div class="field-label">${esc(f.label)}${f.required ? ' <span class="req">*</span>' : ''}</div>
          <div class="field-input">
            <input type="text" data-idx="${idx}" data-key="${esc(f.key)}" value="${esc(val)}" />
          </div>
        </div>
      `;
    });
    html += `
      <div class="class-save-bar">
        <button class="btn btn-primary btn-sm" onclick="saveClassFields(${idx})">Save</button>
      </div>
    `;
    return html;
  }

  // ── Save class fields ──────────────────────────────────
  async function saveClassFields(idx) {
    const m = memberships[idx];
    if (!m) return;

    const cls = m.teacher_classes;
    const fields = parseFields(cls.custom_fields_json);
    const inputs = document.querySelectorAll(`input[data-idx="${idx}"]`);
    const newValues = {};

    inputs.forEach(inp => {
      newValues[inp.dataset.key] = inp.value.trim();
    });

    // Validate required
    for (const f of fields) {
      if (f.required && !newValues[f.key]) {
        showToast('Required', `"${f.label}" is required.`, 'error');
        return;
      }
    }

    const res = await updateMemberProfile(cls.class_id, PROFILE.user_id, newValues);
    if (!res.success) {
      showToast('Error', res.message, 'error');
      return;
    }

    // Update local state
    m.member_fields_json = newValues;
    renderClasses();
    renderOverallCompleteness();
    showToast('Saved', `Profile updated for ${cls.title}.`, 'ok');
  }

  // ── Overall completeness ───────────────────────────────
  function renderOverallCompleteness() {
    let totalRequired = 0;
    let totalFilled   = 0;

    memberships.forEach(m => {
      const cls = m.teacher_classes;
      if (!cls) return;
      const fields = parseFields(cls.custom_fields_json);
      const values = parseValues(m.member_fields_json);
      fields.filter(f => f.required).forEach(f => {
        totalRequired++;
        if (values[f.key]?.trim()) totalFilled++;
      });
    });

    const el = byId('overallCompleteness');
    if (totalRequired === 0) {
      el.innerHTML = '';
    } else if (totalFilled === totalRequired) {
      el.innerHTML = '<span class="completeness completeness-full">All complete</span>';
    } else {
      el.innerHTML = `<span class="completeness completeness-partial">${totalFilled}/${totalRequired} fields</span>`;
    }
  }

  // ── Helpers ────────────────────────────────────────────
  function parseFields(json) {
    if (!json) return [];
    try {
      const parsed = typeof json === 'object' ? json : JSON.parse(json);
      return Array.isArray(parsed) ? parsed : (parsed.fields || []);
    } catch (_) { return []; }
  }

  function parseValues(json) {
    if (!json) return {};
    try {
      const parsed = typeof json === 'object' ? json : JSON.parse(json);
      return parsed.fields || parsed || {};
    } catch (_) { return {}; }
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function showToast(title, msg, type) {
    byId('toastTitle').textContent = title || '';
    byId('toastMsg').textContent   = msg   || '';
    const el = byId('toast');
    el.className = 'toast show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3400);
  }

  // ── Run ────────────────────────────────────────────────
  boot();

</script>
</body>
</html>
