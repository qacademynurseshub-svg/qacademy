<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results — QAcademy</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>

    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f6f8f7; color: #1f2a28; }
    .page-wrap { display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { flex: 1; padding: 0 20px 40px; max-width: 960px; margin: 0 auto; width: 100%; }

    /* ── Topbar ──────────────────────────────────────────── */
    .results-topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,.10);
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .topbar-title { font-size: 15px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
    .topbar-sub { font-size: 12px; color: #6b7280; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-btn {
      padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,.10);
      background: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
      color: #6b7280; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
    }
    .topbar-btn:hover { border-color: #2d7d72; color: #2d7d72; }

    /* ── Tabs ────────────────────────────────────────────── */
    .tab-bar {
      display: flex; gap: 4px; margin-top: 16px; margin-bottom: 16px;
      border-bottom: 2px solid rgba(0,0,0,.08);
    }
    .tab-btn {
      padding: 10px 20px; border: none; background: transparent;
      font-size: 14px; font-weight: 700; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: all .14s ease; color: #6b7280;
    }
    .tab-btn:hover { color: #1f2a28; }
    .tab-btn.active { color: #2d7d72; border-bottom-color: #2d7d72; }
    .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── Status pill ─────────────────────────────────────── */
    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 999px;
      font-size: 11px; font-weight: 800; text-transform: uppercase;
    }
    .status-pill.available { background: rgba(45,125,114,0.08); color: #2d7d72; }
    .status-pill.pending { background: rgba(37,99,235,0.08); color: #2563eb; }
    .status-pill.hidden { background: rgba(220,38,38,0.06); color: #dc2626; }

    /* ── Score card ──────────────────────────────────────── */
    .score-section { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
    .score-card {
      flex: 1; min-width: 180px;
      background: #fff; border: 1px solid rgba(0,0,0,.10);
      border-radius: 18px; padding: 24px; text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.04);
    }
    .score-card-label { font-size: 11px; font-weight: 800; color: #6b7280; text-transform: uppercase; margin-bottom: 8px; }
    .score-card-value { font-size: 36px; font-weight: 900; line-height: 1; }
    .score-card-sub { font-size: 13px; color: #6b7280; margin-top: 6px; }
    .score-card-value.pass { color: #2d7d72; }
    .score-card-value.fail { color: #dc2626; }

    /* ── Notice box ──────────────────────────────────────── */
    .notice-box {
      background: #fff; border: 1px solid rgba(0,0,0,.10);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
      text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.04);
    }
    .notice-box .icon { font-size: 36px; margin-bottom: 8px; }
    .notice-box h3 { font-size: 16px; font-weight: 800; margin: 0 0 6px; }
    .notice-box p { font-size: 13px; color: #6b7280; line-height: 1.6; margin: 0; }

    /* ── Meta grid ───────────────────────────────────────── */
    .meta-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px; margin-bottom: 20px;
    }
    .meta-cell {
      padding: 12px 14px; border-radius: 12px; background: #fff;
      border: 1px solid rgba(0,0,0,.06);
    }
    .meta-label { font-size: 10px; font-weight: 800; color: #6b7280; text-transform: uppercase; }
    .meta-value { font-size: 13px; font-weight: 700; margin-top: 3px; }

    /* ── My Details collapsible ───────────────────────────── */
    .details-section {
      background: #fff; border: 1px solid rgba(0,0,0,.10);
      border-radius: 16px; overflow: hidden; margin-bottom: 20px;
    }
    .details-header {
      padding: 14px 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 14px; font-weight: 800; color: #1f2a28;
    }
    .details-header:hover { background: rgba(0,0,0,.02); }
    .details-arrow { transition: transform 0.2s; font-size: 12px; }
    .details-header.open .details-arrow { transform: rotate(180deg); }
    .details-body { padding: 0 16px 16px; display: none; }
    .details-body.open { display: block; }
    .details-sub { font-size: 12px; font-weight: 700; color: #6b7280; margin: 12px 0 6px; text-transform: uppercase; }
    .details-kv { display: grid; grid-template-columns: 140px 1fr; gap: 4px 12px; font-size: 13px; }
    .details-kv .k { color: #6b7280; font-weight: 600; }
    .details-kv .v { font-weight: 700; }

    /* ── Review layout ───────────────────────────────────── */
    .review-layout { display: flex; gap: 16px; align-items: flex-start; }
    .review-sidebar {
      width: 200px; flex-shrink: 0;
      position: sticky; top: 64px; display: none;
    }
    @media (min-width: 900px) { .review-sidebar { display: block; } .main-content { max-width: 1100px; } }

    .review-sidebar-inner {
      background: #fff; border: 1px solid rgba(0,0,0,.10);
      border-radius: 16px; padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.04);
    }
    .review-sidebar-title { font-size: 12px; font-weight: 800; color: #6b7280; margin: 0 0 8px; }
    .review-map { display: grid; grid-template-columns: repeat(auto-fill, minmax(34px, 1fr)); gap: 4px; }
    .map-cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 11px; font-weight: 800;
      cursor: pointer; border: 2px solid #e5e7eb; background: #fff;
      transition: all 0.15s;
    }
    .map-cell:hover { transform: scale(1.05); }
    .map-cell.correct { background: rgba(45,125,114,0.08); border-color: rgba(45,125,114,0.3); color: #2d7d72; }
    .map-cell.wrong { background: rgba(220,38,38,0.06); border-color: rgba(220,38,38,0.25); color: #dc2626; }
    .map-cell.viewing { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.15); }

    .review-legend { font-size: 10px; color: #6b7280; margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
    .review-legend span { display: inline-flex; align-items: center; gap: 3px; }
    .review-legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .review-legend .dot.c { background: #2d7d72; }
    .review-legend .dot.w { background: #dc2626; }

    .review-main { flex: 1; min-width: 0; }

    /* ── Review filters ──────────────────────────────────── */
    .review-filters {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; align-items: center;
    }
    .filter-pill {
      padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(0,0,0,.10);
      background: #fff; font-size: 12px; font-weight: 700; cursor: pointer;
      color: #6b7280; transition: all 0.15s;
    }
    .filter-pill:hover { border-color: #2d7d72; }
    .filter-pill.active { background: rgba(45,125,114,0.08); border-color: rgba(45,125,114,0.3); color: #2d7d72; }
    .filter-count { font-size: 12px; color: #6b7280; font-weight: 600; }

    /* ── Review question card ────────────────────────────── */
    .review-card {
      background: #fff; border: 1px solid rgba(0,0,0,.10);
      border-radius: 16px; padding: 20px; margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.03);
    }
    .review-card-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .review-q-num { font-size: 13px; font-weight: 800; color: #6b7280; }
    .review-q-badge {
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 800;
    }
    .review-q-badge.correct { background: rgba(45,125,114,0.08); color: #2d7d72; }
    .review-q-badge.wrong { background: rgba(220,38,38,0.06); color: #dc2626; }
    .review-q-meta { font-size: 11px; color: #6b7280; display: flex; gap: 8px; flex-wrap: wrap; }

    .review-stem { font-size: 15px; line-height: 1.6; margin-bottom: 16px; font-weight: 500; }

    /* ── Review options ──────────────────────────────────── */
    .review-option {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border: 1px solid rgba(0,0,0,.06);
      border-radius: 12px; margin-bottom: 6px;
      background: #fff; position: relative;
    }
    .review-option.chosen { border-color: rgba(234,179,8,0.4); background: rgba(234,179,8,0.04); }
    .review-option.correct-opt { border-color: rgba(45,125,114,0.4); background: rgba(45,125,114,0.04); }
    .review-option.chosen.correct-opt { border-color: rgba(45,125,114,0.5); background: rgba(45,125,114,0.06); }
    .review-option.chosen.wrong-opt { border-color: rgba(220,38,38,0.3); background: rgba(220,38,38,0.04); }

    .review-opt-letter {
      width: 28px; height: 28px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0;
      border: 2px solid rgba(0,0,0,.10); background: #fff; color: #6b7280;
    }
    .review-option.correct-opt .review-opt-letter { background: #2d7d72; color: #fff; border-color: #2d7d72; }
    .review-option.chosen.wrong-opt .review-opt-letter { background: #dc2626; color: #fff; border-color: #dc2626; }

    .review-opt-content { flex: 1; min-width: 0; }
    .review-opt-text { font-size: 13px; line-height: 1.5; }
    .review-opt-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
    .review-opt-tag {
      font-size: 10px; font-weight: 800; padding: 1px 6px;
      border-radius: 4px; text-transform: uppercase;
    }
    .review-opt-tag.chosen-tag { background: rgba(234,179,8,0.12); color: #a16207; }
    .review-opt-tag.correct-tag { background: rgba(45,125,114,0.10); color: #2d7d72; }
    .review-opt-tag.wrong-tag { background: rgba(220,38,38,0.08); color: #dc2626; }

    .review-opt-feedback {
      font-size: 12px; color: #6b7280; margin-top: 6px;
      padding: 6px 10px; background: rgba(0,0,0,.03); border-radius: 8px;
      line-height: 1.5; display: none;
    }
    .review-opt-feedback.show { display: block; }

    /* ── Rationale ───────────────────────────────────────── */
    .rationale-section {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .rationale-toggle {
      font-size: 12px; font-weight: 700; color: #2d7d72; cursor: pointer;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .rationale-toggle:hover { text-decoration: underline; }
    .rationale-body { margin-top: 8px; font-size: 13px; line-height: 1.6; color: #374151; display: none; }
    .rationale-body.show { display: block; }
    .rationale-img { max-width: 100%; border-radius: 10px; margin-top: 8px; cursor: pointer; }

    /* ── Loading / empty ─────────────────────────────────── */
    .spinner { width: 22px; height: 22px; border-radius: 50%; border: 3px solid rgba(0,0,0,.08); border-top-color: #2d7d72; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { text-align: center; padding: 40px 20px; color: #6b7280; }

    /* ── Print ───────────────────────────────────────────── */
    @media print {
      .results-topbar, .tab-bar, .topbar-btn, .filter-pill, .review-sidebar,
      .review-filters, .no-print { display: none !important; }
      .tab-pane { display: block !important; }
      .details-body { display: block !important; }
      .rationale-body { display: block !important; }
      .review-opt-feedback { display: block !important; }
      body { background: #fff; }
      .review-card, .score-card, .meta-cell, .notice-box, .details-section { break-inside: avoid; }
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .results-topbar { padding: 8px 12px; }
      .topbar-title { max-width: 200px; font-size: 13px; }
      .score-section { flex-direction: column; }
      .meta-grid { grid-template-columns: 1fr 1fr; }
      .review-card { padding: 14px; }
    }

  </style>
</head>
<body>

<div class="page-wrap">

  <!-- Topbar -->
  <div class="results-topbar" id="topbar">
    <div class="topbar-left">
      <a class="topbar-btn" href="/myteacher/student/my-classes.html">← My Classes</a>
      <div>
        <div class="topbar-title" id="topTitle">Results</div>
        <div class="topbar-sub" id="topSub"></div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="status-pill" id="statusPill"></span>
      <button class="topbar-btn no-print" onclick="window.print()">🖨 Print</button>
    </div>
  </div>

  <main class="main-content">

    <!-- Loading -->
    <div id="screenLoading" class="loading-state">
      <div class="spinner"></div>
      <p style="margin-top:12px;">Loading results…</p>
    </div>

    <!-- Error -->
    <div id="screenError" style="display:none;">
      <div class="notice-box" style="margin-top:20px;">
        <div class="icon">⚠️</div>
        <h3>Cannot Load Results</h3>
        <p id="errorMsg"></p>
        <a class="topbar-btn" href="/myteacher/student/my-classes.html" style="margin-top:14px; display:inline-flex;">← Back to My Classes</a>
      </div>
    </div>

    <!-- Main content -->
    <div id="screenMain" style="display:none;">

      <!-- Tabs -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tabResults" onclick="setTab('results')">📊 Results</button>
        <button class="tab-btn" id="tabReview" onclick="setTab('review')">📝 Review</button>
      </div>

      <!-- Results tab -->
      <div class="tab-pane active" id="paneResults">
        <div id="scoreSection"></div>
        <div id="metaSection"></div>
        <div id="detailsSection"></div>
        <div style="margin-top:20px;">
          <a class="topbar-btn" href="/myteacher/student/my-classes.html">← Back to My Classes</a>
        </div>
      </div>

      <!-- Review tab -->
      <div class="tab-pane" id="paneReview">
        <div id="reviewContent">
          <div class="loading-state">
            <div class="spinner"></div>
            <p style="margin-top:12px;">Loading review…</p>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/paths.js"></script>
<script src="/js/myteacher-api.js"></script>
<script>

  let PROFILE = null;
  let RESULTS = null;
  let REVIEW  = null;
  let REVIEW_LOADED = false;
  let REVIEW_FILTER = 'ALL'; // ALL | CORRECT | WRONG
  let SHOW_FEEDBACK = true;

  const PARAMS = new URLSearchParams(window.location.search);
  const ATTEMPT_ID = PARAMS.get('attempt_id');
  const INITIAL_TAB = PARAMS.get('tab') || 'results';

  function $(id) { return document.getElementById(id); }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function formatDuration(sec) {
    if (!sec) return '—';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    return `${m}m ${String(s).padStart(2,'0')}s`;
  }

  function showError(msg) {
    $('screenLoading').style.display = 'none';
    $('screenMain').style.display = 'none';
    $('screenError').style.display = 'block';
    $('errorMsg').textContent = msg;
  }


  // ── Boot ──────────────────────────────────────────────────
  async function boot() {
    PROFILE = await guardPage('STUDENT');
    if (!PROFILE) return;

    if (!ATTEMPT_ID) { showError('No attempt specified.'); return; }

    const result = await getAttemptResults(ATTEMPT_ID, PROFILE.user_id);
    if (!result.success) { showError(result.message || 'Could not load results.'); return; }

    RESULTS = result;
    renderTopbar();
    renderResultsTab();

    $('screenLoading').style.display = 'none';
    $('screenMain').style.display = 'block';

    // Enable/disable review tab
    if (RESULTS.can_review_now) {
      $('tabReview').disabled = false;
    } else {
      $('tabReview').disabled = true;
      $('tabReview').title = RESULTS.quiz_meta.show_review
        ? 'Review available when results are released'
        : 'Review not enabled for this quiz';
    }

    // Set initial tab
    if (INITIAL_TAB === 'review' && RESULTS.can_review_now) {
      setTab('review');
    }
  }


  // ── Topbar ────────────────────────────────────────────────
  function renderTopbar() {
    const q = RESULTS.quiz_meta;
    const a = RESULTS.attempt_meta;
    $('topTitle').textContent = q.title || 'Results';
    $('topSub').textContent = `${q.subject || ''} · Attempt #${a.attempt_no || 1}`;

    const pill = $('statusPill');
    if (RESULTS.gate_met && RESULTS.show_results) {
      pill.textContent = '✓ Results Available';
      pill.className = 'status-pill available';
    } else if (RESULTS.gate_met && !RESULTS.show_results) {
      pill.textContent = 'Score Hidden';
      pill.className = 'status-pill hidden';
    } else {
      pill.textContent = '⏳ Awaiting Release';
      pill.className = 'status-pill pending';
    }
  }


  // ── Results tab ───────────────────────────────────────────
  function renderResultsTab() {
    renderScoreSection();
    renderMetaSection();
    renderDetailsSection();
  }

  function renderScoreSection() {
    const ds = RESULTS.display_score;
    const gl = RESULTS.grade_label;
    const ps = RESULTS.pass_status;
    const sp = RESULTS.quiz_meta.score_display_policy;

    let html = '';

    if (!RESULTS.gate_met) {
      // Pending state
      const policy = RESULTS.quiz_meta.results_release_policy;
      let msg = 'Your results will appear when released.';
      if (policy === 'AFTER_CLOSE' && RESULTS.quiz_meta.close_at) {
        msg = `Results will be available after the quiz closes on ${formatDate(RESULTS.quiz_meta.close_at)}.`;
      } else if (policy === 'MANUAL') {
        msg = 'Your teacher will release results when ready.';
      }
      html = `<div class="notice-box"><div class="icon">📋</div><h3>Quiz Submitted</h3><p>${msg}</p></div>`;
    } else if (!RESULTS.show_results) {
      html = `<div class="notice-box"><div class="icon">🔒</div><h3>Results Hidden</h3><p>Your teacher has chosen not to display results for this quiz.</p></div>`;
    } else if (ds) {
      // Score card(s)
      html = '<div class="score-section">';

      // Main score card
      html += '<div class="score-card">';
      html += '<div class="score-card-label">Your Score</div>';
      if (ds.percent != null && ds.score_marks != null) {
        html += `<div class="score-card-value">${ds.percent}%</div>`;
        html += `<div class="score-card-sub">${ds.score_marks} / ${ds.total_marks} marks</div>`;
      } else if (ds.percent != null) {
        html += `<div class="score-card-value">${ds.percent}%</div>`;
      } else if (ds.score_marks != null) {
        html += `<div class="score-card-value">${ds.score_marks} / ${ds.total_marks}</div>`;
        html += `<div class="score-card-sub">marks</div>`;
      }
      if (gl) html += `<div class="score-card-sub" style="margin-top:4px;">Grade: <strong>${esc(gl)}</strong></div>`;
      html += '</div>';

      // Pass/fail card
      if (ps) {
        const isPassing = ps === 'PASS';
        html += `<div class="score-card">
          <div class="score-card-label">Outcome</div>
          <div class="score-card-value ${isPassing ? 'pass' : 'fail'}">${isPassing ? '✓ Pass' : '✗ Fail'}</div>
          <div class="score-card-sub">Threshold: ${RESULTS.quiz_meta.pass_threshold_pct ?? 50}%</div>
        </div>`;
      }

      html += '</div>';
    } else if (sp === 'HIDE' && gl) {
      // Grade only (score hidden by policy)
      html = `<div class="score-section"><div class="score-card">
        <div class="score-card-label">Grade Awarded</div>
        <div class="score-card-value">${esc(gl)}</div>
        <div class="score-card-sub">Numeric score hidden by instructor</div>
      </div></div>`;
    } else {
      html = `<div class="notice-box"><div class="icon">📋</div><h3>Submitted</h3><p>No score information available.</p></div>`;
    }

    $('scoreSection').innerHTML = html;
  }

  function renderMetaSection() {
    const a = RESULTS.attempt_meta;
    const q = RESULTS.quiz_meta;

    const statusMap = {
      'SUBMITTED': 'Submitted',
      'TIMED_OUT': 'Timed out',
      'CLOSED': 'Closed (deadline reached)',
      'ABANDONED': 'Abandoned'
    };

    const presetMap = {
      'STUDY': 'Study mode',
      'ASSIGNMENT': 'Assignment',
      'IN_CLASS': 'In-class quiz',
      'EXAM': 'Exam'
    };

    const policyMap = {
      'IMMEDIATE': 'Immediately after submission',
      'AFTER_CLOSE': 'After quiz closes',
      'MANUAL': 'When released by instructor'
    };

    const cells = [
      { label: 'Attempt', value: `#${a.attempt_no || 1}` },
      { label: 'Quiz Type', value: presetMap[q.preset] || q.preset },
      { label: 'Status', value: statusMap[a.status] || a.status },
      { label: 'Started', value: formatDate(a.started_at) },
      { label: 'Submitted', value: formatDate(a.submitted_at) },
      { label: 'Time Taken', value: formatDuration(a.time_taken_s) },
      { label: 'Results Policy', value: policyMap[q.results_release_policy] || q.results_release_policy },
      { label: 'Access', value: RESULTS.gate_met ? '✓ Available' : '⏳ Not yet' },
    ];

    if (RESULTS.available_at) {
      cells.push({ label: 'Available Since', value: formatDate(RESULTS.available_at) });
    }

    $('metaSection').innerHTML = '<div class="meta-grid">' +
      cells.map(c => `<div class="meta-cell"><div class="meta-label">${c.label}</div><div class="meta-value">${c.value}</div></div>`).join('') +
      '</div>';
  }

  function renderDetailsSection() {
    const d = RESULTS.my_details;
    if (!d) { $('detailsSection').innerHTML = ''; return; }

    const cp = d.class_profile || {};
    const as = d.attempt_submitted || {};

    const hasClassFields = (cp.fields || []).length > 0;
    const hasAttemptFields = (as.fields || []).length > 0;

    if (!hasClassFields && !hasAttemptFields && !cp.display_name) {
      $('detailsSection').innerHTML = '';
      return;
    }

    let body = '';

    // Class profile
    if (cp.display_name || hasClassFields) {
      body += '<div class="details-sub">Class Profile</div><div class="details-kv">';
      if (cp.display_name) body += `<div class="k">Name</div><div class="v">${esc(cp.display_name)}</div>`;
      if (cp.email) body += `<div class="k">Email</div><div class="v">${esc(cp.email)}</div>`;
      (cp.fields || []).forEach(f => {
        const val = (cp.values || {})[f.key] || '—';
        body += `<div class="k">${esc(f.label)}</div><div class="v">${esc(val)}</div>`;
      });
      body += '</div>';
    }

    // Attempt submitted fields
    if (hasAttemptFields) {
      body += '<div class="details-sub">Quiz Intake Fields</div><div class="details-kv">';
      (as.fields || []).forEach(f => {
        const val = (as.values || {})[f.key] || '—';
        body += `<div class="k">${esc(f.label)}</div><div class="v">${esc(val)}</div>`;
      });
      body += '</div>';
    }

    $('detailsSection').innerHTML = `
      <div class="details-section">
        <div class="details-header" id="detailsToggle" onclick="toggleDetails()">
          <span>My Details</span>
          <span class="details-arrow" id="detailsArrow">▼</span>
        </div>
        <div class="details-body" id="detailsBody">${body}</div>
      </div>`;
  }

  function toggleDetails() {
    const h = $('detailsToggle');
    const b = $('detailsBody');
    h.classList.toggle('open');
    b.classList.toggle('open');
  }


  // ── Tabs ──────────────────────────────────────────────────
  function setTab(tab) {
    $('tabResults').classList.toggle('active', tab === 'results');
    $('tabReview').classList.toggle('active', tab === 'review');
    $('paneResults').classList.toggle('active', tab === 'results');
    $('paneReview').classList.toggle('active', tab === 'review');

    if (tab === 'review' && !REVIEW_LOADED) {
      loadReview();
    }
  }


  // ── Review tab ────────────────────────────────────────────
  async function loadReview() {
    REVIEW_LOADED = true;
    $('reviewContent').innerHTML = '<div class="loading-state"><div class="spinner"></div><p style="margin-top:12px;">Loading review…</p></div>';

    const result = await getAttemptReview(ATTEMPT_ID, PROFILE.user_id);
    if (!result.success) {
      $('reviewContent').innerHTML = `<div class="notice-box"><div class="icon">🔒</div><h3>Review Not Available</h3><p>${esc(result.message || 'Could not load review.')}</p></div>`;
      return;
    }

    REVIEW = result;
    renderReviewTab();
  }

  function renderReviewTab() {
    if (!REVIEW) return;

    const questions = REVIEW.questions || [];
    const filtered = REVIEW_FILTER === 'ALL' ? questions :
      questions.filter(q => REVIEW_FILTER === 'CORRECT' ? q.is_correct : !q.is_correct);

    const correctCount = questions.filter(q => q.is_correct).length;
    const wrongCount = questions.length - correctCount;

    let html = '<div class="review-layout">';

    // Sidebar map
    html += `<div class="review-sidebar"><div class="review-sidebar-inner">
      <div class="review-sidebar-title">Question Map</div>
      <div class="review-map">`;
    questions.forEach((q, idx) => {
      let cls = 'map-cell';
      cls += q.is_correct ? ' correct' : ' wrong';
      html += `<div class="${cls}" onclick="scrollToReviewQ(${idx})" title="Q${q.position}">${q.position}</div>`;
    });
    html += `</div>
      <div class="review-legend">
        <span><span class="dot c"></span> Correct</span>
        <span><span class="dot w"></span> Wrong</span>
      </div>
    </div></div>`;

    // Main
    html += '<div class="review-main">';

    // Filters
    html += `<div class="review-filters">
      <button class="filter-pill ${REVIEW_FILTER==='ALL'?'active':''}" onclick="setReviewFilter('ALL')">All (${questions.length})</button>
      <button class="filter-pill ${REVIEW_FILTER==='CORRECT'?'active':''}" onclick="setReviewFilter('CORRECT')">✓ Correct (${correctCount})</button>
      <button class="filter-pill ${REVIEW_FILTER==='WRONG'?'active':''}" onclick="setReviewFilter('WRONG')">✗ Wrong (${wrongCount})</button>
      <label style="font-size:12px; color:#6b7280; display:inline-flex; align-items:center; gap:4px; margin-left:auto; cursor:pointer;">
        <input type="checkbox" ${SHOW_FEEDBACK ? 'checked' : ''} onchange="toggleFeedback(this.checked)" /> Show feedback
      </label>
    </div>`;

    // Score summary
    if (REVIEW.display_score) {
      const ds = REVIEW.display_score;
      let scoreTxt = '';
      if (ds.percent != null) scoreTxt += ds.percent + '%';
      if (ds.score_marks != null) scoreTxt += (scoreTxt ? ' · ' : '') + ds.score_marks + '/' + ds.total_marks;
      if (REVIEW.grade_label) scoreTxt += (scoreTxt ? ' · ' : '') + 'Grade: ' + REVIEW.grade_label;
      html += `<div style="font-size:13px; font-weight:700; color:#2d7d72; margin-bottom:14px; padding:8px 12px; background:rgba(45,125,114,0.06); border-radius:10px;">${esc(scoreTxt)}</div>`;
    }

    if (!filtered.length) {
      html += '<div class="notice-box"><div class="icon">📝</div><h3>No questions match</h3><p>Try changing the filter.</p></div>';
    }

    // Questions
    filtered.forEach((q, idx) => {
      const correctSet = new Set(q.correct_answer || []);
      const studentSet = new Set(q.student_answer || []);

      html += `<div class="review-card" id="reviewQ${q.position}">`;

      // Header
      html += `<div class="review-card-header">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span class="review-q-num">Question ${q.position}</span>
          <span class="review-q-badge ${q.is_correct ? 'correct' : 'wrong'}">${q.is_correct ? '✓ Correct' : '✗ Wrong'}</span>
          <span style="font-size:11px; color:#6b7280; background:rgba(0,0,0,.04); padding:2px 6px; border-radius:4px;">${q.marks} mark${q.marks !== 1 ? 's' : ''}</span>
          <span style="font-size:10px; font-weight:800; text-transform:uppercase; padding:2px 6px; border-radius:999px; background:rgba(37,99,235,0.08); color:#2563eb;">${esc(q.question_type)}</span>
        </div>
        <div class="review-q-meta">
          ${q.maintopic ? '<span>' + esc(q.maintopic) + '</span>' : ''}
          ${q.difficulty ? '<span>' + esc(q.difficulty) + '</span>' : ''}
        </div>
      </div>`;

      // Stem
      html += `<div class="review-stem">${esc(q.stem)}</div>`;

      // Options
      (q.options || []).forEach(opt => {
        const key = opt.key;
        const isChosen = studentSet.has(key);
        const isCorrectOpt = correctSet.has(key);
        const isWrongChosen = isChosen && !isCorrectOpt;

        let cls = 'review-option';
        if (isChosen) cls += ' chosen';
        if (isCorrectOpt) cls += ' correct-opt';
        if (isWrongChosen) cls += ' wrong-opt';

        html += `<div class="${cls}">
          <div class="review-opt-letter">${key}</div>
          <div class="review-opt-content">
            <div class="review-opt-text">${esc(opt.text)}</div>
            <div class="review-opt-tags">
              ${isChosen ? '<span class="review-opt-tag chosen-tag">Your answer</span>' : ''}
              ${isCorrectOpt ? '<span class="review-opt-tag correct-tag">Correct</span>' : ''}
              ${isWrongChosen ? '<span class="review-opt-tag wrong-tag">Wrong</span>' : ''}
            </div>
            ${opt.feedback ? `<div class="review-opt-feedback ${SHOW_FEEDBACK ? 'show' : ''}">${esc(opt.feedback)}</div>` : ''}
          </div>
        </div>`;
      });

      // Rationale
      if (q.rationale || q.rationale_img) {
        html += `<div class="rationale-section">
          <span class="rationale-toggle" onclick="toggleRationale(this)">▶ Show rationale</span>
          <div class="rationale-body">
            ${q.rationale ? '<p>' + esc(q.rationale) + '</p>' : ''}
            ${q.rationale_img ? `<img class="rationale-img" src="${esc(q.rationale_img)}" alt="Rationale image" loading="lazy" />` : ''}
          </div>
        </div>`;
      }

      html += '</div>';
    });

    html += '</div></div>';
    $('reviewContent').innerHTML = html;
  }

  function setReviewFilter(filter) {
    REVIEW_FILTER = filter;
    renderReviewTab();
  }

  function toggleFeedback(show) {
    SHOW_FEEDBACK = show;
    document.querySelectorAll('.review-opt-feedback').forEach(el => {
      el.classList.toggle('show', show);
    });
  }

  function toggleRationale(el) {
    const body = el.nextElementSibling;
    const isOpen = body.classList.toggle('show');
    el.textContent = isOpen ? '▼ Hide rationale' : '▶ Show rationale';
  }

  function scrollToReviewQ(idx) {
    const questions = REVIEW?.questions || [];
    if (!questions[idx]) return;
    const el = document.getElementById('reviewQ' + questions[idx].position);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }


  // ── Run ───────────────────────────────────────────────────
  boot();

</script>
</body>
</html>
