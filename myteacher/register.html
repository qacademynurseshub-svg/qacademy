<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — MyTeacher</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* Role toggle */
    .role-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .role-toggle button {
      flex: 1;
      padding: 10px 14px;
      border: none;
      background: var(--white);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .role-toggle button.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    /* Teacher fields slide */
    .teacher-fields {
      display: none;
      padding: 16px;
      margin-bottom: 16px;
      background: var(--primary-light);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .teacher-fields.show { display: block; }

    .teacher-fields .field-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .teacher-fields .field-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .teacher-fields .form-group label {
      font-size: 13px;
    }
    .teacher-fields .form-group input,
    .teacher-fields .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      color: var(--text);
    }
    .teacher-fields .form-group input:focus,
    .teacher-fields .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .teacher-fields .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    .opt-label {
      font-weight: 400;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <h1>MyTeacher</h1>
      <p>by QAcademy</p>
    </div>

    <!-- Title -->
    <h2 class="auth-title">Create your account</h2>
    <p class="auth-subtitle">Join MyTeacher to access or create classes</p>

    <!-- Alerts -->
    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <!-- Register Form -->
    <form id="registerForm">

      <!-- Role toggle -->
      <label style="font-size:14px; font-weight:500; margin-bottom:8px; display:block;">I am a...</label>
      <div class="role-toggle">
        <button type="button" id="roleStudent" class="active">Student</button>
        <button type="button" id="roleTeacher">Teacher</button>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label for="forename">First Name</label>
          <input type="text" id="forename" placeholder="First name" required />
        </div>
        <div class="form-group">
          <label for="surname">Last Name</label>
          <input type="text" id="surname" placeholder="Last name" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Minimum 8 characters" required minlength="8" autocomplete="new-password" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password" />
      </div>

      <!-- Teacher-only fields (hidden by default) -->
      <div class="teacher-fields" id="teacherFields">
        <div class="field-title">Teacher details</div>
        <div class="field-desc">
          These help admin review your request. All fields are optional.
          Once approved, you can create classes and build quizzes.
        </div>
        <div class="form-group">
          <label for="org">Organisation <span class="opt-label">(optional)</span></label>
          <input type="text" id="org" placeholder="e.g. School / Hospital / Training centre" />
        </div>
        <div class="form-group">
          <label for="phone">Phone number <span class="opt-label">(optional)</span></label>
          <input type="tel" id="phone" placeholder="Optional" />
        </div>
        <div class="form-group">
          <label for="note">Short note <span class="opt-label">(optional)</span></label>
          <textarea id="note" placeholder="e.g. I teach pharmacology at UG and want to run assignments for my class."></textarea>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Create Account
      </button>

    </form>

    <!-- Footer -->
    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
    <div style="text-align:center; margin-top:12px;">
      <a href="/register.html" style="font-size:13px; color:var(--text-muted);">Registering for NMC Licensure instead?</a>
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>

  // ── Role toggle ──────────────────────────────────────────
  let selectedRole = 'STUDENT';
  const btnStudent = document.getElementById('roleStudent');
  const btnTeacher = document.getElementById('roleTeacher');
  const teacherFields = document.getElementById('teacherFields');

  btnStudent.addEventListener('click', () => {
    selectedRole = 'STUDENT';
    btnStudent.classList.add('active');
    btnTeacher.classList.remove('active');
    teacherFields.classList.remove('show');
  });

  btnTeacher.addEventListener('click', () => {
    selectedRole = 'TEACHER';
    btnTeacher.classList.add('active');
    btnStudent.classList.remove('active');
    teacherFields.classList.add('show');
  });

  // ── Secure ID helper ──────────────────────────────────────
  function makeSecureId(prefix, byteLength = 8) {
    const bytes = crypto.getRandomValues(new Uint8Array(byteLength));
    const hex = Array.from(bytes)
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
    return prefix + hex.toUpperCase();
  }

  // ── Handle form submission ────────────────────────────────
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const forename        = document.getElementById('forename').value.trim();
    const surname         = document.getElementById('surname').value.trim();
    const email           = document.getElementById('email').value.trim();
    const password        = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const submitBtn       = document.getElementById('submitBtn');
    const errorAlert      = document.getElementById('errorAlert');
    const successAlert    = document.getElementById('successAlert');

    // Reset alerts
    errorAlert.classList.remove('show');
    successAlert.classList.remove('show');

    // Validate
    if (password !== confirmPassword) {
      errorAlert.textContent = 'Passwords do not match.';
      errorAlert.classList.add('show');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account...';

    // ── Step 1: Create Supabase Auth account ────────────────
    const { data, error } = await db.auth.signUp({ email, password });

    if (error) {
      errorAlert.textContent = error.message;
      errorAlert.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Account';
      return;
    }

    const userId = makeSecureId('U_');

    // ── Step 2: Create user profile ─────────────────────────
    // Role stays STUDENT — teacher role is granted on admin approval.
    // No program_id — MyTeacher users don't need a programme.
    const { error: profileError } = await db
      .from('users')
      .insert({
        user_id:       userId,
        auth_id:       data.user.id,
        email:         email,
        forename:      forename,
        surname:       surname,
        name:          forename + ' ' + surname,
        role:          'STUDENT',
        active:        true,
        signup_source: 'MYTEACHER'
      });

    if (profileError) {
      errorAlert.textContent = 'Account created but profile setup failed. Please contact support.';
      errorAlert.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Account';
      return;
    }

    // ── Step 3: If teacher, create teacher_profiles row ─────
    // This puts them straight into the approval queue — no
    // separate access-request step needed.
    if (selectedRole === 'TEACHER') {
      const org   = document.getElementById('org').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const note  = document.getElementById('note').value.trim();
      const now   = new Date().toISOString();

      const { error: teacherError } = await db
        .from('teacher_profiles')
        .insert({
          teacher_id:      userId,
          display_name:    forename || (forename + ' ' + surname),
          email:           email,
          phone_number:    phone || '',
          organisation:    org   || '',
          request_note:    note  || '',
          request_status:  'PENDING',
          request_count:   1,
          active:          false,
          plan_type:       'FREE',
          requested_at:    now,
          last_request_at: now,
          created_at:      now,
          updated_at:      now
        });

      if (teacherError) {
        // Profile created but teacher request failed — they can still
        // submit via the access-request page later, so don't block.
        console.error('Teacher profile insert failed:', teacherError.message);
      }
    }

    // ── Step 4: Success ─────────────────────────────────────
    const msg = selectedRole === 'TEACHER'
      ? 'Account created! Your teacher request is now pending approval. Redirecting to login...'
      : 'Account created! Redirecting to login...';

    successAlert.textContent = msg;
    successAlert.classList.add('show');

    setTimeout(() => {
      window.location.href = '/login.html';
    }, 2500);
  });

</script>

</body>
</html>
