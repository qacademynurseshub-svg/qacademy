<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning History — QAcademy</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>

    /* ── Page header ─────────────────────────────────────── */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .user-menu { display: flex; align-items: center; gap: 12px; }
    .logout-btn {
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ── Stats bar ───────────────────────────────────────── */
    .stats-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 13px;
      color: var(--text);
    }
    .stat-pill strong {
      font-weight: 700;
      color: var(--primary);
    }

    /* ── Course filter chip ──────────────────────────────── */
    .filter-chip-bar {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .filter-chip-bar.show { display: flex; }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-light);
      border: 1px solid var(--accent);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
    }
    .filter-chip-clear {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-size: 14px;
      line-height: 1;
      padding: 0;
      font-weight: 700;
    }
    .filter-chip-clear:hover { color: var(--danger); }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .toolbar-field label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }
    .filter-select, .filter-input {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--text);
      min-width: 130px;
    }
    .filter-select:focus, .filter-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .filter-input { min-width: 180px; }
    .result-count {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
      align-self: center;
      padding-bottom: 2px;
    }

    /* ── Attempt cards ───────────────────────────────────── */
    .attempt-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .attempt-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(0, 1.2fr);
      column-gap: 14px;
      row-gap: 4px;
      transition: box-shadow 0.15s;
    }
    .attempt-card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.07);
    }

    /* Left side */
    .attempt-main { display: flex; flex-direction: column; gap: 4px; }

    .attempt-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--text-muted);
    }
    .attempt-meta .date { font-weight: 600; color: var(--text); }
    .attempt-meta .course-name { font-weight: 600; color: var(--primary); }

    .attempt-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-top: 2px;
    }

    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }
    .chip {
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      background: #f5f9f8;
    }
    .chip.mode-instant  { background: #e8fdf8; border-color: #c7f0e7; color: #0a6c67; }
    .chip.mode-timed    { background: #fff7ed; border-color: #fde2c5; color: #92400e; }
    .chip.status-completed   { background: #dcfce7; border-color: #bbf7d0; color: #166534; }
    .chip.status-in_progress { background: #fef9c3; border-color: #fef08a; color: #854d0e; }
    .chip.status-abandoned   { background: #f3f4f6; border-color: #e5e7eb; color: #6b7280; }
    .chip.source-fixed   { background: #eef2ff; border-color: #c4d4ff; color: #1d3e8a; }
    .chip.source-builder { background: #fdf4ff; border-color: #e9d5ff; color: #6b21a8; }
    .chip.source-retake  { background: #fff1f2; border-color: #fecdd3; color: #9f1239; }

    /* Right side */
    .attempt-side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
      gap: 8px;
    }

    .score-block { text-align: right; }
    .score-main {
      font-size: 15px;
      font-weight: 800;
      color: var(--primary);
    }
    .score-main.not-done { color: var(--text-muted); font-weight: 500; font-size: 13px; }
    .score-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Action buttons */
    .attempt-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }
    .act-btn {
      border: none;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
    }
    .act-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .btn-resume {
      background: var(--primary);
      color: #fff;
    }
    .btn-resume:not(:disabled):hover { opacity: 0.85; }
    .btn-review {
      background: #eef3f2;
      color: #25413d;
    }
    .btn-review:not(:disabled):hover { background: #dde8e5; }
    .btn-retake {
      background: #f9fafb;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    .btn-retake:not(:disabled):hover { background: #f3f4f6; }

    /* ── Load more ───────────────────────────────────────── */
    .load-more-wrap {
      text-align: center;
      margin-top: 14px;
      display: none;
    }
    .load-more-wrap.show { display: block; }
    .load-more-btn {
      background: #f5f9f8;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .load-more-btn:hover { background: #eef3f2; }

    /* ── Empty state ─────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .attempt-card {
        grid-template-columns: 1fr;
      }
      .attempt-side {
        align-items: flex-start;
        flex-direction: row;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .score-block { text-align: left; }
      .attempt-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>

<div class="dashboard-wrapper">

  <!-- Shared Sidebar -->
  <div id="sidebar"></div>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Top Nav -->
    <div class="top-nav">
      <div class="page-header" style="margin-bottom:0">
        <h1>Learning History</h1>
        <p>All your quiz attempts across courses</p>
      </div>
      <div class="user-menu">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-pill">Total attempts: <strong id="statTotal">—</strong></div>
      <div class="stat-pill">Avg score: <strong id="statAvg">—</strong></div>
      <div class="stat-pill">Best score: <strong id="statBest">—</strong></div>
      <div class="stat-pill">Instant: <strong id="statInstant">—</strong></div>
      <div class="stat-pill">Timed: <strong id="statTimed">—</strong></div>
    </div>

    <!-- Course filter chip (shows when ?course= is active) -->
    <div class="filter-chip-bar" id="filterChipBar">
      Filtering by:
      <span class="filter-chip">
        <span id="filterChipLabel"></span>
        <button class="filter-chip-clear" onclick="clearCourseFilter()" title="Clear filter">✕</button>
      </span>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-field">
        <label>Course</label>
        <select class="filter-select" id="courseFilter" onchange="applyFilters(true)">
          <option value="">All Courses</option>
        </select>
      </div>
      <div class="toolbar-field">
        <label>Mode</label>
        <select class="filter-select" id="modeFilter" onchange="applyFilters(true)">
          <option value="">All Modes</option>
          <option value="instant">Instant</option>
          <option value="timed">Timed</option>
        </select>
      </div>
      <div class="toolbar-field">
        <label>Status</label>
        <select class="filter-select" id="statusFilter" onchange="applyFilters(true)">
          <option value="">All Statuses</option>
          <option value="completed">Completed</option>
          <option value="in_progress">In Progress</option>
          <option value="abandoned">Abandoned</option>
        </select>
      </div>
      <div class="toolbar-field">
        <label>Source</label>
        <select class="filter-select" id="sourceFilter" onchange="applyFilters(true)">
          <option value="">All Sources</option>
          <option value="fixed">Fixed Quiz</option>
          <option value="builder">Builder</option>
          <option value="retake">Retake</option>
        </select>
      </div>
      <div class="toolbar-field">
        <label>Sort</label>
        <select class="filter-select" id="sortFilter" onchange="applyFilters(false)">
          <option value="newest">Newest → Oldest</option>
          <option value="oldest">Oldest → Newest</option>
          <option value="score_high">Highest Score</option>
          <option value="score_low">Lowest Score</option>
        </select>
      </div>
      <div class="toolbar-field">
        <label>Search</label>
        <input class="filter-input" id="searchFilter" type="search" placeholder="Search quiz name…" oninput="onSearchInput()" />
      </div>
      <span class="result-count" id="resultCount"></span>
    </div>

    <!-- Attempt list -->
    <div class="card" style="padding: 16px;">
      <div class="attempt-list" id="attemptList">
        <div class="empty-state">
          <div class="empty-icon">📊</div>
          <p>Loading your history…</p>
        </div>
      </div>

      <!-- Load more -->
      <div class="load-more-wrap" id="loadMoreWrap">
        <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">Load more</button>
      </div>
    </div>

  </main>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/mynmclicensure-api.js"></script>
<script src="/js/paths.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/mynmclicensure-student-sidebar.js"></script>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────
const PAGE_SIZE = 20;

// ── State ──────────────────────────────────────────────────────
let PROFILE        = null;
let allAttempts    = [];   // loaded attempts (current pages)
let filteredAttempts = []; // after client-side sort/source filter
let enrolledCourses = [];  // enrolled course objects
let searchTimer    = null;

// Pagination state
let attemptsPage    = 0;
let attemptsTotal   = 0;
let attemptsLoading = false;

// ── Init ───────────────────────────────────────────────────────
async function initPage() {

  // 1. Auth guard
  PROFILE = await guardPage('STUDENT');
  if (!PROFILE) return;

  document.getElementById('userName').textContent =
    PROFILE.forename || PROFILE.name || PROFILE.email;

  // 2. Read ?course= from URL for pre-filter
  const urlCourse = new URLSearchParams(window.location.search).get('course') || null;

  // 3. Load enrolled courses in parallel with first page of attempts
  const [courseAccessMap, allCourses] = await Promise.all([
    getStudentCourseAccess(PROFILE.user_id),
    getCourses()
  ]);

  // 4. Wire up sidebar dropdown
  populateCourseDropdown(courseAccessMap, allCourses);

  // 5. Filter to enrolled courses only
  enrolledCourses = allCourses.filter(c => courseAccessMap[c.course_id]);

  // 6. Populate course filter dropdown
  buildCourseDropdown(urlCourse);

  // 7. Show/hide course scope chip and set filter
  if (urlCourse) {
    const c = enrolledCourses.find(c => c.course_id === urlCourse);
    if (c) {
      document.getElementById('filterChipLabel').textContent = c.title;
      document.getElementById('filterChipBar').classList.add('show');
      document.getElementById('courseFilter').value = urlCourse;
    }
  }

  // 8. Load first page of attempts (respects any pre-set course filter)
  await loadAttempts(false);
}

// ── Build course dropdown ──────────────────────────────────────
// Shows all enrolled courses (with pagination we can't know which
// courses have attempts without loading everything)
function buildCourseDropdown(urlCourse) {
  const sel = document.getElementById('courseFilter');

  enrolledCourses.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.course_id;
    opt.textContent = c.title;
    sel.appendChild(opt);
  });
}

// ── Load attempts (paginated) ──────────────────────────────────
async function loadAttempts(append = false) {
  if (attemptsLoading) return;
  attemptsLoading = true;

  const filters = {
    courseId: document.getElementById('courseFilter').value,
    status:  document.getElementById('statusFilter').value,
    mode:    document.getElementById('modeFilter').value,
    search:  document.getElementById('searchFilter').value.trim()
  };

  const result = await getStudentAttemptsPaginated(
    PROFILE.user_id, filters, attemptsPage, PAGE_SIZE
  );
  attemptsTotal = result.total;

  if (append) {
    allAttempts = allAttempts.concat(result.attempts);
  } else {
    allAttempts = result.attempts;
  }

  // Note: renderStats() only reflects loaded attempts, not the true
  // lifetime total. Fixing this properly would require a separate
  // count query and is deferred.
  renderStats();

  // Apply client-side source filter and sort, then render
  applyClientFilters();

  attemptsLoading = false;
}

// ── Stats bar ──────────────────────────────────────────────────
// Note: after pagination, allAttempts only contains the currently
// loaded pages, not all attempts. Stats reflect loaded data only.
// A separate count query for true totals is deferred.
function renderStats() {
  const completed = allAttempts.filter(a => a.status === 'completed' && a.score_total > 0);
  const total     = attemptsTotal || allAttempts.length;
  const instant   = allAttempts.filter(a => a.mode === 'instant').length;
  const timed     = allAttempts.filter(a => a.mode === 'timed').length;

  let avgPct = '—';
  let bestPct = '—';

  if (completed.length) {
    const pcts = completed.map(a => Number(a.score_pct) || 0);
    avgPct  = Math.round(pcts.reduce((s, v) => s + v, 0) / pcts.length) + '%';
    bestPct = Math.max(...pcts) + '%';
  }

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statAvg').textContent     = avgPct;
  document.getElementById('statBest').textContent    = bestPct;
  document.getElementById('statInstant').textContent = instant;
  document.getElementById('statTimed').textContent   = timed;
}

// ── Filter + Sort ──────────────────────────────────────────────
// Course, status, mode, and search are now DB-side via loadAttempts.
// Source filter and sort order remain client-side.
function applyFilters(resetLimit) {
  attemptsPage = 0;
  loadAttempts(false);
}

// Client-side source filter + sort (applied on loaded data)
function applyClientFilters() {
  const sourceVal = document.getElementById('sourceFilter').value;
  const sortVal   = document.getElementById('sortFilter').value;

  filteredAttempts = allAttempts.filter(a => {
    if (sourceVal && a.source !== sourceVal) return false;
    return true;
  });

  // Sort
  filteredAttempts.sort((a, b) => {
    if (sortVal === 'oldest') {
      return new Date(a.ts_iso || 0) - new Date(b.ts_iso || 0);
    }
    if (sortVal === 'score_high') {
      return (Number(b.score_pct) || 0) - (Number(a.score_pct) || 0);
    }
    if (sortVal === 'score_low') {
      return (Number(a.score_pct) || 0) - (Number(b.score_pct) || 0);
    }
    // newest (default)
    return new Date(b.ts_iso || 0) - new Date(a.ts_iso || 0);
  });

  // Result count
  document.getElementById('resultCount').textContent =
    `Showing ${allAttempts.length} of ${attemptsTotal} attempt${attemptsTotal !== 1 ? 's' : ''}`;

  renderList();
}

// Debounced search handler
function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    attemptsPage = 0;
    loadAttempts(false);
  }, 220);
}

// ── Render list ────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('attemptList');
  const wrap = document.getElementById('loadMoreWrap');

  if (!filteredAttempts.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <p>No attempts match your filters.<br/>Try adjusting the filters above.</p>
      </div>`;
    wrap.classList.remove('show');
    return;
  }

  // Render all loaded attempts (DB pagination controls the set)
  list.innerHTML = '';
  filteredAttempts.forEach(a => list.appendChild(buildCard(a)));

  // Show/hide load more button based on DB total
  if (allAttempts.length < attemptsTotal) {
    wrap.classList.add('show');
  } else {
    wrap.classList.remove('show');
  }
}

function loadMore() {
  attemptsPage += 1;
  loadAttempts(true);
}

// ── Build a single attempt card ────────────────────────────────
function buildCard(a) {
  const div = document.createElement('div');
  div.className = 'attempt-card';

  const isCompleted  = a.status === 'completed';
  const isInProgress = a.status === 'in_progress';

  // ── Dates & labels ──────────────────────────────────────
  const dateStr = a.ts_iso
    ? new Date(a.ts_iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
    : '—';
  const timeStr = a.ts_iso
    ? new Date(a.ts_iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
    : '';

  const courseName = enrolledCourses.find(c => c.course_id === a.course_id)?.title
    || a.course_id || '—';

  const title = a.display_label || (a.quiz_id ? 'Fixed Quiz' : 'Custom Quiz');

  // ── Score ───────────────────────────────────────────────
  let scoreMain, scoreSub;
  if (isCompleted && a.score_total > 0) {
    scoreMain = `${a.score_raw}/${a.score_total} (${Math.round(a.score_pct)}%)`;
    scoreSub  = formatDuration(a.time_taken_s);
  } else if (isInProgress) {
    scoreMain = '—';
    scoreSub  = 'In progress';
  } else {
    scoreMain = '—';
    scoreSub  = 'Abandoned';
  }

  // ── Runner URL (instant vs timed) ──────────────────────
  const runnerBase = a.mode === 'timed'
    ? `${LICENSURE.runner}/timed.html`
    : `${LICENSURE.runner}/instant.html`;

  // ── Build HTML ──────────────────────────────────────────
  div.innerHTML = `
    <!-- Left: main info -->
    <div class="attempt-main">
      <div class="attempt-meta">
        <span class="date">${dateStr}</span>
        ${timeStr ? `<span>·</span><span>${timeStr}</span>` : ''}
        <span>·</span>
        <span class="course-name">${escHtml(courseName)}</span>
      </div>
      <div class="attempt-title">${escHtml(title)}</div>
      <div class="chips-row">
        ${a.mode   ? `<span class="chip mode-${a.mode}">${a.mode === 'timed' ? 'Timed' : 'Instant'}</span>` : ''}
        ${a.status ? `<span class="chip status-${a.status}">${formatStatus(a.status)}</span>` : ''}
        ${a.source ? `<span class="chip source-${a.source}">${formatSource(a.source)}</span>` : ''}
        ${a.n      ? `<span class="chip">${a.n} Q</span>` : ''}
      </div>
    </div>

    <!-- Right: score + actions -->
    <div class="attempt-side">
      <div class="score-block">
        <div class="score-main ${isCompleted ? '' : 'not-done'}">${escHtml(scoreMain)}</div>
        <div class="score-sub">${escHtml(scoreSub)}</div>
      </div>
      <div class="attempt-actions" id="actions-${escHtml(a.attempt_id)}"></div>
    </div>
  `;

  // ── Wire up buttons after inserting HTML ────────────────
  const actionsEl = div.querySelector(`#actions-${a.attempt_id}`);

  // RESUME button — enabled only when in_progress
  const btnResume = document.createElement('button');
  btnResume.className = 'act-btn btn-resume';
  btnResume.textContent = '▶ Resume';
  btnResume.disabled = !isInProgress;
  btnResume.title = isInProgress ? 'Continue this attempt' : 'Only available for in-progress attempts';
  btnResume.addEventListener('click', () => {
    location.href = `${runnerBase}?attempt_id=${encodeURIComponent(a.attempt_id)}`;
  });

  // REVIEW button — enabled only when completed
  const btnReview = document.createElement('button');
  btnReview.className = 'act-btn btn-review';
  btnReview.textContent = '👁 Review';
  btnReview.disabled = !isCompleted;
  btnReview.title = isCompleted ? 'Review your answers' : 'Complete this attempt first';
  btnReview.addEventListener('click', () => {
    location.href = `${runnerBase}?attempt_id=${encodeURIComponent(a.attempt_id)}&review=1`;
  });

  // RETAKE button — enabled only when completed
  const btnRetake = document.createElement('button');
  btnRetake.className = 'act-btn btn-retake';
  btnRetake.textContent = '↩ Retake';
  btnRetake.disabled = !isCompleted;
  btnRetake.title = isCompleted ? 'Retake with same questions' : 'Complete this attempt first';
  btnRetake.addEventListener('click', () => handleRetake(a, btnRetake, runnerBase));

  actionsEl.appendChild(btnResume);
  actionsEl.appendChild(btnReview);
  actionsEl.appendChild(btnRetake);

  return div;
}

// ── Retake handler ─────────────────────────────────────────────
// Calls retakeAttempt() from api.js, then redirects to runner
async function handleRetake(originalAttempt, btn, runnerBase) {
  if (!PROFILE) return;

  const original = btn.textContent;
  btn.disabled   = true;
  btn.textContent = '…Starting';

  try {
    const newAttempt = await retakeAttempt(originalAttempt, PROFILE.user_id);

    if (!newAttempt || !newAttempt.attempt_id) {
      throw new Error('Could not create retake attempt');
    }

    location.href = `${runnerBase}?attempt_id=${encodeURIComponent(newAttempt.attempt_id)}`;

  } catch (err) {
    console.error('Retake failed:', err);
    alert('Could not start retake. Please try again.\n\n' + (err.message || ''));
    btn.disabled   = false;
    btn.textContent = original;
  }
}

// ── Clear URL course filter ────────────────────────────────────
function clearCourseFilter() {
  window.location.href = `${LICENSURE.student}/learning-history.html`;
}

// ── Helpers ────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatStatus(s) {
  if (s === 'in_progress') return 'In Progress';
  if (s === 'completed')   return 'Completed';
  if (s === 'abandoned')   return 'Abandoned';
  return s;
}

function formatSource(s) {
  if (s === 'fixed')   return 'Fixed Quiz';
  if (s === 'builder') return 'Builder';
  if (s === 'retake')  return 'Retake';
  return s;
}

// Converts seconds into "X min Ys" for the score sub-line
function formatDuration(secs) {
  const t = Number(secs || 0);
  if (!t) return '';
  const m = Math.floor(t / 60);
  const s = t % 60;
  if (m && s) return `${m}m ${s}s`;
  if (m)      return `${m} min`;
  return `${s}s`;
}

// ── Start ──────────────────────────────────────────────────────
initPage();
</script>
