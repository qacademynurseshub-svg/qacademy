<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements — QAcademy</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .user-menu {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logout-btn {
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ── Announcement cards ── */
    .announce-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .announce-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      position: relative;
      transition: box-shadow 0.15s;
    }
    .announce-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

    /* Pinned cards get a left accent border */
    .announce-card.pinned {
      border-left: 4px solid var(--accent);
    }

    /* Read cards are slightly faded to signal "already acknowledged" */
    .announce-card.is-read {
      opacity: 0.65;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
    }

    .pin-badge {
      font-size: 11px;
      background: #e0f2fe;
      color: #1d4ed8;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 600;
    }

    .read-badge {
      font-size: 11px;
      background: #f0fdf4;
      color: #166534;
      border-radius: 999px;
      padding: 2px 8px;
      font-weight: 600;
    }

    .card-date {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-body {
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 14px;
    }
    .card-body p  { margin: 0 0 8px; }
    .card-body p:last-child { margin-bottom: 0; }
    .card-body strong { font-weight: 700; }
    .card-body em     { font-style: italic; }

    /* CTA button inside announcement body */
    .card-body a[data-qa="btn"] {
      display: inline-block;
      padding: 8px 18px;
      background: var(--accent);
      color: white;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .card-body a[data-qa="btn"]:hover {
      background: var(--primary);
    }
    /* Regular links inside body */
    .card-body a:not([data-qa="btn"]) {
      color: var(--accent);
      text-decoration: underline;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Empty / loading states ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* ── Tab filter ── */
    .tab-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    .tab-btn:hover { color: var(--primary); }

  </style>
</head>
<body>

<div class="dashboard-wrapper">

  <!-- ── Sidebar ── -->
  <div id="sidebar"></div>

  <!-- ── Main Content ── -->
  <main class="main-content">

    <!-- Top Nav -->
    <div class="top-nav">
      <div class="page-header" style="margin-bottom:0">
        <h1>Announcements</h1>
        <p id="pageSubtitle">Loading…</p>
      </div>
      <div class="user-menu">
        <span class="user-name" id="userName"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>

    <!-- Tab filter -->
<div class="tab-bar">
  <button class="tab-btn active" id="tabAll"       onclick="setTab('all')">All</button>
  <button class="tab-btn"        id="tabUnread"    onclick="setTab('unread')">Unread</button>
  <button class="tab-btn"        id="tabRead"      onclick="setTab('read')">Read</button>
  <button class="tab-btn"        id="tabDismissed" onclick="setTab('dismissed')">Dismissed</button>
</div>

    <!-- Announcements list -->
    <div class="announce-list" id="announceList">
      <div class="empty-state">
        <div class="empty-icon">📢</div>
        <p>Loading announcements…</p>
      </div>
    </div>

  </main>
</div>


<!-- ══════════════════════════════════════
     SCRIPTS
════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/paths.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/mynmclicensure-student-sidebar.js"></script>
<script src="/js/mynmclicensure-api.js"></script>
<script>

  let currentProfile    = null;
  let allAnnouncements  = [];   // active, in-schedule announcements
  let userStates        = {};   // { announcement_id: 'read' | 'clicked' | 'dismissed' }
  let currentTab        = 'all';

  // ─── Init ─────────────────────────────────────────────────
  async function init() {
    currentProfile = await guardPage('STUDENT');
    if (!currentProfile) return;

    document.getElementById('userName').textContent =
      currentProfile.forename || currentProfile.name || currentProfile.email;

    const [courseAccessMap, allCourses] = await Promise.all([
      getStudentCourseAccess(currentProfile.user_id),
      getCourses()
    ]);
    populateCourseDropdown(courseAccessMap, allCourses);

    await loadAnnouncements();
  }

  // ─── Load announcements ───────────────────────────────────
  async function loadAnnouncements() {
    // getAnnouncements() from api.js — returns active, in-schedule announcements
    // ordered pinned first, then by priority
const raw = await getAnnouncements();

// Get student's active subscription kind and product for scope filtering
let subscriptionKind = 'FREE';
let activeProductId  = '';

const { data: activeSub } = await db
  .from('subscriptions')
  .select('product_id, products(kind)')
  .eq('user_id', currentProfile.user_id)
  .eq('status', 'ACTIVE')
  .order('expires_utc', { ascending: false })
  .limit(1)
  .maybeSingle();

if (activeSub) {
  subscriptionKind                  = activeSub.products?.kind || 'FREE';
  activeProductId                   = activeSub.product_id || '';
  currentProfile.activeProductId    = activeProductId;
}

// Filter to only announcements this student qualifies for
allAnnouncements = filterAnnouncementsForStudent(raw, currentProfile, subscriptionKind);
    // Load this student's state for all announcements
    // We need all states (read, clicked, dismissed) not just dismissed
    const { data: stateRows } = await db
      .from('user_notice_state')
      .select('item_id, state')
      .eq('user_id', currentProfile.user_id)
      .eq('item_type', 'ANNOUNCEMENT');

    // Build lookup: { announcement_id: state }
    // If a student both read and clicked, we keep the "highest" state
    // Priority: clicked > read > dismissed
    const statePriority = { dismissed: 1, read: 2, clicked: 3 };
    userStates = {};
    (stateRows || []).forEach(row => {
      const existing = userStates[row.item_id];
      if (!existing || (statePriority[row.state] || 0) > (statePriority[existing] || 0)) {
        userStates[row.item_id] = row.state;
      }
    });

    // Update the subtitle
    const total   = allAnnouncements.length;
    const unread  = allAnnouncements.filter(a => !userStates[a.announcement_id]).length;
    document.getElementById('pageSubtitle').textContent =
      `${total} announcement${total !== 1 ? 's' : ''} · ${unread} unread`;

    renderList();
  }

  // ─── Tab control ──────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
  renderList();
}

  // ─── Render list ──────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('announceList');

    // Filter by tab
 let visible = allAnnouncements.filter(a => {
  const state = userStates[a.announcement_id];
  if (currentTab === 'dismissed') return state === 'dismissed';
  if (currentTab === 'unread')    return !state;
  if (currentTab === 'read')      return state === 'read' || state === 'clicked';
  // 'all' tab — shows everything except dismissed
  return state !== 'dismissed';
});

    if (!visible.length) {
   list.innerHTML = `
  <div class="empty-state">
    <div class="empty-icon">${currentTab === 'dismissed' ? '🗑️' : currentTab === 'unread' ? '🎉' : '📭'}</div>
    <p>${
      currentTab === 'unread'
        ? 'You\'re all caught up — no unread announcements.'
        : currentTab === 'read'
        ? 'No read announcements yet.'
        : currentTab === 'dismissed'
        ? 'No dismissed announcements.'
        : 'No announcements at the moment.'
    }</p>
  </div>`;
      return;
    }

    list.innerHTML = visible.map(a => {
      const state   = userStates[a.announcement_id];
      const isRead  = state === 'read' || state === 'clicked';

      const dateStr = a.created_at
        ? new Date(a.created_at).toLocaleDateString('en-GB', {
            day: 'numeric', month: 'long', year: 'numeric'
          })
        : '';

      const pinnedBadge = a.pinned
        ? `<span class="pin-badge">📌 Pinned</span>` : '';

      const readBadge = isRead
        ? `<span class="read-badge">✅ Read</span>` : '';

      // Sanitise body for display
      const bodyHtml = sanitiseHtml(a.body_html || a.body_text || '');

      // Action buttons
      // If already read/clicked — only show Dismiss (if dismissible)
      // If unread — show Mark as Read + Dismiss
      const markReadBtn = !isRead
        ? `<button class="btn btn-primary" style="font-size:13px; padding:7px 14px;"
             onclick="markRead('${a.announcement_id}', this)">✅ Mark as Read</button>`
        : '';

      const dismissBtn = a.dismissible
        ? `<button class="btn btn-ghost" style="font-size:13px; padding:7px 14px;"
             onclick="dismiss('${a.announcement_id}', this)">✕ Dismiss</button>`
        : '';

      return `
        <div class="announce-card ${a.pinned ? 'pinned' : ''} ${isRead ? 'is-read' : ''}"
             id="card-${a.announcement_id}">
          <div class="card-top">
            <div>
              <div class="card-title-row">
                <span class="card-title">${escapeHtml(a.title)}</span>
                ${pinnedBadge}
                ${readBadge}
              </div>
              <div style="font-size:12px; color:var(--text-muted); margin-top:3px;">${dateStr}</div>
            </div>
          </div>
          ${bodyHtml
            ? `<div class="card-body">${bodyHtml}</div>`
            : ''
          }
          <div class="card-actions">
            ${markReadBtn}
            ${dismissBtn}
          </div>
        </div>`;
    }).join('');

    // Attach click tracking to all data-qa="btn" links inside announcement bodies
    // When a student clicks a CTA button, we record state = 'clicked'
    document.querySelectorAll('.card-body a[data-qa="btn"]').forEach(link => {
      link.addEventListener('click', function() {
        // Find the parent card's announcement ID
        const card = this.closest('.announce-card');
        if (!card) return;
        const id = card.id.replace('card-', '');
        recordState(id, 'clicked');
      });
    });
  }

  // ─── Mark as Read ─────────────────────────────────────────
  async function markRead(announcementId, btn) {
    btn.disabled = true;
    btn.textContent = 'Saving…';

    await recordState(announcementId, 'read');

    // Update local state and re-render
    userStates[announcementId] = 'read';
    renderList();

    // Update subtitle
    const unread = allAnnouncements.filter(a => !userStates[a.announcement_id]).length;
    document.getElementById('pageSubtitle').textContent =
      `${allAnnouncements.length} announcement${allAnnouncements.length !== 1 ? 's' : ''} · ${unread} unread`;
  }

  // ─── Dismiss ──────────────────────────────────────────────
async function dismiss(announcementId, btn) {
  btn.disabled = true;
  btn.textContent = 'Dismissing…';

  await recordState(announcementId, 'dismissed');

  // Update local state and re-render
  // Card moves to Dismissed tab — not removed permanently
  const card = document.getElementById(`card-${announcementId}`);
  if (card) {
    card.style.transition = 'opacity 0.3s';
    card.style.opacity = '0';
    setTimeout(() => {
      userStates[announcementId] = 'dismissed';
      renderList();
      // Update subtitle
      const unread = allAnnouncements.filter(a => !userStates[a.announcement_id]).length;
      document.getElementById('pageSubtitle').textContent =
        `${allAnnouncements.length} announcement${allAnnouncements.length !== 1 ? 's' : ''} · ${unread} unread`;
    }, 300);
  }
}

  // ─── Record state to DB ───────────────────────────────────
  // This is the single function that writes to user_notice_state.
  // It uses upsert so if a row already exists it updates it,
  // rather than creating duplicate rows.
  async function recordState(announcementId, state) {
    // We use upsert with onConflict to handle the case where
    // a row already exists for this user + item combination.
    // The unique constraint is on (user_id, item_type, item_id).
    const { error } = await db
      .from('user_notice_state')
      .upsert({
        user_id:   currentProfile.user_id,
        item_type: 'ANNOUNCEMENT',
        item_id:   announcementId,
        state:     state,
        seen_at:   new Date().toISOString(),
        updated_at: new Date().toISOString()
      }, {
        onConflict: 'user_id,item_type,item_id'
      });

    if (error) {
      console.error('recordState error:', error);
    }
  }

  // ─── Sanitise HTML ────────────────────────────────────────
  // Same safe whitelist as admin page — only renders known safe tags
  function sanitiseHtml(raw) {
    if (!raw) return '';
    const allowed = ['p','br','strong','em','b','i','ul','ol','li','a','code','img'];
    const div = document.createElement('div');
    div.innerHTML = raw;

    function clean(node) {
      if (node.nodeType === Node.TEXT_NODE) return;
      if (node.nodeType === Node.ELEMENT_NODE) {
        const tag = node.tagName.toLowerCase();
        if (!allowed.includes(tag)) {
          node.replaceWith(document.createTextNode(node.textContent));
          return;
        }
        if (tag === 'a') {
          const href  = node.getAttribute('href') || '';
          const dataQa = node.getAttribute('data-qa') || '';
          Array.from(node.attributes).forEach(attr => node.removeAttribute(attr.name));
          if (href)   node.setAttribute('href', href);
          if (dataQa) node.setAttribute('data-qa', dataQa);
          node.setAttribute('target', '_blank');
          node.setAttribute('rel', 'noopener');
        }
        if (tag === 'img') {
          const src = node.getAttribute('src') || '';
          const alt = node.getAttribute('alt') || '';
          Array.from(node.attributes).forEach(attr => node.removeAttribute(attr.name));
          if (src) node.setAttribute('src', src);
          if (alt) node.setAttribute('alt', alt);
          node.style.maxWidth = '100%';
        }
        Array.from(node.childNodes).forEach(clean);
      }
    }

    Array.from(div.childNodes).forEach(clean);
    return div.innerHTML;
  }

  // ─── Escape HTML ──────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ─── Start ────────────────────────────────────────────────
  init();

</script>
</body>
</html>
