<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Users — QAcademy Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>

    /* ── Page layout ── */
    .page-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .filter-select {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: var(--white);
      cursor: pointer;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* ── Users table ── */
    .users-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .users-table th {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 2px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    .users-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .users-table tr:last-child td {
      border-bottom: none;
    }

    .users-table tr:hover td {
      background: var(--primary-light);
      cursor: pointer;
    }

    .role-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .role-chip.STUDENT { background: var(--primary-light); color: var(--primary); }
    .role-chip.TEACHER { background: #f0fdf4; color: var(--success); }
    .role-chip.ADMIN   { background: #fef2f2; color: var(--danger); }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-dot.active   { background: var(--success); }
    .status-dot.inactive { background: var(--danger); }

    .results-count {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Side panel ── */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
    }

    .panel-overlay.open { display: block; }

    .side-panel {
      position: fixed;
      top: 0;
      right: -480px;
      width: 480px;
      max-width: 95vw;
      height: 100vh;
      background: var(--white);
      border-left: 1px solid var(--border);
      z-index: 101;
      overflow-y: auto;
      transition: right 0.25s ease;
      padding: 0;
    }

    .side-panel.open { right: 0; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1;
    }

    .panel-header h2 {
      font-size: 17px;
      font-weight: 700;
    }

    .panel-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 0;
    }

    .panel-close:hover { color: var(--danger); }

    .panel-body { padding: 24px; }

    .panel-section {
      margin-bottom: 28px;
    }

    .panel-section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .detail-label {
      color: var(--text-muted);
      flex-shrink: 0;
      margin-right: 12px;
    }

    .detail-value {
      font-weight: 500;
      text-align: right;
    }

    /* Subscription card inside panel */
    .sub-card {
      background: var(--primary-light);
      border: 1px solid var(--primary);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 14px;
    }

    .sub-card-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .sub-card-expiry {
      font-size: 13px;
      color: var(--text-muted);
    }

    .sub-card-expiry.warning { color: var(--warning); font-weight: 600; }
    .sub-card-expiry.expired { color: var(--danger); font-weight: 600; }

    .no-sub-badge {
      background: #f3f4f6;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-muted);
    }

    /* History table inside panel */
    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .history-table th {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 600;
    }

    .history-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }

    .history-table tr:last-child td { border-bottom: none; }

    /* Action buttons inside panel */
    .panel-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-action {
      width: 100%;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      text-align: left;
      transition: background 0.15s;
    }

    .btn-action:hover { background: var(--bg); }

    .btn-action.danger {
      border-color: #fecaca;
      color: var(--danger);
    }

    .btn-action.danger:hover { background: #fef2f2; }

    .btn-action.success {
      border-color: #bbf7d0;
      color: var(--success);
    }

    .btn-action.success:hover { background: #f0fdf4; }

    /* Assign subscription form inside panel */
    .assign-form {
      display: none;
      margin-top: 12px;
      padding: 16px;
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .assign-form.open { display: block; }

    .assign-form select,
    .assign-form input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      margin-bottom: 10px;
      background: var(--white);
    }

    .assign-form-actions {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
    }

    .btn-sm-primary { background: var(--primary); color: var(--white); }
    .btn-sm-primary:hover { background: var(--primary-dark); }

    .btn-sm-cancel {
      background: var(--white);
      color: var(--text-muted);
      border: 1px solid var(--border) !important;
      border: none;
    }

    /* Alert inside panel */
    .panel-alert {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .panel-alert.show { display: block; }
    .panel-alert.success { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
    .panel-alert.error   { background: #fef2f2; color: var(--danger);  border: 1px solid #fecaca; }

    /* Top nav */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .logout-btn {
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .logout-btn:hover { color: var(--danger); }

  </style>
</head>
<body>

<div class="dashboard-wrapper">

  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Top Nav -->
    <div class="top-nav">
      <div class="page-header" style="margin-bottom:0">
        <h1>Users</h1>
        <p>Search, view and manage all platform users</p>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <span style="font-size:14px; font-weight:500;" id="adminName"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>

    <!-- Toolbar: search + filters -->
    <div class="page-toolbar">
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Search by name or email..."
        oninput="applyFilters()"
      />
      <select class="filter-select" id="roleFilter" onchange="applyFilters()">
        <option value="">All Roles</option>
        <option value="STUDENT">Student</option>
        <option value="TEACHER">Teacher</option>
        <option value="ADMIN">Admin</option>
      </select>
      <select class="filter-select" id="programFilter" onchange="applyFilters()">
        <option value="">All Programmes</option>
      </select>
    </div>

    <!-- Results count -->
    <div class="results-count" id="resultsCount"></div>

    <!-- Users Table -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div id="usersTableArea">
        <p style="padding:24px; color:var(--text-muted); font-size:14px;">Loading users...</p>
      </div>
    </div>

    <!-- Load More -->
    <button id="loadMoreBtn" class="btn-action" style="display:none; margin-top:16px; text-align:center; width:100%;" onclick="loadMore()">
      Load More
    </button>

  </main>
</div>

<!-- Panel overlay (darkens background) -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>

<!-- Side Panel -->
<div class="side-panel" id="sidePanel">

  <div class="panel-header">
    <h2 id="panelName">User Details</h2>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>

  <div class="panel-body">

    <!-- Alert area -->
    <div class="panel-alert" id="panelAlert"></div>

    <!-- Profile Details -->
    <div class="panel-section">
      <div class="panel-section-title">Profile</div>
      <div id="panelProfile"></div>
    </div>

    <!-- Subscription -->
    <div class="panel-section">
      <div class="panel-section-title">Active Subscription</div>
      <div id="panelSubscription"></div>
    </div>

    <!-- Subscription History -->
    <div class="panel-section">
      <div class="panel-section-title">Subscription History</div>
      <div id="panelHistory"></div>
    </div>

    <!-- Actions -->
    <div class="panel-section">
      <div class="panel-section-title">Actions</div>
      <div class="panel-actions">

        <!-- Assign Subscription -->
        <button class="btn-action" onclick="toggleAssignForm()">
          🎟️ Assign Subscription
        </button>
        <div class="assign-form" id="assignForm">
          <select id="assignProduct">
            <option value="">Select a product...</option>
          </select>
          <input type="date" id="assignStartDate" title="Start date (leave blank for today)" />
          <div class="assign-form-actions">
            <button class="btn-sm btn-sm-primary" onclick="submitAssignSubscription()">Confirm</button>
            <button class="btn-sm btn-sm-cancel" onclick="toggleAssignForm()">Cancel</button>
          </div>
        </div>

        <!-- Password Reset -->
        <button class="btn-action" onclick="handlePasswordReset()">
          🔑 Send Password Reset Email
        </button>

        <!-- Deactivate / Activate -->
        <button class="btn-action danger" id="deactivateBtn" onclick="handleToggleActive()">
          🚫 Deactivate Account
        </button>

      </div>
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/paths.js"></script>
<script src="/js/mynmclicensure-admin-sidebar.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/mynmclicensure-api.js"></script>
<script>

  // ── State ──────────────────────────────────────────────
  let currentPage = 0;
  let totalUsers = 0;
  let currentSearch = '';
  let currentRole = '';
  let currentProgram = '';
  let isLoading = false;
  let searchTimer = null;
  let currentUser = null;   // user currently open in panel

  // ── Init ───────────────────────────────────────────────
  async function init() {
    const profile = await guardPage('ADMIN');
    if (!profile) return;

    document.getElementById('adminName').textContent = profile.forename || profile.name || profile.email;

    // Load programmes into filter dropdown (from api.js)
    const programs = await getPrograms();
    const programFilter = document.getElementById('programFilter');
    programs.forEach(p => {
      programFilter.innerHTML += `<option value="${p.program_id}">${p.program_name}</option>`;
    });

    // Load products into assign subscription dropdown (from api.js)
    const products = await getProducts();
    const assignProduct = document.getElementById('assignProduct');
    products.forEach(p => {
      const price = p.price_minor > 0
        ? ` — ${p.currency} ${(p.price_minor / 100).toFixed(2)}`
        : ' — Free';
      assignProduct.innerHTML += `<option value="${p.product_id}">${p.name}${price} (${p.duration_days}d)</option>`;
    });

    // Load first page of users
    await loadUsers(false);
  }

  // ── Load users ─────────────────────────────────────────
  async function loadUsers(append = false) {
    if (isLoading) return;
    isLoading = true;

    const result = await getUsers(currentSearch, currentRole, currentProgram, currentPage, 50);
    totalUsers = result.total;

    if (append) {
      // Append rows to existing table
      const tbody = document.querySelector('#usersTableArea tbody');
      if (tbody) tbody.innerHTML += buildRows(result.users);
    } else {
      renderTable(result.users);
    }

    // Update results count
    const shown = document.querySelectorAll('#usersTableArea tbody tr').length;
    document.getElementById('resultsCount').textContent =
      `Showing ${shown} of ${totalUsers} user${totalUsers !== 1 ? 's' : ''}`;

    // Show/hide Load More button
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    loadMoreBtn.style.display = shown < totalUsers ? 'block' : 'none';

    isLoading = false;
  }

  // ── Filter ─────────────────────────────────────────────
  function applyFilters() {
    const search = document.getElementById('searchInput').value;
    const role   = document.getElementById('roleFilter').value;
    const prog   = document.getElementById('programFilter').value;

    // Debounce search input (300ms)
    if (search !== currentSearch) {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearch = search;
        currentRole = role;
        currentProgram = prog;
        currentPage = 0;
        loadUsers(false);
      }, 300);
      return;
    }

    // Role/programme changed — apply immediately
    currentSearch = search;
    currentRole = role;
    currentProgram = prog;
    currentPage = 0;
    loadUsers(false);
  }

  // ── Load More ──────────────────────────────────────────
  function loadMore() {
    currentPage += 1;
    loadUsers(true);
  }

  // ── Build row HTML ─────────────────────────────────────
  function buildRows(users) {
    let rows = '';
    users.forEach(u => {
      const date = u.created_utc
        ? new Date(u.created_utc).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
        : '—';

      const statusDot = u.active
        ? '<span class="status-dot active"></span>Active'
        : '<span class="status-dot inactive"></span>Inactive';

      rows += `
        <tr onclick="openPanel('${u.user_id}')">
          <td>
            <div style="font-weight:500;">${escapeHtml(u.name || ((u.forename || '') + ' ' + (u.surname || '')).trim() || '—')}</div>
            <div style="font-size:12px; color:var(--text-muted);">${escapeHtml(u.email || '—')}</div>
          </td>
          <td>${u.program_id || '—'}</td>
          <td><span class="role-chip ${u.role}">${u.role}</span></td>
          <td style="font-size:13px;">${statusDot}</td>
          <td style="font-size:13px; color:var(--text-muted);">${date}</td>
        </tr>`;
    });
    return rows;
  }

  // ── Render table ───────────────────────────────────────
  function renderTable(users) {
    const area = document.getElementById('usersTableArea');

    if (users.length === 0) {
      area.innerHTML = '<p style="padding:24px; color:var(--text-muted); font-size:14px;">No users found.</p>';
      return;
    }

    area.innerHTML = `
      <table class="users-table">
        <thead>
          <tr>
            <th>Name / Email</th>
            <th>Programme</th>
            <th>Role</th>
            <th>Status</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody>${buildRows(users)}</tbody>
      </table>`;
  }

  // ── Open panel ─────────────────────────────────────────
  async function openPanel(userId) {
    // Show panel immediately with loading state
    document.getElementById('panelProfile').innerHTML = '<p style="color:var(--text-muted); font-size:14px;">Loading...</p>';
    document.getElementById('panelSubscription').innerHTML = '';
    document.getElementById('panelHistory').innerHTML = '';
    document.getElementById('panelAlert').classList.remove('show');

    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('panelOverlay').classList.add('open');

    // Fetch full user data (api.js returns user + subscription + history)
    const user = await getUserById(userId);
    if (!user) return;

    currentUser = user;

    // Panel title
    document.getElementById('panelName').textContent =
      user.name || (user.forename + ' ' + user.surname) || user.email;

    // Profile section
    document.getElementById('panelProfile').innerHTML = `
      <div class="detail-row">
        <span class="detail-label">Full Name</span>
        <span class="detail-value">${user.name || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Email</span>
        <span class="detail-value">${user.email}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Programme</span>
        <span class="detail-value">${user.program_id || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Level</span>
        <span class="detail-value">${user.level || '—'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Role</span>
        <span class="detail-value"><span class="role-chip ${user.role}">${user.role}</span></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Account Status</span>
        <span class="detail-value">
          <span class="status-dot ${user.active ? 'active' : 'inactive'}"></span>
          ${user.active ? 'Active' : 'Inactive'}
        </span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Joined</span>
        <span class="detail-value">${user.created_utc ? new Date(user.created_utc).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '—'}</span>
      </div>`;

    // Subscription section
    const sub = user.activeSubscription;
    if (sub) {
      const expiry = new Date(sub.expires_utc);
      const now = new Date();
      const daysLeft = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
      const expiryClass = daysLeft < 0 ? 'expired' : daysLeft <= 7 ? 'warning' : '';
      const expiryText = daysLeft < 0
        ? `Expired ${expiry.toLocaleDateString('en-GB')}`
        : daysLeft <= 7
          ? `⚠️ Expires in ${daysLeft} day${daysLeft === 1 ? '' : 's'}`
          : `Expires ${expiry.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}`;

      document.getElementById('panelSubscription').innerHTML = `
        <div class="sub-card">
          <div class="sub-card-name">${sub.products?.name || 'Subscription'}</div>
          <div class="sub-card-expiry ${expiryClass}">${expiryText}</div>
        </div>`;
    } else {
      document.getElementById('panelSubscription').innerHTML =
        '<div class="no-sub-badge">No active subscription</div>';
    }

    // Subscription history
    const history = user.subscriptionHistory;
    if (history.length === 0) {
      document.getElementById('panelHistory').innerHTML =
        '<p style="font-size:13px; color:var(--text-muted);">No subscription history.</p>';
    } else {
      let rows = '';
      history.forEach(h => {
        const start  = new Date(h.start_utc).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
        const expiry = new Date(h.expires_utc).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
        rows += `
          <tr>
            <td>${h.products?.name || '—'}</td>
            <td>${start}</td>
            <td>${expiry}</td>
            <td>${h.status}</td>
          </tr>`;
      });
      document.getElementById('panelHistory').innerHTML = `
        <table class="history-table">
          <thead>
            <tr><th>Product</th><th>Start</th><th>Expires</th><th>Status</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // Deactivate/Activate button label
    const deactivateBtn = document.getElementById('deactivateBtn');
    if (user.active) {
      deactivateBtn.textContent = '🚫 Deactivate Account';
      deactivateBtn.className = 'btn-action danger';
    } else {
      deactivateBtn.textContent = '✅ Reactivate Account';
      deactivateBtn.className = 'btn-action success';
    }
  }

  // ── Close panel ────────────────────────────────────────
  function closePanel() {
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('panelOverlay').classList.remove('open');
    document.getElementById('assignForm').classList.remove('open');
    currentUser = null;
  }

  // ── Toggle assign form ─────────────────────────────────
  function toggleAssignForm() {
    document.getElementById('assignForm').classList.toggle('open');
  }

  // ── Submit assign subscription ─────────────────────────
  async function submitAssignSubscription() {
    if (!currentUser) return;

    const productId  = document.getElementById('assignProduct').value;
    const startDate  = document.getElementById('assignStartDate').value;

    if (!productId) {
      showPanelAlert('Please select a product.', 'error');
      return;
    }

    const result = await assignSubscription(currentUser.user_id, productId, startDate || null);

    if (!result.success) {
      showPanelAlert(result.message, 'error');
      return;
    }

    showPanelAlert('Subscription assigned successfully!', 'success');
    document.getElementById('assignForm').classList.remove('open');

    // Refresh panel to show new subscription
    await openPanel(currentUser.user_id);

    // Refresh table to reflect any status changes
    await loadUsers();
  }

  // ── Password reset ─────────────────────────────────────
  async function handlePasswordReset() {
    if (!currentUser) return;

    const result = await sendPasswordReset(currentUser.email);

    if (!result.success) {
      showPanelAlert('Failed to send reset email: ' + result.message, 'error');
      return;
    }

    showPanelAlert('Password reset email sent to ' + currentUser.email, 'success');
  }

  // ── Deactivate / Activate ──────────────────────────────
  async function handleToggleActive() {
    if (!currentUser) return;

    const result = currentUser.active
      ? await deactivateUser(currentUser.user_id)
      : await activateUser(currentUser.user_id);

    if (!result.success) {
      showPanelAlert('Action failed. Please try again.', 'error');
      return;
    }

    const action = currentUser.active ? 'deactivated' : 'reactivated';
    showPanelAlert(`Account ${action} successfully.`, 'success');

    // Refresh panel and table
    await openPanel(currentUser.user_id);
    await loadUsers();
  }

  // ── Panel alert helper ─────────────────────────────────
  function showPanelAlert(message, type) {
    const alert = document.getElementById('panelAlert');
    alert.textContent = message;
    alert.className = `panel-alert show ${type}`;

    // Auto-hide after 4 seconds
    setTimeout(() => alert.classList.remove('show'), 4000);
  }

  // ── Start ──────────────────────────────────────────────
  init();

</script>

</body>
</html>
