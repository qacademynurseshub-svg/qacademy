<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payments — QAcademy Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>

    /* ── Layout ── */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .user-menu { display: flex; align-items: center; gap: 12px; }
    .logout-btn {
      font-size: 13px; color: var(--text-muted);
      cursor: pointer; background: none; border: none;
      font-family: 'Inter', sans-serif;
    }
    .logout-btn:hover { color: var(--danger); }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-mini {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .stat-mini .label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
    }
    .stat-mini .value { font-size: 24px; font-weight: 700; color: var(--primary); }

    /* ── Filters bar ── */
    .filters-bar {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 140px; }
    .filter-group label {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .filter-group select,
    .filter-group input {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .filter-group select:focus,
    .filter-group input:focus { outline: none; border-color: var(--primary); }
    .filter-actions { display: flex; gap: 8px; align-self: flex-end; margin-left: auto; }

    /* ── Table ── */
    .table-wrapper {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .table-header h3 { font-size: 14px; font-weight: 600; color: var(--primary); margin: 0; }
    .result-count { font-size: 13px; color: var(--text-muted); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table thead { background: var(--bg); }
    .data-table th, .data-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: middle;
    }
    .data-table th {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .data-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .data-table tbody tr:hover { background: var(--primary-light); }
    .data-table tbody tr:last-child td { border-bottom: none; }

    /* ── Status chips ── */
    .status-chip {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 999px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .status-chip.ACTIVATED  { background: #dcfce7; color: #16a34a; }
    .status-chip.PAID       { background: #fef9c3; color: #ca8a04; }
    .status-chip.SETUP_REQUIRED { background: #fff7ed; color: #ea580c; }
    .status-chip.FAILED     { background: #fee2e2; color: #dc2626; }
    .status-chip.INIT       { background: #f1f5f9; color: #64748b; }

    /* ── Revenue card ── */
    .revenue-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-top: 20px;
    }
    .revenue-card h3 {
      font-size: 14px; font-weight: 600; color: var(--primary);
      margin: 0 0 16px;
    }
    .revenue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .revenue-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .revenue-item .r-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
    .revenue-item .r-value { font-size: 20px; font-weight: 700; color: var(--accent); }
    .revenue-item .r-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .revenue-total {
      font-size: 13px; font-weight: 600; color: var(--primary);
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ── Side panel ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.35); z-index: 200;
    }
    .overlay.show { display: block; }
    .side-panel {
      position: fixed; top: 0; right: -480px; width: 460px; height: 100%;
      background: var(--white); border-left: 1px solid var(--border);
      z-index: 201; transition: right 0.25s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .side-panel.open { right: 0; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header h3 { font-size: 15px; font-weight: 600; color: var(--primary); margin: 0; }
    .panel-close {
      background: none; border: none; font-size: 20px;
      color: var(--text-muted); cursor: pointer; line-height: 1;
    }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px; }
    .panel-actions {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; flex-shrink: 0; flex-wrap: wrap;
    }

    /* ── Panel detail rows ── */
    .detail-section { margin-bottom: 20px; }
    .detail-section-title {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .detail-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 6px 0; font-size: 13px; gap: 12px;
    }
    .detail-row .key { color: var(--text-muted); flex-shrink: 0; }
    .detail-row .val { font-weight: 500; text-align: right; word-break: break-all; }

    /* ── Raw payload toggle ── */
    .raw-toggle {
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px 12px;
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; font-family: 'Inter', sans-serif;
      width: 100%; text-align: left; margin-top: 8px;
    }
    .raw-toggle:hover { border-color: var(--primary); color: var(--primary); }
    .raw-box {
      display: none; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; font-size: 11px; font-family: monospace;
      white-space: pre-wrap; word-break: break-all;
      max-height: 200px; overflow-y: auto; margin-top: 6px;
    }
    .raw-box.show { display: block; }

    /* ── Alert ── */
    .alert {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 12px; display: none;
    }
    .alert.show { display: block; }
    .alert-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
    .alert-error   { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    .alert-warn    { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }

    /* ── Buttons ── */
    .btn {
      padding: 9px 16px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; font-family: 'Inter', sans-serif;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-accent  { background: var(--accent); color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-warn    { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }

    /* ── Empty state ── */
    .empty-state {
      padding: 48px 24px; text-align: center; color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Failure note box ── */
    .failure-note {
      background: #fee2e2; border: 1px solid #fecaca;
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 12px; color: #dc2626; margin-top: 8px;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .side-panel { width: 100%; right: -100%; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }

  </style>
</head>
<body>

<div class="dashboard-wrapper">

  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Top Nav -->
    <div class="top-nav">
      <div class="page-header" style="margin-bottom:0">
        <h1>Payments</h1>
        <p>View and manage all payment records</p>
      </div>
      <div class="user-menu">
        <span style="font-size:14px; font-weight:500;" id="adminName"></span>
        <button class="logout-btn" onclick="logout()">Sign out</button>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-mini">
        <div class="label">Total</div>
        <div class="value" id="statTotal">—</div>
      </div>
      <div class="stat-mini">
        <div class="label">Activated</div>
        <div class="value" id="statActivated" style="color:var(--success)">—</div>
      </div>
      <div class="stat-mini">
        <div class="label">Paid (stuck)</div>
        <div class="value" id="statPaid" style="color:var(--warning)">—</div>
      </div>
      <div class="stat-mini">
        <div class="label">Setup Required</div>
        <div class="value" id="statSetup" style="color:#ea580c">—</div>
      </div>
      <div class="stat-mini">
        <div class="label">Failed</div>
        <div class="value" id="statFailed" style="color:var(--danger)">—</div>
      </div>
      <div class="stat-mini">
        <div class="label">Abandoned</div>
        <div class="value" id="statInit" style="color:var(--text-muted)">—</div>
      </div>
      <div class="stat-mini">
        <div class="label">Today's Revenue</div>
        <div class="value" id="statToday" style="color:var(--accent)">—</div>
      </div>
    </div>

    <!-- Filters Bar -->
    <div class="filters-bar">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" id="filterSearch" placeholder="Email or reference…" oninput="applyFilters()" />
      </div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">All statuses</option>
          <option value="ACTIVATED">Activated</option>
          <option value="PAID">Paid (stuck)</option>
          <option value="SETUP_REQUIRED">Setup Required</option>
          <option value="FAILED">Failed</option>
          <option value="INIT">Abandoned</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Product</label>
        <select id="filterProduct" onchange="applyFilters()">
          <option value="">All products</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Programme</label>
        <select id="filterProgramme" onchange="applyFilters()">
          <option value="">All programmes</option>
        </select>
      </div>
      <div class="filter-group">
        <label>From</label>
        <input type="date" id="filterFrom" onchange="applyFilters()" />
      </div>
      <div class="filter-group">
        <label>To</label>
        <input type="date" id="filterTo" onchange="applyFilters()" />
      </div>
      <div class="filter-actions">
        <button class="btn btn-ghost" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <div class="table-header">
        <h3>All Payments</h3>
        <span class="result-count" id="resultCount">Loading…</span>
      </div>
      <div id="tableArea">
        <div class="empty-state">Loading payments…</div>
      </div>
    </div>

    <!-- Revenue Summary -->
    <div class="revenue-card" id="revenueCard" style="display:none;">
      <h3>Revenue Summary — Activated Payments Only</h3>
      <div class="revenue-grid" id="revenueGrid"></div>
      <div class="revenue-total" id="revenueTotal"></div>
    </div>

  </main>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>

<!-- Side Panel -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <h3 id="panelTitle">Payment Details</h3>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-actions" id="panelActions"></div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/mynmclicensure-api.js"></script>
<script src="/js/paths.js"></script>
<script src="/js/mynmclicensure-admin-sidebar.js"></script>
<script>
'use strict';

let allPayments    = [];   // full dataset from Supabase
let allProducts    = [];   // for filter dropdown
let allPrograms    = [];   // for filter dropdown
let workerUrl      = '';   // from config table
let selectedRef    = null; // currently open panel reference

// ─── Init ─────────────────────────────────────────
async function init() {
  const profile = await guardPage('ADMIN');
  if (!profile) return;
  document.getElementById('adminName').textContent =
    profile.name || profile.forename || profile.email;

  // Load config for worker URL, products and programmes in parallel
  const [config, products, programs] = await Promise.all([
    getConfig(),
    getAllProducts(),
    getPrograms()
  ]);

  workerUrl  = (config.payments_worker_url || '').trim().replace(/\/+$/, '');
  allProducts = products;
  allPrograms = programs;

  // Populate filter dropdowns
  const prodSel = document.getElementById('filterProduct');
  products.forEach(p => {
    prodSel.innerHTML += `<option value="${p.product_id}">${p.name}</option>`;
  });
  const progSel = document.getElementById('filterProgramme');
  programs.forEach(p => {
    progSel.innerHTML += `<option value="${p.program_id}">${p.program_id} — ${p.program_name}</option>`;
  });

  await loadData();
}

// ─── Load all payments ────────────────────────────
async function loadData() {
  // Load payments and users separately — no FK join
  const [paymentsResult, users] = await Promise.all([
db.from('payments').select('*').order('paid_utc', { ascending: false, nullsFirst: false }),
    getUsers()
  ]);

  if (paymentsResult.error) {
    console.error('loadData:', paymentsResult.error);
    document.getElementById('tableArea').innerHTML =
      `<div class="empty-state">Error loading payments: ${paymentsResult.error.message}</div>`;
    return;
  }

  // Build email → user lookup map for fast client-side matching
  const usersByEmail = {};
  const usersById    = {};
  users.forEach(u => {
    if (u.email) usersByEmail[u.email.toLowerCase()] = u;
    if (u.user_id) usersById[u.user_id] = u;
  });

  // Attach matched user and product name to each payment row
  allPayments = (paymentsResult.data || []).map(p => {
    const matchedUser =
      (p.user_id && usersById[p.user_id]) ||
      (p.email   && usersByEmail[p.email.toLowerCase()]) ||
      null;

    // Also find product name from allProducts (already loaded)
    const matchedProduct = allProducts.find(x => x.product_id === p.product_id) || null;

    return {
      ...p,
      users:    matchedUser   ? { user_id: matchedUser.user_id, name: matchedUser.name, forename: matchedUser.forename, surname: matchedUser.surname, email: matchedUser.email, program_id: matchedUser.program_id } : null,
      products: matchedProduct ? { name: matchedProduct.name } : null
    };
  });

  updateStats();
  applyFilters();
  renderRevenue();
}

// ─── Stats ────────────────────────────────────────
function updateStats() {
  const todayStr = new Date().toISOString().substring(0, 10);

  let activated = 0, paid = 0, setup = 0, failed = 0, init = 0, todayRev = 0;

  allPayments.forEach(p => {
    if (p.status === 'ACTIVATED')      activated++;
    else if (p.status === 'PAID')      paid++;
    else if (p.status === 'SETUP_REQUIRED') setup++;
    else if (p.status === 'FAILED')    failed++;
    else if (p.status === 'INIT')      init++;

    // Today's revenue: activated payments where activated_utc is today
    if (p.status === 'ACTIVATED' && p.activated_utc) {
      const actDay = p.activated_utc.substring(0, 10);
      if (actDay === todayStr && p.amount_minor_paid) {
        todayRev += Number(p.amount_minor_paid);
      }
    }
  });

  document.getElementById('statTotal').textContent     = allPayments.length;
  document.getElementById('statActivated').textContent = activated;
  document.getElementById('statPaid').textContent      = paid;
  document.getElementById('statSetup').textContent     = setup;
  document.getElementById('statFailed').textContent    = failed;
  document.getElementById('statInit').textContent      = init;
  document.getElementById('statToday').textContent     = todayRev > 0
    ? formatMoney(todayRev, allPayments.find(p => p.amount_minor_paid && p.activated_utc?.substring(0,10) === new Date().toISOString().substring(0,10))?.currency || 'GHS')
    : '—';
}

// ─── Filters ──────────────────────────────────────
function applyFilters() {
  const search    = document.getElementById('filterSearch').value.toLowerCase().trim();
  const status    = document.getElementById('filterStatus').value;
  const product   = document.getElementById('filterProduct').value;
  const programme = document.getElementById('filterProgramme').value;
  const from      = document.getElementById('filterFrom').value;
  const to        = document.getElementById('filterTo').value;

  let filtered = allPayments.filter(p => {
    const email    = (p.email || '').toLowerCase();
    const ref      = (p.reference || '').toLowerCase();
    const name     = getUserName(p).toLowerCase();
    const progId   = p.users?.program_id || p.program_id || '';

    if (search    && !email.includes(search) && !ref.includes(search) && !name.includes(search)) return false;
    if (status    && p.status !== status)     return false;
    if (product   && p.product_id !== product) return false;
    if (programme && progId !== programme)    return false;
    if (from && p.paid_utc && p.paid_utc.substring(0,10) < from) return false;
if (to   && p.paid_utc && p.paid_utc.substring(0,10) > to)   return false;
    return true;
  });

  document.getElementById('resultCount').textContent =
    `${filtered.length} payment${filtered.length !== 1 ? 's' : ''}`;

  renderTable(filtered);
}

function clearFilters() {
  document.getElementById('filterSearch').value   = '';
  document.getElementById('filterStatus').value   = '';
  document.getElementById('filterProduct').value  = '';
  document.getElementById('filterProgramme').value = '';
  document.getElementById('filterFrom').value     = '';
  document.getElementById('filterTo').value       = '';
  applyFilters();
}

// ─── Table ────────────────────────────────────────
function renderTable(payments) {
  const area = document.getElementById('tableArea');

  if (payments.length === 0) {
    area.innerHTML = '<div class="empty-state">No payments match your filters.</div>';
    return;
  }

  let rows = '';
  payments.forEach(p => {
    const name    = getUserName(p);
    const email   = p.email || '—';
    const product = p.products?.name || p.product_name || '—';
    const amount  = p.amount_minor_paid
      ? formatMoney(p.amount_minor_paid, p.currency)
      : p.amount_minor_expected
        ? `(${formatMoney(p.amount_minor_expected, p.currency)})`
        : '—';
    const date = p.paid_utc
  ? new Date(p.paid_utc).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
  : '—';

    rows += `
      <tr onclick="openPanel('${escAttr(p.reference)}')">
        <td style="font-size:11px; color:var(--text-muted); font-family:monospace;">${escHtml(p.reference)}</td>
        <td>
          <div style="font-weight:500;">${escHtml(name)}</div>
          <div style="font-size:12px; color:var(--text-muted);">${escHtml(email)}</div>
        </td>
        <td style="font-size:13px;">${escHtml(product)}</td>
        <td style="font-size:13px; font-weight:600;">${amount}</td>
        <td><span class="status-chip ${p.status}">${formatStatus(p.status)}</span></td>
        <td style="font-size:12px; color:var(--text-muted); white-space:nowrap;">${date}</td>
      </tr>`;
  });

  area.innerHTML = `
    <table class="data-table">
      <thead>
        <tr>
          <th>Reference</th>
          <th>Student</th>
          <th>Product</th>
          <th>Amount</th>
          <th>Status</th>
<th>Paid</th>
</tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── Side Panel ───────────────────────────────────
function openPanel(reference) {
  const p = allPayments.find(x => x.reference === reference);
  if (!p) return;
  selectedRef = reference;

  const name  = getUserName(p);
  const email = p.email || '—';

  // ── Build detail rows ──
  let html = '';

  // Payment details section
  html += `<div class="detail-section">
    <div class="detail-section-title">Payment</div>
    <div class="detail-row"><span class="key">Reference</span><span class="val" style="font-family:monospace;font-size:12px;">${escHtml(p.reference)}</span></div>
    <div class="detail-row"><span class="key">Status</span><span class="val"><span class="status-chip ${p.status}">${formatStatus(p.status)}</span></span></div>
    <div class="detail-row"><span class="key">Product</span><span class="val">${escHtml(p.products?.name || p.product_name || '—')}</span></div>
    <div class="detail-row"><span class="key">Expected</span><span class="val">${p.amount_minor_expected ? formatMoney(p.amount_minor_expected, p.currency) : '—'}</span></div>
    <div class="detail-row"><span class="key">Paid</span><span class="val" style="${p.amount_minor_paid ? 'color:var(--success);font-weight:700;' : ''}">${p.amount_minor_paid ? formatMoney(p.amount_minor_paid, p.currency) : '—'}</span></div>
  </div>`;

  // Student section
  html += `<div class="detail-section">
    <div class="detail-section-title">Student</div>
    <div class="detail-row"><span class="key">Name</span><span class="val">${escHtml(name)}</span></div>
    <div class="detail-row"><span class="key">Email</span><span class="val">${escHtml(email)}</span></div>
    <div class="detail-row"><span class="key">Programme</span><span class="val">${escHtml(p.users?.program_id || p.program_id || '—')}</span></div>
    <div class="detail-row"><span class="key">Phone</span><span class="val">${escHtml(p.phone_number || '—')}</span></div>
  </div>`;

  // Timestamps section
  html += `<div class="detail-section">
    <div class="detail-section-title">Timeline</div>
    <div class="detail-row"><span class="key">Created</span><span class="val">${formatTs(p.created_at)}</span></div>
    <div class="detail-row"><span class="key">Paid</span><span class="val">${formatTs(p.paid_utc)}</span></div>
    <div class="detail-row"><span class="key">Activated</span><span class="val">${formatTs(p.activated_utc)}</span></div>
    ${p.setup_created_utc   ? `<div class="detail-row"><span class="key">Setup Started</span><span class="val">${formatTs(p.setup_created_utc)}</span></div>` : ''}
    ${p.setup_completed_utc ? `<div class="detail-row"><span class="key">Setup Completed</span><span class="val">${formatTs(p.setup_completed_utc)}</span></div>` : ''}
  </div>`;

  // Subscription link if activated
  if (p.subscription_id) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Subscription</div>
      <div class="detail-row"><span class="key">ID</span><span class="val" style="font-family:monospace;font-size:12px;">${escHtml(p.subscription_id)}</span></div>
    </div>`;
  }

  // Failure note if failed
  if (p.status === 'FAILED' && p.failure_note) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Failure Reason</div>
      <div class="failure-note">${escHtml(p.failure_note)}</div>
    </div>`;
  }

  // Raw payload toggle
  if (p.raw) {
    html += `<div class="detail-section">
      <div class="detail-section-title">Debug</div>
      <button class="raw-toggle" onclick="toggleRaw()">▶ Show raw payload</button>
      <div class="raw-box" id="rawBox">${escHtml(JSON.stringify(p.raw, null, 2))}</div>
    </div>`;
  }

  // Alert area for action feedback
  html += `<div class="alert alert-success" id="panelSuccess"></div>
           <div class="alert alert-error"   id="panelError"></div>
           <div class="alert alert-warn"    id="panelWarn"></div>`;

  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('panelTitle').textContent = `Payment — ${p.reference}`;

  // ── Build action buttons ──
  let actions = `<button class="btn btn-ghost" onclick="closePanel()">Close</button>`;

  // View Student — only if we have a matched user
  if (p.users?.user_id) {
    actions += `<button class="btn btn-ghost" onclick="viewStudent('${p.users.user_id}')">👤 View Student</button>`;
  }

  // Retry Activation — for PAID and SETUP_REQUIRED rows
  // For SETUP_REQUIRED: this refreshes the token so admin can copy a fresh setup link
  if (p.status === 'PAID' || p.status === 'SETUP_REQUIRED') {
    actions += `<button class="btn btn-warn" id="retryBtn" onclick="retryActivation('${escAttr(p.reference)}')">⚡ Retry Activation</button>`;
  }

  // Copy Setup Link — only for SETUP_REQUIRED rows
  if (p.status === 'SETUP_REQUIRED' && p.setup_token) {
    actions += `<button class="btn btn-accent" onclick="copySetupLink('${escAttr(p.reference)}', '${escAttr(p.setup_token)}')">📋 Copy Setup Link</button>`;
  }

  document.getElementById('panelActions').innerHTML = actions;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sidePanel').classList.add('open');
}

function closePanel() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('sidePanel').classList.remove('open');
  selectedRef = null;
}

// ─── Toggle raw payload ───────────────────────────
function toggleRaw() {
  const box = document.getElementById('rawBox');
  const btn = document.querySelector('.raw-toggle');
  if (!box) return;
  const showing = box.classList.toggle('show');
  btn.textContent = showing ? '▼ Hide raw payload' : '▶ Show raw payload';
}

// ─── Retry Activation ────────────────────────────
// Calls the Worker /payments/verify endpoint to re-attempt activation
// for payments stuck in PAID status
async function retryActivation(reference) {
  const btn = document.getElementById('retryBtn');
  const errEl = document.getElementById('panelError');
  const sucEl = document.getElementById('panelSuccess');
  const wrnEl = document.getElementById('panelWarn');
  [errEl, sucEl, wrnEl].forEach(el => el.classList.remove('show'));

  if (!workerUrl) {
    errEl.textContent = 'Worker URL not configured in config table (payments_worker_url).';
    errEl.classList.add('show');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Retrying…';

  try {
    const res = await fetch(`${workerUrl}/payments/verify?reference=${encodeURIComponent(reference)}`);
    const data = await res.json().catch(() => null);

    if (!res.ok || !data?.ok) {
      const msg = data?.message || data?.error || 'Activation failed.';
      errEl.textContent = `Retry failed: ${msg}`;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '⚡ Retry Activation';
      return;
    }

    if (data.status === 'ACTIVATED') {
      sucEl.textContent = '✅ Activation successful! Subscription has been created.';
      sucEl.classList.add('show');
      btn.textContent = 'Activated ✓';
      await loadData();
    } else if (data.status === 'SETUP_REQUIRED') {
      wrnEl.textContent = 'Payment verified but no account found yet. Student needs to complete setup.';
      wrnEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '⚡ Retry Activation';
      await loadData();
    } else {
      wrnEl.textContent = `Status returned: ${data.status || 'unknown'}. Check Paystack dashboard.`;
      wrnEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = '⚡ Retry Activation';
    }
  } catch (err) {
    errEl.textContent = `Network error: ${err.message}`;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = '⚡ Retry Activation';
  }
}

// ─── Copy Setup Link ──────────────────────────────
// Builds the setup URL and copies it to clipboard so you
// can send it manually to a student who paid but never completed setup
function copySetupLink(reference, setupToken) {
  const base    = window.location.origin;
  const url     = `${base}/payment-confirmation.html?reference=${encodeURIComponent(reference)}&setup_token=${encodeURIComponent(setupToken)}`;
  navigator.clipboard.writeText(url).then(() => {
    const sucEl = document.getElementById('panelSuccess');
    sucEl.textContent = '📋 Setup link copied to clipboard. Send it to the student.';
    sucEl.classList.add('show');
    setTimeout(() => sucEl.classList.remove('show'), 4000);
  }).catch(() => {
    const errEl = document.getElementById('panelError');
    errEl.textContent = 'Could not copy. URL: ' + url;
    errEl.classList.add('show');
  });
}

// ─── View Student ─────────────────────────────────
function viewStudent(userId) {
  window.location.href = `${LICENSURE.admin}/users.html?user_id=${encodeURIComponent(userId)}`;
}

// ─── Revenue Summary ──────────────────────────────
function renderRevenue() {
  const activated = allPayments.filter(p => p.status === 'ACTIVATED' && p.amount_minor_paid);
  if (activated.length === 0) return;

  // Group by product
  const byProduct = {};
  let grandTotal  = 0;
  let currency    = 'GHS';

  activated.forEach(p => {
    const key   = p.products?.name || p.product_name || p.product_id || 'Unknown';
    const amt   = Number(p.amount_minor_paid || 0);
    currency    = p.currency || currency;
    grandTotal += amt;
    if (!byProduct[key]) byProduct[key] = { total: 0, count: 0 };
    byProduct[key].total += amt;
    byProduct[key].count++;
  });

  let gridHtml = '';
  Object.entries(byProduct)
    .sort((a, b) => b[1].total - a[1].total)
    .forEach(([name, data]) => {
      gridHtml += `
        <div class="revenue-item">
          <div class="r-label">${escHtml(name)}</div>
          <div class="r-value">${formatMoney(data.total, currency)}</div>
          <div class="r-count">${data.count} payment${data.count !== 1 ? 's' : ''}</div>
        </div>`;
    });

  document.getElementById('revenueGrid').innerHTML = gridHtml;
  document.getElementById('revenueTotal').innerHTML =
    `Total collected: <strong>${formatMoney(grandTotal, currency)}</strong> across ${activated.length} activated payment${activated.length !== 1 ? 's' : ''}`;
  document.getElementById('revenueCard').style.display = 'block';
}

// ─── Helpers ─────────────────────────────────────
function getUserName(p) {
  if (p.users) {
    return p.users.name ||
      `${p.users.forename || ''} ${p.users.surname || ''}`.trim() ||
      p.users.email || '';
  }
  return '';
}

function formatStatus(status) {
  const map = {
    ACTIVATED:      'Activated',
    PAID:           'Paid',
    SETUP_REQUIRED: 'Setup Required',
    FAILED:         'Failed',
    INIT:           'Abandoned'
  };
  return map[status] || status;
}

function formatMoney(minorUnits, currency) {
  const major = Number(minorUnits) / 100;
  return major.toLocaleString('en-GH', {
    style: 'currency', currency: currency || 'GHS',
    minimumFractionDigits: 2
  });
}

function formatTs(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('en-GB', {
    day: 'numeric', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(str) {
  return String(str || '').replace(/'/g, "\\'");
}

init();
</script>
