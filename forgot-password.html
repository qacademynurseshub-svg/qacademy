<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — QAcademy Nurses Hub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <h1>QAcademy</h1>
      <p>Nurses Hub</p>
    </div>

    <!-- Title -->
    <h2 class="auth-title">Reset your password</h2>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

    <!-- Alerts -->
    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <!-- Form -->
    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Send Reset Link
      </button>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      Remembered your password? <a href="/login.html">Sign in</a>
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script>

  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');

    // Reset alerts
    errorAlert.classList.remove('show');
    successAlert.classList.remove('show');

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';

    // Collect device info for audit trail
    const fpHash = await buildFpHash();
    const deviceLabel = buildDeviceLabel();
    const requestId = makeEventId();

    // ── Rate-limit check (3 requests per email per 60 min) ──
    try {
      const { data: rl } = await db.rpc('check_reset_rate_limit', {
        p_email: email
      });
      if (rl && !rl.allowed) {
        const mins = Math.ceil((rl.retry_after_seconds || 60) / 60);
        errorAlert.textContent = `Too many reset requests. Please try again in ${mins} minute${mins === 1 ? '' : 's'}.`;
        errorAlert.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';

        // Log the rate-limited attempt
        try {
          await db.rpc('log_reset_request', {
            p_request_id: requestId,
            p_email: email,
            p_status: 'RATE_LIMITED',
            p_fp_hash: fpHash,
            p_device_label: deviceLabel
          });
        } catch (_) {}

        return;
      }
    } catch (_) {
      // Fail-open: if rate-limit check errors, allow the request
    }

    // Send the reset email
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });

    if (error) {
      errorAlert.textContent = error.message;
      errorAlert.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';

      // Log the failed attempt
      try {
        await db.rpc('log_reset_request', {
          p_request_id: requestId,
          p_email: email,
          p_status: 'EMAIL_FAILED',
          p_fp_hash: fpHash,
          p_device_label: deviceLabel
        });
      } catch (_) {}

      return;
    }

    // ── Log the successful reset request ──
    try {
      await db.rpc('log_reset_request', {
        p_request_id: requestId,
        p_email: email,
        p_status: 'EMAIL_SENT',
        p_fp_hash: fpHash,
        p_device_label: deviceLabel
      });
    } catch (_) {
      // Non-critical — don't block the user if logging fails
    }

    // Show success even if email not found — security best practice
    // (we don't want to reveal which emails are registered)
    successAlert.textContent = 'If that email is registered, a reset link has been sent. Check your inbox.';
    successAlert.classList.add('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Link Sent';

  });

</script>

</body>
</html>
