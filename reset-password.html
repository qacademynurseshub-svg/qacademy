<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — QAcademy Nurses Hub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <h1>QAcademy</h1>
      <p>Nurses Hub</p>
    </div>

    <!-- Title -->
    <h2 class="auth-title">Set a new password</h2>
    <p class="auth-subtitle">Choose a strong password for your account</p>

    <!-- Alerts -->
    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <!-- Form (hidden until valid reset link confirmed) -->
    <form id="resetForm" style="display:none">
      <div class="form-group">
        <label for="password">New Password</label>
        <input
          type="password"
          id="password"
          placeholder="Minimum 8 characters"
          required
          minlength="8"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Repeat your new password"
          required
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Set New Password
      </button>
    </form>

    <!-- Footer -->
    <div class="auth-footer">
      <a href="/login.html">Back to Sign In</a>
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>

  const resetForm    = document.getElementById('resetForm');
  const errorAlert   = document.getElementById('errorAlert');
  const successAlert = document.getElementById('successAlert');
  let recoveryReady  = false;

  // ── 1. Check URL hash for Supabase error parameters ──
  // Supabase appends these when a reset link is invalid/expired/replaced
  const hashParams = new URLSearchParams(window.location.hash.slice(1));
  const hashError  = hashParams.get('error') || hashParams.get('error_code');

  if (hashError) {
    errorAlert.innerHTML =
      'This reset link is no longer valid. If you requested multiple resets, only the most recent link will work.<br><br>' +
      'Check your inbox for the latest email, or <a href="/forgot-password.html">request a new link</a>.';
    errorAlert.classList.add('show');
  }

  // ── 2. Listen for valid PASSWORD_RECOVERY event ──
  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
      errorAlert.classList.remove('show');
      resetForm.style.display = 'block';
    }
  });

  // ── 3. Timeout fallback — if no event fires and no hash error ──
  // Covers: direct navigation, mangled URLs, or any other silent failure
  setTimeout(() => {
    if (!recoveryReady && !hashError) {
      errorAlert.innerHTML =
        'No valid reset link found. Please <a href="/forgot-password.html">request a new password reset</a>.';
      errorAlert.classList.add('show');
    }
  }, 3000);

  // ── 4. Form submission ──
  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const submitBtn = document.getElementById('submitBtn');

    // Reset alerts
    errorAlert.classList.remove('show');
    successAlert.classList.remove('show');

    // Validate passwords match
    if (password !== confirmPassword) {
      errorAlert.textContent = 'Passwords do not match.';
      errorAlert.classList.add('show');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving...';

    // Update password in Supabase
    const { error } = await db.auth.updateUser({ password });

    if (error) {
      errorAlert.textContent = error.message;
      errorAlert.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Set New Password';
      return;
    }

    // Also clear must_change_password flag if set
    const { data: { session } } = await db.auth.getSession();
    if (session) {
      await db
        .from('users')
        .update({ must_change_password: false })
        .eq('auth_id', session.user.id);
    }

    // Mark the reset request as used (audit trail)
    try {
      const userEmail = session?.user?.email;
      if (userEmail) {
        await db.rpc('mark_reset_used', { p_email: userEmail });
      }
    } catch (_) {
      // Non-critical — don't block the user
    }

    // Success
    successAlert.textContent = 'Password updated successfully! Redirecting to login...';
    successAlert.classList.add('show');

    setTimeout(() => {
      window.location.href = '/login.html';
    }, 2000);

  });

</script>

</body>
</html>
