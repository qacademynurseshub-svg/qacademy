<!doctype html>
<html>
  <body style="margin:0;background:#f6f8f7;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#1f2a28">
    <div style="max-width:640px;margin:0 auto;padding:22px">
      <div style="background:#ffffff;border:1px solid rgba(0,0,0,.10);border-radius:16px;overflow:hidden">
        <div style="padding:18px 18px 10px;border-bottom:1px solid rgba(0,0,0,.08)">
          <div style="font-weight:900;color:#0b7a75">QAcademy • Teacher Assess</div>
          <div style="margin-top:6px;font-size:18px;font-weight:900">You’re approved 🎉</div>
          <div style="margin-top:6px;color:rgba(31,42,40,.75);font-size:13px;line-height:1.45">
            Hi {{name}}, your teacher access is now active.
          </div>
        </div>

        <div style="padding:16px 18px 18px">
          <div style="font-size:14px;line-height:1.55;color:rgba(31,42,40,.86)">
            You can now create classes, build quizzes, publish assessments, and view results.
          </div>

          <div style="margin-top:14px">
            <a href="{{cta_url}}"
               style="display:inline-block;background:#0b7a75;color:#fff;text-decoration:none;
                      padding:10px 14px;border-radius:12px;font-weight:800">
              {{cta_text}}
            </a>
          </div>

          <div style="margin-top:14px;color:rgba(31,42,40,.70);font-size:12px;line-height:1.45">
            Need help? Contact <b>{{support_email}}</b>.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
