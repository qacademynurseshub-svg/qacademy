name: Mirror production branch to prod repo

on:
  push:
    branches:
      - production

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: production
          fetch-depth: 0

      - name: Set up SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to prod repo
        run: |
          git remote add prod git@github.com:qacademynurseshub-svg/qacademy.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push prod production:main --force
