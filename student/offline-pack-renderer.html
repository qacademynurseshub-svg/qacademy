<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QAcademy — Offline Pack</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    :root{
      --brand:#0b7a75;
      --muted:#859998;
      --ink:#1f2a28;
      --bg:#f6f8f7;
      --card:#ffffff;
      --line:#e5e7eb;
      --soft:rgba(0,0,0,.06);
      --danger:#8f2727;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }

    .wrap{
      max-width:980px;
      margin:18px auto;
      padding:0 14px;
    }

    .topbar{
      background:var(--card);
      border:1px solid var(--soft);
      border-radius:14px;
      padding:10px 12px;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .topbar-left{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .topbar-title{
      font-size:15px;
      font-weight:900;
      color:#111827;
      margin:0;
    }

    .topbar-sub{
      font-size:12px;
      color:#6b7280;
      margin:0;
    }

    .btnrow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn{
      border:1px solid var(--soft);
      background:#fff;
      color:#111827;
      padding:8px 10px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      font-size:12px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn.primary{
      background:var(--brand);
      color:#fff;
      border-color:transparent;
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(2px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .overlay.show{display:flex}

    .spinner{
      width:34px;
      height:34px;
      border-radius:999px;
      border:3px solid #cbd5e1;
      border-top-color:var(--brand);
      animation:spin .9s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .err{
      color:#7f1d1d;
      background:#fff1f2;
      border:1px solid rgba(127,29,29,.18);
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      margin-top:12px;
      display:none;
    }

    .warn{
      color:#7c2d12;
      background:#fff7ed;
      border:1px solid rgba(124,45,18,.15);
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      margin-top:12px;
      display:none;
    }

    .card{
      background:var(--card);
      border:1px solid var(--soft);
      border-radius:14px;
      padding:14px;
      margin-top:12px;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
    }

    .sectionTitle{
      font-size:14px;
      font-weight:900;
      margin:0 0 8px 0;
      color:#111827;
    }

    .divider{
      height:1px;
      background:rgba(0,0,0,.10);
      margin:8px 0 10px 0;
    }

    .coverRow{
      display:flex;
      gap:14px;
      align-items:stretch;
    }

    .logoBox{
      width:92px;
      flex:0 0 92px;
      border-radius:16px;
      border:2px solid rgba(11,122,117,.18);
      background:rgba(11,122,117,.04);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
    }

    .logoMark{
      width:54px;
      height:54px;
      border-radius:16px;
      background:var(--brand);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:18px;
      letter-spacing:.4px;
    }

    .coverMain{flex:1;min-width:0}

    .coverTitle{
      margin:0;
      font-weight:900;
      font-size:18px;
      line-height:1.2;
      color:#111827;
    }

    .coverSub{
      margin-top:6px;
      font-size:12px;
      color:#374151;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:5px 9px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.10);
      background:#fff;
      font-size:12px;
      color:#111827;
    }

    .coverOwner{
      margin-top:10px;
      font-size:12px;
      color:#111827;
      padding:10px 12px;
      border:1px solid rgba(0,0,0,.10);
      border-radius:12px;
      background:#fff;
    }

    .muted{color:#6b7280}

    .kvList{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .kvBox{
      border:1px solid rgba(0,0,0,.10);
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
      font-size:13px;
    }

    .kvBox .k{
      font-size:11px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .compactLine{
      margin-top:8px;
      font-size:12px;
      line-height:1.45;
      color:#111827;
      padding:10px 12px;
      border:1px solid rgba(0,0,0,.10);
      border-radius:12px;
      background:#fff;
      white-space:normal;
      word-break:break-word;
    }

    .compactLine .label{
      font-weight:900;
      color:#111827;
      margin-right:8px;
    }

    .compactLine .value{
      color:#374151;
    }

    .q{
      padding:10px 0;
      border-bottom:1px dashed var(--line);
      break-inside:avoid;
      page-break-inside:avoid;
    }

    .q:last-child{border-bottom:none}

    .qhead{
      display:flex;
      gap:10px;
      align-items:flex-start;
    }

    .qno{
      width:44px;
      flex:0 0 44px;
      font-weight:900;
      color:var(--brand);
    }

    .qstem{
      flex:1;
      font-size:14px;
      line-height:1.45;
    }

    .opts{
      margin:8px 0 0 54px;
      padding:0;
      list-style:none;
    }

    .opt{
      display:flex;
      gap:10px;
      margin:6px 0;
      font-size:13px;
      line-height:1.45;
    }

    .olabel{
      width:22px;
      flex:0 0 22px;
      font-weight:900;
      color:#111827;
    }

    .otext{flex:1}

    .metaLine{
      margin:8px 0 0 54px;
      font-size:12px;
      color:#374151;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .metaLine b{color:#111827}

    .ownerSep{
      margin:14px 0;
      border:1px solid rgba(0,0,0,.10);
      border-radius:14px;
      background:linear-gradient(135deg, rgba(11,122,117,.06), rgba(0,0,0,0));
      padding:10px 12px;
      position:relative;
      overflow:hidden;
      break-inside:avoid;
      page-break-inside:avoid;
    }

    .ownerSep::before{
      content:attr(data-watermark);
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) rotate(-18deg);
      font-weight:900;
      font-size:18px;
      letter-spacing:.4px;
      color:rgba(0,0,0,.06);
      white-space:nowrap;
      pointer-events:none;
    }

    .ownerSepRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      position:relative;
    }

    .ownerSepSmall{
      font-size:12px;
      color:#374151;
    }

    .ownerSepChip{
      font-size:11px;
      padding:5px 9px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.10);
      background:#fff;
      color:#111827;
      white-space:nowrap;
    }

    .akeyGrid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:8px 12px;
      margin-top:10px;
    }

    .kv{
      font-size:12px;
      padding:8px 10px;
      border:1px solid rgba(0,0,0,.10);
      border-radius:12px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .kv span{color:#6b7280}
    .kv b{color:#111827}

    @media (max-width:720px){
      .topbar{align-items:flex-start}
      .btnrow{justify-content:flex-start}
      .kvList{grid-template-columns:1fr}
      .akeyGrid{grid-template-columns:repeat(2, minmax(0,1fr))}
      .qno{width:40px;flex-basis:40px}
      .opts,.metaLine{margin-left:50px}
      .coverRow{flex-direction:column}
      .logoBox{width:100%;flex-basis:auto}
    }

    @media print{
      body{background:#fff}
      .wrap{max-width:none;margin:0;padding:0}
      .topbar,.overlay,.err,.warn{display:none!important}
      .card{
        box-shadow:none;
        border:1px solid #ddd;
        border-radius:0;
        margin:0 0 10mm 0;
      }
      .ownerSep{border-radius:0}
      .q{break-inside:avoid;page-break-inside:avoid}
    }
  </style>
</head>
<body>
  <div class="overlay" id="qaOverlay">
    <div class="spinner" aria-label="Loading"></div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="topbar-left">
        <p class="topbar-title">Offline Pack Renderer</p>
        <p class="topbar-sub">Open a saved pack, print it, or save it as PDF from your browser.</p>
      </div>

      <div class="btnrow">
        <a class="btn" id="btnBack" href="/student/my-offline-packs.html">Back</a>
        <button class="btn" id="btnPrint" type="button">Print</button>
        <button class="btn primary" id="btnPdf" type="button">Download / Save PDF</button>
        <button class="btn primary" id="btnRefresh" type="button">Reload</button>
      </div>
    </div>

    <div class="warn" id="qaWarn"></div>
    <div class="err" id="qaError"></div>

    <div id="qaCover" class="card" style="display:none;"></div>
    <div id="qaOverview" class="card" style="display:none;"></div>
    <div id="qaQuestions" class="card" style="display:none;"></div>
    <div id="qaAnswerKey" class="card" style="display:none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/guard.js"></script>
  <script src="/js/api.js"></script>
  <script>
    const QA = {
      BRAND: 'QAcademy Nurses Hub',
      MY_DOWNLOADS_URL: '/student/my-offline-packs.html',
      DASHBOARD_URL: '/student/dashboard.html',
      OWNER_MARK_EVERY: 10
    };

    let PROFILE = null;
    let CURRENT_PACK = null;

    const $ = (id) => document.getElementById(id);

    function showOverlay(on){
      $('qaOverlay').classList.toggle('show', !!on);
    }

    function showError(msg){
      const el = $('qaError');
      el.style.display = 'block';
      el.textContent = String(msg || 'Something went wrong.');
    }

    function hideError(){
      $('qaError').style.display = 'none';
      $('qaError').textContent = '';
    }

    function showWarn(msg){
      const el = $('qaWarn');
      el.style.display = 'block';
      el.textContent = String(msg || '');
    }

    function hideWarn(){
      $('qaWarn').style.display = 'none';
      $('qaWarn').textContent = '';
    }

    function esc(s){
      return String(s ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function getParam(name){
      const u = new URL(window.location.href);
      return (u.searchParams.get(name) || '').trim();
    }

    function formatDate(value){
      if (!value) return '—';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '—';
      return d.toLocaleString('en-GB', {
        year:'numeric',
        month:'short',
        day:'numeric',
        hour:'2-digit',
        minute:'2-digit'
      });
    }

    function joinOrFallback(arr, fallback){
      return Array.isArray(arr) && arr.length
        ? arr.map(x => String(x)).join(', ')
        : fallback;
    }

    function normalizeCorrectLetter(v){
      const s = String(v || '').trim();
      if (!s) return '';
      const up = s.toUpperCase();
      if (['A','B','C','D','E','F'].includes(up)) return up;
      if (up.includes('OPTION_A')) return 'A';
      if (up.includes('OPTION_B')) return 'B';
      if (up.includes('OPTION_C')) return 'C';
      if (up.includes('OPTION_D')) return 'D';
      if (up.includes('OPTION_E')) return 'E';
      if (up.includes('OPTION_F')) return 'F';
      const n = parseInt(s, 10);
      if ([1,2,3,4,5,6].includes(n)) return ['A','B','C','D','E','F'][n - 1];
      return up.slice(0, 1);
    }

    function getOptionMap(item){
      const map = {};

      if (item && item.options && typeof item.options === 'object') {
        Object.keys(item.options).forEach(k => {
          map[String(k).toUpperCase()] = item.options[k];
        });
      }

      ['a','b','c','d','e','f'].forEach(letter => {
        const key = 'option_' + letter;
        const upper = letter.toUpperCase();
        if (!map[upper] && item && item[key] != null && String(item[key]).trim()) {
          map[upper] = item[key];
        }
      });

      return map;
    }

    function orderedOptionEntries(item){
      const map = getOptionMap(item);
      return ['A','B','C','D','E','F']
        .filter(letter => map[letter] != null && String(map[letter]).trim() !== '')
        .map(letter => ({ letter, text: map[letter] }));
    }

    function renderCover(pack, items){
      const ownerName = String(pack.watermark?.owner_name || '').trim() || 'QAcademy Student';
      const ownerEmail = String(pack.watermark?.owner_email_mask || '').trim();
      const ownerLabel = String(pack.watermark?.owner_label || '').trim();

      $('qaCover').innerHTML = `
        <div class="coverRow">
          <div class="logoBox">
            <div class="logoMark">QA</div>
          </div>

          <div class="coverMain">
            <p class="coverTitle">${esc(pack.pack_name || 'Offline Pack')}</p>

            <div class="coverSub">
              <span class="tag"><b style="color:var(--brand)">Course</b>&nbsp;${esc(pack.course_title || pack.course_id || '—')}</span>
              <span class="tag"><b style="color:var(--brand)">Questions</b>&nbsp;${esc(items.length || pack.question_count || '—')}</span>
              <span class="tag"><b style="color:var(--brand)">Pack</b>&nbsp;${esc(pack.pack_id || '—')}</span>
              <span class="tag"><b style="color:var(--brand)">Generated</b>&nbsp;${esc(formatDate(pack.created_at || pack.created_utc))}</span>
            </div>

            <div class="coverOwner">
              <b>Prepared for:</b>
              ${esc(ownerName)}
              ${ownerEmail ? ` <span class="muted">(${esc(ownerEmail)})</span>` : ''}
              ${ownerLabel ? `<div class="muted" style="margin-top:6px;">${esc(ownerLabel)}</div>` : ''}
            </div>
          </div>
        </div>
      `;
      $('qaCover').style.display = 'block';
    }

    function renderOverview(pack, items){
      const topicsText = joinOrFallback(pack.topics || pack.maintopics, 'All topics');
      const subtopicsText = joinOrFallback(pack.subtopics, 'Not specified');
      const diffsText = joinOrFallback(pack.difficulties, 'All difficulties');
      const typesText = joinOrFallback(pack.question_types, 'All question types');
      const modeText = String(pack.selection_mode || 'topics') === 'concept' ? 'Concept mode' : 'Topics mode';
      const conceptText = String(pack.concept_query || '').trim() || 'None';

      $('qaOverview').innerHTML = `
        <div class="sectionTitle">Pack Overview</div>
        <div class="divider"></div>

        <div class="kvList">
          <div class="kvBox">
            <div class="k">Course</div>
            <div><b>${esc(pack.course_title || pack.course_id || '—')}</b></div>
          </div>
          <div class="kvBox">
            <div class="k">Questions</div>
            <div><b>${esc(items.length || pack.question_count || '—')}</b></div>
          </div>
          <div class="kvBox">
            <div class="k">Pack ID</div>
            <div><b>${esc(pack.pack_id || '—')}</b></div>
          </div>
          <div class="kvBox">
            <div class="k">Selection mode</div>
            <div><b>${esc(modeText)}</b></div>
          </div>
        </div>

        <div class="compactLine">
          <span class="label">Maintopics selected:</span>
          <span class="value">${esc(topicsText)}</span>
        </div>

        <div class="compactLine">
          <span class="label">Subtopics selected:</span>
          <span class="value">${esc(subtopicsText)}</span>
        </div>

        <div class="compactLine">
          <span class="label">Difficulty:</span>
          <span class="value">${esc(diffsText)}</span>
        </div>

        <div class="compactLine">
          <span class="label">Question type:</span>
          <span class="value">${esc(typesText)}</span>
        </div>

        <div class="compactLine">
          <span class="label">Concept keyword:</span>
          <span class="value">${esc(conceptText)}</span>
        </div>

        <div style="margin-top:12px;color:#374151;font-size:12px;line-height:1.5;">
          For personal study use only. Do not share. Attempt the questions first, then use the answer key at the end to check your work.
        </div>
      `;
      $('qaOverview').style.display = 'block';
    }

    function ownerSeparatorHtml(pack, afterQn){
      const wm = String(pack.watermark?.owner_label || pack.watermark?.owner_name || QA.BRAND).trim() || QA.BRAND;
      return `
        <div class="ownerSep" data-watermark="${esc(wm)}">
          <div class="ownerSepRow">
            <div class="ownerSepSmall">
              <b>${esc(wm)}</b>
              <span class="muted">• marker after Q${afterQn}</span>
            </div>
            <div class="ownerSepChip">${esc(pack.pack_id || 'Pack')}</div>
          </div>
        </div>
      `;
    }

    function renderQuestions(pack, items){
      let html = `<div class="sectionTitle">Questions</div><div class="divider"></div>`;

      items.forEach((item, idx) => {
        const qn = idx + 1;
        const opts = orderedOptionEntries(item);

        const topic = item.maintopic || item.topic || '';
        const subtopic = item.subtopic || '';
        const difficulty = item.difficulty || '';
        const qtype = item.question_type || '';

        html += `
          <div class="q">
            <div class="qhead">
              <div class="qno">Q${qn}.</div>
              <div class="qstem">${esc(item.stem || '')}</div>
            </div>

            <ul class="opts">
              ${opts.map(opt => `
                <li class="opt">
                  <div class="olabel">${esc(opt.letter)}.</div>
                  <div class="otext">${esc(opt.text)}</div>
                </li>
              `).join('')}
            </ul>

            <div class="metaLine">
              <span><b>Main topic:</b> ${esc(topic || '—')}</span>
              <span><b>Subtopic:</b> ${esc(subtopic || '—')}</span>
              <span><b>Difficulty:</b> ${esc(difficulty || '—')}</span>
              <span><b>Type:</b> ${esc(qtype || '—')}</span>
            </div>
          </div>
        `;

        if (QA.OWNER_MARK_EVERY > 0 && qn % QA.OWNER_MARK_EVERY === 0 && qn !== items.length) {
          html += ownerSeparatorHtml(pack, qn);
        }
      });

      if (!items.length) {
        html += `<div class="muted" style="font-size:12px;">No questions found in this pack.</div>`;
      }

      $('qaQuestions').innerHTML = html;
      $('qaQuestions').style.display = 'block';
    }

    function renderAnswerKey(items){
      let html = `
        <div class="sectionTitle">Answer Key</div>
        <div class="divider"></div>
        <div class="akeyGrid">
      `;

      items.forEach((item, idx) => {
        const qn = idx + 1;
        const letter = normalizeCorrectLetter(item.correct || item.correct_option || item.answer) || '—';
        html += `<div class="kv"><span>Q${qn}</span><b>${esc(letter)}</b></div>`;
      });

      html += `</div>`;

      if (!items.length) {
        html += `<div class="muted" style="font-size:12px;margin-top:10px;">No answer key available.</div>`;
      }

      $('qaAnswerKey').innerHTML = html;
      $('qaAnswerKey').style.display = 'block';
    }

    async function loadPack(){
      hideError();
      hideWarn();
      showOverlay(true);

      try {
        PROFILE = await guardPage('STUDENT');
        if (!PROFILE) return;

        const packId = getParam('pack_id');
        if (!packId) {
          throw new Error('Missing pack_id in the page URL.');
        }

        const res = await getOfflinePackForRender(PROFILE.user_id, packId);

        if (!res || !res.success) {
          throw new Error((res && res.message) || 'Could not load this offline pack.');
        }

        CURRENT_PACK = res.pack || {};
        CURRENT_PACK.items = Array.isArray(res.items) ? res.items : [];

        const courseTitle = getCourseTitle
          ? getCourseTitle(CURRENT_PACK.course_id)
          : CURRENT_PACK.course_id;

        CURRENT_PACK.course_title = courseTitle || CURRENT_PACK.course_id;

        renderCover(CURRENT_PACK, CURRENT_PACK.items);
        renderOverview(CURRENT_PACK, CURRENT_PACK.items);
        renderQuestions(CURRENT_PACK, CURRENT_PACK.items);
        renderAnswerKey(CURRENT_PACK.items);

        if (Array.isArray(res.missing_item_ids) && res.missing_item_ids.length) {
          showWarn(`Some saved questions could not be loaded from the source items table. Missing count: ${res.missing_item_ids.length}.`);
        }
      } catch (err) {
        console.error(err);
        showError(err.message || 'Could not load the offline pack.');
      } finally {
        showOverlay(false);
      }
    }

    function printPack(){
      window.print();
    }

    function downloadPdf(){
      window.print();
    }

    function bindEvents(){
      $('btnPrint').addEventListener('click', printPack);
      $('btnPdf').addEventListener('click', downloadPdf);
      $('btnRefresh').addEventListener('click', () => loadPack());
    }

    bindEvents();
    loadPack();
  </script>
</body>
</html>
