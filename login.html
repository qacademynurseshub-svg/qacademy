<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — QAcademy Nurses Hub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <h1>QAcademy</h1>
      <p>Nurses Hub</p>
    </div>

    <!-- Title -->
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <!-- Error Alert -->
    <div class="alert alert-error" id="errorAlert"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <div style="text-align:right; margin-bottom:16px;">
        <a href="/forgot-password.html" style="font-size:13px;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Sign In
      </button>
    </form>

    <!-- Footer -->
<!-- Footer -->
    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Register here</a>
    </div>
    <div style="text-align:center; margin-top:8px;">
      <a href="/myteacher/register.html" style="font-size:13px; color:var(--text-muted);">Signing up for MyTeacher? Register here</a>
    </div>
    <div style="text-align:center; margin-top:12px;">
      <a href="/index.html" style="font-size:13px; color:var(--text-muted);">← Back to Home</a>
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script>
  // If already logged in, redirect to correct dashboard
  db.auth.getSession().then(async ({ data: { session } }) => {
    if (session) {
      await redirectByRole(session.user.id);
    }
  });

  // Handle login form submission
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');

    // Reset error
    errorAlert.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    // ── Prepare device info for logging ─────────────────────────
    const identifier = email.toLowerCase();
    const ua = navigator.userAgent || '';
    const uaHash = await sha256Hex(ua);
    const fpHash = await buildFpHash();
    const deviceLabel = (typeof buildDeviceLabel === 'function')
      ? buildDeviceLabel()
      : (ua.includes('Mobile') ? 'Mobile' : 'Desktop');

    // ── Rate limit check ────────────────────────────────────────
    // Ask the database: "Has this email or device had too many
    // failed attempts recently?" If yes, block without even
    // sending the password to Supabase.
    try {
      const { data: rl } = await db.rpc('check_login_rate_limit', {
        p_identifier: identifier,
        p_fp_hash: fpHash
      });

      if (rl && !rl.allowed) {
        // Log the blocked attempt
        db.rpc('log_auth_event', {
          p_event_id:     makeEventId(),
          p_event_type:   'LOGIN_FAIL',
          p_identifier:   identifier,
          p_fp_hash:      fpHash,
          p_ua_hash:      uaHash,
          p_device_label: deviceLabel,
          p_fail_reason:  'RATE_LIMITED'
        }).then(() => {}).catch(() => {});

        const mins = Math.ceil((rl.retry_after_seconds || 60) / 60);
        errorAlert.textContent = 'Too many failed login attempts. Please try again in ' + mins + ' minute' + (mins === 1 ? '' : 's') + '.';
        errorAlert.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
        return;
      }
    } catch (_) {
      // Fail-open: if rate limit check errors, proceed with login.
      // Never accidentally lock everyone out.
      console.warn('Rate limit check failed (proceeding with login):', _);
    }

    // ── Attempt login with Supabase Auth ────────────────────────
    const { data, error } = await db.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      // Log the failed attempt (fire-and-forget — don't block UI)
      db.rpc('log_auth_event', {
        p_event_id:     makeEventId(),
        p_event_type:   'LOGIN_FAIL',
        p_identifier:   identifier,
        p_fp_hash:      fpHash,
        p_ua_hash:      uaHash,
        p_device_label: deviceLabel,
        p_fail_reason:  'INVALID_CREDENTIALS'
      }).then(() => {}).catch(() => {});

      errorAlert.textContent = 'Invalid email or password. Please try again.';
      errorAlert.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
      return;
    }

    // ── Session control ─────────────────────────────────────────
    // 1. Get the user's profile to find their user_id
    const { data: userRow } = await db
      .from('users')
      .select('user_id')
      .eq('auth_id', data.user.id)
      .maybeSingle();

    // Log successful login (fire-and-forget)
    db.rpc('log_auth_event', {
      p_event_id:     makeEventId(),
      p_event_type:   'LOGIN_SUCCESS',
      p_identifier:   identifier,
      p_user_id:      userRow ? userRow.user_id : null,
      p_fp_hash:      fpHash,
      p_ua_hash:      uaHash,
      p_device_label: deviceLabel
    }).then(() => {}).catch(() => {});

    if (userRow) {
      const now = new Date();
      const expires = new Date(now);
      expires.setDate(expires.getDate() + 7);
      const nowIso     = now.toISOString();
      const expiresIso = expires.toISOString();

      // 2. Count active non-expired sessions for this user
      const { count } = await db
        .from('sessions')
        .select('session_id', { count: 'exact', head: true })
        .eq('user_id', userRow.user_id)
        .eq('active', true)
        .gt('expires_utc', nowIso);

      if (count >= 2) {
        // Too many sessions — kick the oldest one to make room.
        // The kicked device will be redirected to login on next
        // page load when guardPage() → verifySession() fails.
        const { data: oldest } = await db
          .from('sessions')
          .select('session_id')
          .eq('user_id', userRow.user_id)
          .eq('active', true)
          .order('issued_utc', { ascending: true })
          .limit(1)
          .maybeSingle();

        if (oldest) {
          await db.from('sessions')
            .update({ active: false })
            .eq('session_id', oldest.session_id);
        }
      }

      // 3. Create new session row
      const sessionId = 'SESS_' + crypto.randomUUID()
        .replace(/-/g, '').toUpperCase();

      await db.from('sessions').insert({
        session_id:    sessionId,
        user_id:       userRow.user_id,
        kind:          'LOGIN',
        issued_utc:    nowIso,
        expires_utc:   expiresIso,
        last_seen_utc: nowIso,
        device_label:  deviceLabel,
        ua_hash:       uaHash,
        ip_hash:       null,
        login_via:     'EMAIL',
        active:        true
      });

      // 4. Store session_id in localStorage for guardPage() checks
      localStorage.setItem('qa_session_id', sessionId);
    }
    // ── End session control ─────────────────────────────────────

    // Redirect based on role
    await redirectByRole(data.user.id);
  });

  // Redirect user to their correct dashboard based on role
async function redirectByRole(authId) {
  const { data: profile } = await db
    .from('users')
    .select('role, must_change_password')
    .eq('auth_id', authId)
    .single();

  if (!profile) {
    window.location.href = '/router.html';
    return;
  }

  // Check if password change is required
  if (profile.must_change_password) {
    window.location.href = '/change-password.html';
    return;
  }

  // All roles go to Router — Router handles the rest
  window.location.href = '/router.html';
}
</script>

</body>
</html>
