<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — QAcademy Nurses Hub</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Signing-in overlay (hidden by default, shown when returning from Google/magic link) -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-overlay-card">
    <div class="auth-overlay-spinner"></div>
    <p class="auth-overlay-text" id="overlayText">Signing in...</p>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <h1>QAcademy</h1>
      <p>Nurses Hub</p>
    </div>

    <!-- Title -->
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <!-- Error Alert -->
    <div class="alert alert-error" id="errorAlert"></div>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <div style="text-align:right; margin-bottom:16px;">
        <a href="/forgot-password.html" style="font-size:13px;">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">
        Sign In
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">or</div>

    <!-- Google Sign-In -->
    <button type="button" class="btn btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle; margin-right:8px;">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>

    <!-- Magic Link -->
    <div class="magic-link-section" id="magicLinkSection">
      <div class="form-group" style="margin-bottom:8px;">
        <label for="magicEmail">Or sign in with a magic link</label>
        <input
          type="email"
          id="magicEmail"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </div>
      <button type="button" class="btn btn-magic" id="magicBtn">
        Send magic link
      </button>
      <div class="alert alert-success" id="magicSuccess"></div>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Register here</a>
    </div>
    <div style="text-align:center; margin-top:8px;">
      <a href="/myteacher/register.html" style="font-size:13px; color:var(--text-muted);">Signing up for MyTeacher? Register here</a>
    </div>
    <div style="text-align:center; margin-top:12px;">
      <a href="/index.html" style="font-size:13px; color:var(--text-muted);">&larr; Back to Home</a>
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script>
  // ── Overlay helpers ───���─────────────────────────────────────
  const overlay = document.getElementById('authOverlay');
  const overlayText = document.getElementById('overlayText');

  function showOverlay(text) {
    overlayText.textContent = text;
    overlay.classList.add('show');
  }
  function hideOverlay() {
    overlay.classList.remove('show');
  }

  // ── Detect if we're returning from OAuth/magic link ─────────
  // If the URL has a hash with access_token, the user is coming
  // back from Google or a magic link. Show the overlay immediately
  // so they know something is happening.
  const urlHash = window.location.hash || '';
  const isOAuthReturn = urlHash.includes('access_token');
  if (isOAuthReturn) {
    const isGoogle = urlHash.includes('provider_token');
    showOverlay(isGoogle ? 'Signing in with Google...' : 'Signing in with magic link...');
  }

  // ── Handle auth state changes ────────────────────────────────
  // onAuthStateChange fires when Supabase finishes processing
  // OAuth/magic-link tokens from the URL hash.
  let authHandled = false;

  db.auth.onAuthStateChange(async (event, session) => {
    console.log('[auth] onAuthStateChange:', event, session ? 'has session' : 'no session');

    // Only process once, and only when we have a session
    if (authHandled) return;
    if (!session) return;

    authHandled = true;

    try {
      // Check if this user has a users row (registered account)
      const { data: userRow, error: userError } = await db
        .from('users')
        .select('user_id')
        .eq('auth_id', session.user.id)
        .maybeSingle();

      console.log('[auth] user lookup:', userRow ? userRow.user_id : 'not found', userError?.message || '');

      if (!userRow) {
        // No account — they used Google/magic link but never registered.
        // Log the failed attempt so it's visible in auth_events.
        if (isOAuthReturn) {
          const identifier = (session.user.email || '').toLowerCase();
          const fpHash = await buildFpHash();
          const uaHash = await sha256Hex(navigator.userAgent || '');
          const deviceLabel = buildDeviceLabel();
          await db.rpc('log_auth_event', {
            p_event_id:     makeEventId(),
            p_event_type:   'LOGIN_FAIL',
            p_identifier:   identifier,
            p_fp_hash:      fpHash,
            p_ua_hash:      uaHash,
            p_device_label: deviceLabel,
            p_fail_reason:  'NO_ACCOUNT'
          }).catch(() => {});
          console.log('[auth] no account — LOGIN_FAIL logged for', identifier);
        }

        await db.auth.signOut();
        hideOverlay();
        const errorAlert = document.getElementById('errorAlert');
        errorAlert.textContent = 'No account found for this email. Please register first, then you can sign in with Google or a magic link.';
        errorAlert.classList.add('show');
        return;
      }

      // Check if session row already exists (normal page revisit).
      // SKIP this check if we're returning from OAuth/magic link —
      // that's always a fresh sign-in and needs a new session row,
      // even if an old qa_session_id is still in localStorage.
      if (!isOAuthReturn) {
        const existingSessionId = localStorage.getItem('qa_session_id');
        if (existingSessionId) {
          console.log('[auth] existing session found, redirecting');
          await redirectByRole(session.user.id);
          return;
        }
      }

      // Returning from OAuth or magic link — create a session row.
      // Determine login method from the URL hash, not app_metadata.provider.
      // Supabase sets provider to the ORIGINAL signup method, not the
      // current login method — so a user who registered with email+password
      // but signs in with Google would show provider='email'. The URL hash
      // is the reliable source: Google returns include provider_token,
      // magic links include type=magiclink.
      let loginVia = 'EMAIL';
      if (urlHash.includes('provider_token')) loginVia = 'GOOGLE';
      else if (urlHash.includes('type=magiclink')) loginVia = 'MAGIC_LINK';

      console.log('[auth] creating session, provider:', provider, 'loginVia:', loginVia);

      // Show overlay if not already visible
      if (!overlay.classList.contains('show')) {
        showOverlay(loginVia === 'GOOGLE' ? 'Signing in with Google...' : 'Signing in with magic link...');
      }

      // Log the auth event
      const identifier = (session.user.email || '').toLowerCase();
      const fpHash = await buildFpHash();
      const uaHash = await sha256Hex(navigator.userAgent || '');
      const deviceLabel = buildDeviceLabel();

      const { error: eventError } = await db.rpc('log_auth_event', {
        p_event_id:     makeEventId(),
        p_event_type:   'LOGIN_SUCCESS',
        p_identifier:   identifier,
        p_user_id:      userRow.user_id,
        p_fp_hash:      fpHash,
        p_ua_hash:      uaHash,
        p_device_label: deviceLabel
      });
      console.log('[auth] auth_event logged:', eventError ? eventError.message : 'ok');

      const sessionId = await createLoginSession(userRow.user_id, loginVia);
      console.log('[auth] session created:', sessionId || 'FAILED');

      await redirectByRole(session.user.id);

    } catch (err) {
      console.error('[auth] onAuthStateChange error:', err);
      hideOverlay();
      const errorAlert = document.getElementById('errorAlert');
      errorAlert.textContent = 'Something went wrong during sign-in. Please try again.';
      errorAlert.classList.add('show');
    }
  });

  // Handle login form submission
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');

    // Reset error
    errorAlert.classList.remove('show');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    // ── Prepare device info for logging ─────────────────────────
    const identifier = email.toLowerCase();
    const ua = navigator.userAgent || '';
    const uaHash = await sha256Hex(ua);
    const fpHash = await buildFpHash();
    const deviceLabel = (typeof buildDeviceLabel === 'function')
      ? buildDeviceLabel()
      : (ua.includes('Mobile') ? 'Mobile' : 'Desktop');

    // ── Rate limit check ────────────────────────────────────────
    // Ask the database: "Has this email or device had too many
    // failed attempts recently?" If yes, block without even
    // sending the password to Supabase.
    try {
      const { data: rl } = await db.rpc('check_login_rate_limit', {
        p_identifier: identifier,
        p_fp_hash: fpHash
      });

      if (rl && !rl.allowed) {
        // Log the blocked attempt
        db.rpc('log_auth_event', {
          p_event_id:     makeEventId(),
          p_event_type:   'LOGIN_FAIL',
          p_identifier:   identifier,
          p_fp_hash:      fpHash,
          p_ua_hash:      uaHash,
          p_device_label: deviceLabel,
          p_fail_reason:  'RATE_LIMITED'
        }).then(() => {}).catch(() => {});

        const mins = Math.ceil((rl.retry_after_seconds || 60) / 60);
        errorAlert.textContent = 'Too many failed login attempts. Please try again in ' + mins + ' minute' + (mins === 1 ? '' : 's') + '.';
        errorAlert.classList.add('show');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
        return;
      }
    } catch (_) {
      // Fail-open: if rate limit check errors, proceed with login.
      // Never accidentally lock everyone out.
      console.warn('Rate limit check failed (proceeding with login):', _);
    }

    // ── Attempt login with Supabase Auth ────────────────────────
    const { data, error } = await db.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      // Log the failed attempt (fire-and-forget — don't block UI)
      db.rpc('log_auth_event', {
        p_event_id:     makeEventId(),
        p_event_type:   'LOGIN_FAIL',
        p_identifier:   identifier,
        p_fp_hash:      fpHash,
        p_ua_hash:      uaHash,
        p_device_label: deviceLabel,
        p_fail_reason:  'INVALID_CREDENTIALS'
      }).then(() => {}).catch(() => {});

      errorAlert.textContent = 'Invalid email or password. Please try again.';
      errorAlert.classList.add('show');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
      return;
    }

    // ── Session control (now uses shared function) ────────────
    const { data: userRow } = await db
      .from('users')
      .select('user_id')
      .eq('auth_id', data.user.id)
      .maybeSingle();

    // Log successful login (fire-and-forget)
    db.rpc('log_auth_event', {
      p_event_id:     makeEventId(),
      p_event_type:   'LOGIN_SUCCESS',
      p_identifier:   identifier,
      p_user_id:      userRow ? userRow.user_id : null,
      p_fp_hash:      fpHash,
      p_ua_hash:      uaHash,
      p_device_label: deviceLabel
    }).then(() => {}).catch(() => {});

    if (userRow) {
      await createLoginSession(userRow.user_id, 'EMAIL');
    }
    // ── End session control ─────────────────────────────────────

    // Redirect based on role
    await redirectByRole(data.user.id);
  });

  // ── Google Sign-In ──────────────────────────────────────────
  document.getElementById('googleBtn').addEventListener('click', async () => {
    const errorAlert = document.getElementById('errorAlert');
    errorAlert.classList.remove('show');

    const { error } = await db.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/login.html'
      }
    });

    if (error) {
      errorAlert.textContent = 'Could not start Google sign-in. Please try again.';
      errorAlert.classList.add('show');
    }
    // If no error, the browser redirects to Google automatically.
    // When Google sends them back to /login.html, the session check
    // at the top of this page handles the rest.
  });

  // ── Magic Link ──────────────────────────────────────────────
  document.getElementById('magicBtn').addEventListener('click', async () => {
    const magicEmail = document.getElementById('magicEmail').value.trim();
    const errorAlert = document.getElementById('errorAlert');
    const magicSuccess = document.getElementById('magicSuccess');
    const magicBtn = document.getElementById('magicBtn');

    errorAlert.classList.remove('show');
    magicSuccess.classList.remove('show');

    if (!magicEmail) {
      errorAlert.textContent = 'Please enter your email address to receive a magic link.';
      errorAlert.classList.add('show');
      return;
    }

    magicBtn.disabled = true;
    magicBtn.textContent = 'Sending...';

    const { error } = await db.auth.signInWithOtp({
      email: magicEmail,
      options: {
        emailRedirectTo: window.location.origin + '/login.html'
      }
    });

    if (error) {
      errorAlert.textContent = 'Could not send magic link. Please try again.';
      errorAlert.classList.add('show');
    } else {
      magicSuccess.textContent = 'Magic link sent! Check your inbox and click the link to sign in.';
      magicSuccess.classList.add('show');
    }

    magicBtn.disabled = false;
    magicBtn.textContent = 'Send magic link';
  });

  // Redirect user to their correct dashboard based on role
async function redirectByRole(authId) {
  const { data: profile } = await db
    .from('users')
    .select('role, must_change_password')
    .eq('auth_id', authId)
    .single();

  if (!profile) {
    window.location.href = '/router.html';
    return;
  }

  // Check if password change is required
  if (profile.must_change_password) {
    window.location.href = '/change-password.html';
    return;
  }

  // All roles go to Router — Router handles the rest
  window.location.href = '/router.html';
}
</script>

</body>
</html>
